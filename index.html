<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ImmersaMap — 古地図・空中写真で街の時間旅行を。準備中です。">
<meta name="robots" content="noindex">
<meta property="og:title" content="ImmersaMap — 準備中">
<meta property="og:description" content="古地図・空中写真で時を遡る地図体験。鋭意準備中です。">
<title>ImmersaMap — 準備中</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: #1a1a1a;
    background: #fafafa;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    background:
      radial-gradient(circle at 20% 30%, rgba(99, 130, 184, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(184, 130, 99, 0.06) 0%, transparent 50%),
      #fafafa;
  }

  .container {
    max-width: 520px; width: 100%;
    text-align: center;
  }

  .logo {
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 28px;
  }
  .logo i {
    font-size: 36px; color: #1a1a1a;
  }
  .logo span {
    font-size: 24px; font-weight: 500;
    letter-spacing: 0.5px;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff; border: 1px solid #e5e5e5;
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px; color: #555;
    margin-bottom: 24px;
  }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #2d8659;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.8); }
  }

  h1 {
    font-size: 32px; font-weight: 500;
    line-height: 1.4; margin-bottom: 16px;
    color: #1a1a1a;
  }

  .lede {
    font-size: 15px; color: #555;
    line-height: 1.7; margin-bottom: 32px;
  }

  .preview-link {
    display: inline-flex; align-items: center; gap: 8px;
    background: #1a1a1a; color: #fff;
    padding: 12px 22px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px; font-weight: 500;
    transition: background 0.15s;
  }
  .preview-link:hover { background: #000; }
  .preview-link i { font-size: 18px; }

  .sub-links {
    display: flex; gap: 24px; justify-content: center;
    margin-top: 32px;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .sub-links a {
    color: #888; text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .sub-links a:hover { color: #1a1a1a; }
  .sub-links i { font-size: 14px; }

  footer {
    position: fixed; bottom: 16px; left: 0; right: 0;
    text-align: center;
    font-size: 11px; color: #aaa;
  }

  @media (max-width: 600px) {
    h1 { font-size: 24px; }
    .lede { font-size: 14px; }
    .logo span { font-size: 20px; }
  }
</style>
</head>
<body>
  <main class="container">
    <div class="logo">
      <i class="ti ti-map-2"></i>
      <span>ImmersaMap</span>
    </div>

    <div class="badge">
      <span class="dot"></span>
      <span>準備中</span>
    </div>

    <h1>時を遡る地図体験を、<br>もうすぐお届けします。</h1>

    <p class="lede">
      古地図と現代地図を重ね合わせ、街がかつてどんな姿だったかを直感的に味わえる
      Web サービスです。空中写真や地形図も切り替えて閲覧できます。
    </p>

    <a class="preview-link" href="/map/">
      <i class="ti ti-eye"></i>
      先行プレビューを見る
    </a>

    <div class="sub-links">
      <a href="/map/"><i class="ti ti-map"></i>地図を見る</a>
    </div>
  </main>

  <footer>
    © ImmersaMap
  </footer>
</body>
</html>
