<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ImmersaMap</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1008; --ink2:#2a1e0e;
  --parchment:#f2e8d0; --parchment2:#e8d8b0;
  --sepia:#8b6914; --gold:#d4a017; --gold-l:#f0c040;
  --rust:#c0392b; --blue:#3498db;
  --surface:rgba(18,12,4,0.90);
  --border:rgba(212,160,23,0.30);
  --glow:rgba(212,160,23,0.12);
  --sheet-min:28px; --sheet-mid:200px; --sheet-max:68vh;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:'Noto Sans JP',sans-serif;
  background:var(--ink);color:var(--parchment);}

/* ── MAP ── */
#map{position:fixed;inset:0;z-index:1;}

/* ── GRAIN ── */
#grain{position:fixed;inset:0;z-index:3;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:100;background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s,visibility .8s;}
#splash.hidden{opacity:0;visibility:hidden;pointer-events:none;}
.splash-logo{font-family:'Cinzel',serif;font-size:clamp(28px,8vw,42px);
  letter-spacing:.14em;color:var(--gold-l);margin-bottom:6px;}
.splash-sub{font-size:12px;color:var(--sepia);letter-spacing:.25em;margin-bottom:48px;}
.splash-ring{width:72px;height:72px;border-radius:50%;border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  margin-bottom:28px;animation:pulseRing 3s ease-in-out infinite;}
@keyframes pulseRing{
  0%,100%{box-shadow:0 0 0 0 rgba(212,160,23,.3);}
  50%{box-shadow:0 0 0 16px rgba(212,160,23,0);}
}
.splash-start{padding:13px 42px;border:1.5px solid var(--gold);border-radius:2px;
  background:transparent;color:var(--gold-l);font-family:'Cinzel',serif;
  font-size:13px;letter-spacing:.2em;cursor:pointer;transition:background .3s;
  text-transform:uppercase;}
.splash-start:hover{background:rgba(212,160,23,.1);}
.splash-creator{margin-top:18px;font-size:11px;color:var(--sepia);
  text-decoration:none;letter-spacing:.1em;border-bottom:1px solid rgba(139,105,20,.25);
  padding-bottom:1px;transition:color .2s;}
.splash-creator:hover{color:var(--gold);}

/* ── TOP HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:20;
  padding:max(14px,env(safe-area-inset-top)) 14px 10px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(18,12,4,.92) 0%,transparent 100%);
  pointer-events:none;}
.hud-left{display:flex;flex-direction:column;gap:1px;}
.hud-logo{font-family:'Cinzel',serif;font-size:15px;letter-spacing:.14em;color:var(--gold-l);}
.hud-map-name{font-size:11px;color:var(--sepia);letter-spacing:.08em;
  max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hud-right{display:flex;gap:8px;}
.hud-btn{width:40px;height:40px;border-radius:6px;border:1px solid var(--border);
  background:var(--surface);backdrop-filter:blur(8px);
  color:var(--parchment);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  pointer-events:all;transition:all .2s;}
.hud-btn:active{transform:scale(.92);background:rgba(212,160,23,.15);}

/* ── COMPASS ── */
#compass{position:fixed;top:max(62px,calc(env(safe-area-inset-top)+48px));
  right:14px;z-index:20;width:46px;height:46px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;}
.c-ring{position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(212,160,23,.3);
  background:var(--surface);backdrop-filter:blur(8px);}
.c-needle{position:relative;z-index:1;width:0;height:0;
  display:flex;flex-direction:column;align-items:center;transition:transform .25s;}
.c-n{width:0;height:0;border-left:4px solid transparent;
  border-right:4px solid transparent;border-bottom:13px solid var(--rust);}
.c-s{width:0;height:0;border-left:4px solid transparent;
  border-right:4px solid transparent;border-top:13px solid rgba(212,160,23,.4);}
.c-label{position:absolute;top:3px;font-family:'Cinzel',serif;
  font-size:7px;color:var(--rust);font-weight:600;}

/* ── TIME SWIPE HINT ── */
#swipe-hint{position:fixed;top:50%;left:50%;z-index:15;
  transform:translate(-50%,-50%);
  background:rgba(18,12,4,.82);border:1px solid var(--border);
  border-radius:24px;padding:8px 18px;
  font-size:11px;color:var(--parchment2);letter-spacing:.1em;
  pointer-events:none;opacity:0;transition:opacity .4s;backdrop-filter:blur(8px);}
#swipe-hint.show{opacity:1;}

/* ── TIME INDICATOR ── */
#time-bar{position:fixed;top:max(62px,calc(env(safe-area-inset-top)+48px));
  left:14px;z-index:20;
  background:var(--surface);border:1px solid var(--border);
  border-radius:6px;padding:6px 10px;backdrop-filter:blur(8px);
  opacity:0;transform:translateX(-6px);transition:all .35s;}
#time-bar.visible{opacity:1;transform:translateX(0);}
.time-era{font-size:10px;color:var(--gold-l);font-family:'Cinzel',serif;letter-spacing:.1em;}
.time-name{font-size:11px;color:var(--parchment);margin-top:1px;
  max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── BOTTOM SHEET ── */
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:var(--ink2);
  border-top:1px solid var(--border);
  border-radius:14px 14px 0 0;
  transition:height .35s cubic-bezier(.16,1,.3,1);
  height:var(--sheet-min);
  padding-bottom:var(--safe-bottom);}
.sheet-handle{height:28px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;}
.sheet-bar{width:36px;height:3px;border-radius:2px;background:rgba(212,160,23,.35);}
.sheet-inner{height:calc(100% - 28px);overflow:hidden;display:flex;flex-direction:column;}

/* 現在地図コントロール（sheet-mid時表示） */
#ctrl-panel{padding:0 14px 10px;flex-shrink:0;
  border-bottom:1px solid rgba(212,160,23,.1);}
.ctrl-now{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ctrl-now-name{font-size:13px;color:var(--gold-l);font-family:'Cinzel',serif;letter-spacing:.06em;}
.ctrl-now-era{font-size:10px;color:var(--sepia);}
.opacity-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.opacity-label{font-size:10px;color:var(--sepia);white-space:nowrap;}
.opacity-val{font-size:11px;color:var(--gold);min-width:28px;text-align:right;
  font-family:'Cinzel',serif;}
input[type=range]{-webkit-appearance:none;flex:1;height:3px;
  background:linear-gradient(to right,var(--gold) 0%,var(--gold) var(--p,80%),
    rgba(212,160,23,.15) var(--p,80%));border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--gold);border:2px solid var(--ink);cursor:pointer;}
.layer-pills{display:flex;gap:6px;flex-wrap:wrap;}
.layer-pill{padding:4px 10px;border-radius:20px;font-size:10px;border:1px solid var(--border);
  color:var(--parchment2);cursor:pointer;transition:all .2s;background:transparent;
  font-family:'Noto Sans JP',sans-serif;}
.layer-pill.on{background:rgba(212,160,23,.15);border-color:var(--gold);color:var(--gold-l);}

/* 横スクロールチップ（sheet-mid時表示） */
#chip-scroll{display:flex;gap:8px;padding:10px 14px;
  overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
#chip-scroll::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;display:flex;align-items:center;gap:7px;
  padding:6px 12px;border-radius:20px;border:1px solid var(--border);
  background:rgba(212,160,23,.04);cursor:pointer;transition:all .25s;}
.chip.active{background:rgba(212,160,23,.18);border-color:var(--gold);}
.chip:active{transform:scale(.96);}
.chip-emoji{font-size:14px;}
.chip-info{display:flex;flex-direction:column;}
.chip-name{font-size:11px;color:var(--parchment);white-space:nowrap;}
.chip-era{font-size:9px;color:var(--sepia);white-space:nowrap;}
.chip-lock{font-size:10px;color:var(--sepia);margin-left:2px;}

/* 地図ブラウザ（sheet-max時表示） */
#browser{flex:1;overflow-y:auto;padding:0 14px 14px;scrollbar-width:thin;
  scrollbar-color:rgba(212,160,23,.2) transparent;}

/* カテゴリタブ */
.cat-tabs{display:flex;gap:0;border-bottom:1px solid rgba(212,160,23,.15);
  margin-bottom:14px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;padding:8px 14px;font-size:11px;color:var(--sepia);
  border:none;background:transparent;cursor:pointer;transition:all .2s;
  border-bottom:2px solid transparent;white-space:nowrap;
  font-family:'Noto Sans JP',sans-serif;}
.cat-tab.active{color:var(--gold-l);border-bottom-color:var(--gold);}

/* ティアセクション */
.tier-section{margin-bottom:18px;}
.tier-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.tier-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-family:'Cinzel',serif;}
.tier-badge.std{background:rgba(52,152,219,.15);color:#5dade2;
  border:1px solid rgba(52,152,219,.3);}
.tier-badge.com{background:rgba(212,160,23,.12);color:var(--gold);
  border:1px solid rgba(212,160,23,.25);}
.tier-label{font-size:11px;color:var(--parchment2);letter-spacing:.1em;}

/* 地図カード（ブラウザ内） */
.map-cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.map-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;
  cursor:pointer;transition:all .25s;background:rgba(212,160,23,.03);}
.map-card.active{border-color:var(--gold);box-shadow:0 0 10px rgba(212,160,23,.2);}
.map-card:active{transform:scale(.97);}
.mc-thumb{width:100%;height:72px;object-fit:cover;display:block;filter:sepia(.3);}
.mc-thumb-placeholder{width:100%;height:72px;display:flex;align-items:center;
  justify-content:center;font-size:24px;
  background:linear-gradient(135deg,#2a1f0a,#1a1008);
  border-bottom:1px solid rgba(212,160,23,.08);}
.mc-body{padding:8px;}
.mc-name{font-size:11px;color:var(--parchment);line-height:1.4;margin-bottom:3px;}
.mc-era{font-size:9px;color:var(--sepia);font-family:'Cinzel',serif;}
.mc-badges{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;}
.mc-badge{font-size:8px;padding:1px 5px;border-radius:3px;}
.mc-badge.std{background:rgba(52,152,219,.1);color:#5dade2;
  border:1px solid rgba(52,152,219,.2);}
.mc-badge.free{background:rgba(46,204,113,.1);color:#2ecc71;
  border:1px solid rgba(46,204,113,.2);}
.mc-badge.paid{background:rgba(212,160,23,.1);color:var(--gold);
  border:1px solid rgba(212,160,23,.2);}
.mc-badge.new{background:rgba(231,76,60,.1);color:#e74c3c;
  border:1px solid rgba(231,76,60,.2);}
.mc-badge.verified{background:rgba(46,204,113,.1);color:#2ecc71;
  border:1px solid rgba(46,204,113,.2);}
.mc-lock{position:absolute;top:6px;right:6px;font-size:14px;}

/* skeleton */
.skeleton{height:140px;border-radius:8px;
  background:linear-gradient(90deg,rgba(212,160,23,.04) 25%,rgba(212,160,23,.08) 50%,rgba(212,160,23,.04) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* 地図なし状態 */
.empty-msg{font-size:12px;color:var(--sepia);text-align:center;
  padding:24px 0;line-height:1.8;}
.empty-msg a{color:var(--gold);text-decoration:none;}

/* 地図作成リンク */
.create-bar{margin-top:8px;padding:12px;
  border:1px dashed rgba(212,160,23,.2);border-radius:6px;
  text-align:center;cursor:pointer;transition:all .2s;}
.create-bar:hover{border-color:var(--gold);background:rgba(212,160,23,.04);}
.create-bar a{font-size:11px;color:var(--sepia);text-decoration:none;
  letter-spacing:.1em;}
.create-bar:hover a{color:var(--gold);}

/* POPUP */
.im-popup .leaflet-popup-content-wrapper{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--parchment);backdrop-filter:blur(10px);}
.im-popup .leaflet-popup-tip{background:var(--surface);}
.popup-name{font-family:'Cinzel',serif;font-size:13px;color:var(--gold-l);margin-bottom:3px;}
.popup-era{font-size:9px;color:var(--sepia);margin-bottom:6px;letter-spacing:.08em;}
.popup-desc{font-size:11px;color:var(--parchment2);line-height:1.6;}
.popup-now{font-size:10px;color:var(--blue);margin-top:6px;}

/* GPS */
.gps-dot{width:12px;height:12px;border-radius:50%;background:#4a9fff;
  border:2px solid white;position:absolute;top:2px;left:2px;}
.gps-ring{width:32px;height:32px;border-radius:50%;
  border:2px solid rgba(74,159,255,.4);
  position:absolute;top:-8px;left:-8px;animation:gpsRing 2s ease-out infinite;}
@keyframes gpsRing{0%{transform:scale(.5);opacity:.8}100%{transform:scale(2);opacity:0}}

/* TOAST */
#toast{position:fixed;top:max(60px,calc(env(safe-area-inset-top)+46px));
  left:50%;transform:translateX(-50%) translateY(-8px);z-index:50;
  background:var(--surface);border:1px solid var(--border);
  padding:9px 18px;border-radius:4px;font-size:11px;color:var(--parchment);
  letter-spacing:.08em;opacity:0;pointer-events:none;transition:all .3s;
  white-space:nowrap;backdrop-filter:blur(10px);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* LOADING */
#loading{position:fixed;inset:0;z-index:90;background:var(--ink);
  display:flex;align-items:center;justify-content:center;transition:opacity .5s;}
#loading.hidden{opacity:0;pointer-events:none;}
.loader{width:44px;height:44px;border-radius:50%;
  border:2px solid rgba(212,160,23,.1);border-top-color:var(--gold);
  animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.leaflet-control-zoom,.leaflet-control-attribution{display:none!important;}
</style>
</head>
<body>

<div id="loading"><div class="loader"></div></div>

<div id="splash">
  <div class="splash-ring">🗺</div>
  <div class="splash-logo">ImmersaMap</div>
  <div class="splash-sub">時を超える地図体験</div>
  <button class="splash-start" id="btn-start">探索を始める</button>
  <a href="./create.html" class="splash-creator">✏️ 地図クリエイターはこちら</a>
</div>

<div id="map"></div>
<div id="grain"></div>

<div id="hud">
  <div class="hud-left">
    <div class="hud-logo">ImmersaMap</div>
    <div class="hud-map-name" id="hud-map-name">現代地図</div>
  </div>
  <div class="hud-right">
    <button class="hud-btn" id="btn-gps" aria-label="現在地">📍</button>
    <button class="hud-btn" id="btn-north" aria-label="北向き">🔺</button>
  </div>
</div>

<div id="compass" aria-label="コンパス">
  <div class="c-ring"></div>
  <div class="c-needle" id="compass-needle">
    <div class="c-n"></div>
    <div class="c-s"></div>
  </div>
  <span class="c-label">N</span>
</div>

<div id="time-bar">
  <div class="time-era" id="time-era">—</div>
  <div class="time-name" id="time-name">—</div>
</div>

<div id="swipe-hint">← 左右スワイプで時代を切替 →</div>

<!-- BOTTOM SHEET -->
<div id="sheet">
  <div class="sheet-handle" id="sheet-handle">
    <div class="sheet-bar"></div>
  </div>
  <div class="sheet-inner">

    <!-- コントロールパネル（mid以上で表示） -->
    <div id="ctrl-panel">
      <div class="ctrl-now">
        <div>
          <div class="ctrl-now-name" id="ctrl-name">地図を選んでください</div>
          <div class="ctrl-now-era" id="ctrl-era"></div>
        </div>
      </div>
      <div class="opacity-row">
        <span class="opacity-label">古地図の濃さ</span>
        <input type="range" id="opacity-slider" min="0" max="100" value="80" step="1" style="--p:80%">
        <span class="opacity-val" id="opacity-val">80%</span>
      </div>
      <div class="layer-pills" id="layer-pills"></div>
    </div>

    <!-- 横スクロールチップ -->
    <div id="chip-scroll"></div>

    <!-- 地図ブラウザ -->
    <div id="browser">
      <!-- カテゴリタブ -->
      <div class="cat-tabs" id="cat-tabs">
        <button class="cat-tab active" data-cat="all">すべて</button>
        <button class="cat-tab" data-cat="historical">🏯 歴史</button>
        <button class="cat-tab" data-cat="story">📖 人物・物語</button>
        <button class="cat-tab" data-cat="aerial">✈️ 空中写真</button>
        <button class="cat-tab" data-cat="fictional">🐉 架空・創作</button>
        <button class="cat-tab" data-cat="themed">🌸 テーマ</button>
      </div>

      <!-- Standard -->
      <div class="tier-section" id="section-standard">
        <div class="tier-head">
          <span class="tier-badge std">Standard</span>
          <span class="tier-label">公式・品質保証</span>
        </div>
        <div class="map-cards-grid" id="cards-std">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>
      </div>

      <!-- Community -->
      <div class="tier-section" id="section-community">
        <div class="tier-head">
          <span class="tier-badge com">Community</span>
          <span class="tier-label">ユーザー作成</span>
        </div>
        <div class="map-cards-grid" id="cards-com">
          <div class="skeleton"></div>
        </div>
      </div>

      <div class="create-bar">
        <a href="./create.html">✏️ 地図を作って公開する →</a>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://kgafuinoddiapaaljkkw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0zOqrbsnXgdurLgfGp3fsQ_wBsCjFs3';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      geometry:{type:'LineString',coordinates:[[139.482216,35.915654],[139.482988,35.917865],[139.483759,35.920077],[139.484273,35.921349],[139.484787,35.922773],[139.485147,35.923754]]}},
    {type:'Feature',properties:{name:'一番街（蔵造り）',layer:'roads',type:'主要道路',description:'現在の川越一番街の原型。江戸時代から続く商人街。',era:'江戸時代'},

const S = {

  opacity:.8,

// ============================================================
// MAP INIT
// ============================================================
function initMap() {
  S.map = L.map('map',{center:[35.6812,139.7671],zoom:14,
    zoomControl:false,attributionControl:false,preferCanvas:true});
  S.base = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {maxZoom:19,zIndex:1}).addTo(S.map);
  setTimeout(()=>document.getElementById('loading').classList.add('hidden'),700);
}

// ============================================================
// 地図を読み込む（ベクター or タイル）
// ============================================================
function loadMap(def) {
  // 既存クリア
  if (S.overlay) { S.map.removeLayer(S.overlay); S.overlay=null; }
  Object.values(S.vectorGroups).forEach(g=>S.map.removeLayer(g));
  S.vectorGroups = {};

  S.activeMapId = def.id;
  S.activeDef   = def;

  const name = def.name;
  const era  = def.era || def.description || '';

  // HUD更新
  document.getElementById('hud-map-name').textContent = name;
  document.getElementById('ctrl-name').textContent    = name;
  document.getElementById('ctrl-era').textContent     = era;
  document.getElementById('time-name').textContent    = name;
  document.getElementById('time-era').textContent     = era;
  document.getElementById('time-bar').classList.add('visible');

  // チップのアクティブ状態
  document.querySelectorAll('.chip').forEach(c=>
    c.classList.toggle('active', c.dataset.id===def.id));
  document.querySelectorAll('.map-card').forEach(c=>
    c.classList.toggle('active', c.dataset.id===def.id));

  // 川越ベクター地図
  if (def.id === 'standard-kawagoe-edo') {
    loadVectorMap(KAWAGOE_GEOJSON, def);
    showToast('川越城下絵図を表示中');
  // 龍馬ベクター地図
  } else if (def.id === 'standard-ryoma-kyoto') {
    loadVectorMap(RYOMA_GEOJSON, def);
    showToast('坂本龍馬ゆかりの地を表示中');
  } else if (def.tiles_url) {
    // タイル地図
    S.overlay = L.tileLayer(def.tiles_url, {
      opacity:S.opacity, zIndex:2,
      minZoom:def.zoom_min||2, maxZoom:def.zoom_max||18,
    }).addTo(S.map);
    buildLayerPills([]);
    showToast(name);
  } else {
    buildLayerPills([]);
    showToast('現代地図のみ表示');
  }

  const lat = def.center_lat, lng = def.center_lng;
  if (lat&&lng) S.map.flyTo([lat,lng],def.zoom_default||15,{duration:1.2});
}

// ============================================================
// ベクターレイヤー描画
// ============================================================
function loadVectorMap(geojson, def) {
  const layerNames = [];
  geojson.features.forEach(f=>{
    const p = f.properties;
    const layer = p.layer;
    if (!S.vectorGroups[layer]) {
      S.vectorGroups[layer] = L.layerGroup().addTo(S.map);
      layerNames.push(layer);
    }
    const g = S.vectorGroups[layer];

    if (f.geometry.type === 'LineString') {
      const coords = f.geometry.coordinates.map(c=>[c[1],c[0]]);
      const style  = layer==='rivers' ? LAYER_STYLES.rivers
        : (LAYER_STYLES.roads[p.type]||LAYER_STYLES.roads.default);
      L.polyline(coords, {...style, opacity:S.opacity})
        .bindPopup(makePopup(p),{className:'im-popup'}).addTo(g);

    } else if (f.geometry.type === 'Polygon') {
      const coords = f.geometry.coordinates[0].map(c=>[c[1],c[0]]);
      const style  = LAYER_STYLES.boundaries[p.type]||LAYER_STYLES.boundaries.default;
      L.polygon(coords, {...style, opacity:S.opacity})
        .bindPopup(makePopup(p),{className:'im-popup'}).addTo(g);

    } else if (f.geometry.type === 'Point') {
      const ll    = [f.geometry.coordinates[1],f.geometry.coordinates[0]];
      const style = LAYER_STYLES.places[p.type]||LAYER_STYLES.places.default;
      const m = L.circleMarker(ll,style)
        .bindPopup(makePopup(p),{className:'im-popup'}).addTo(g);
      m.bindTooltip(p.name,{permanent:true,direction:'top',className:'',offset:[0,-8]});
    }
  });
  buildLayerPills([...new Set(geojson.features.map(f=>f.properties.layer))]);
}

function makePopup(p) {
  return `<div class="popup-name">${p.name}</div>
    <div class="popup-era">${p.era||''} ${p.type?'· '+p.type:''}</div>
    <div class="popup-desc">${p.description||''}</div>
    ${p.now?`<div class="popup-now">📍 現在：${p.now}</div>`:''}`;
}

// ============================================================
// レイヤーピル
// ============================================================
const LAYER_LABELS = {roads:'道路・ルート',rivers:'河川',boundaries:'城郭・境界',places:'史跡・地名'};
function buildLayerPills(layers) {
  const el = document.getElementById('layer-pills');
  el.innerHTML = '';
  layers.forEach(name=>{
    const btn = document.createElement('button');
    btn.className = 'layer-pill on';
    btn.textContent = LAYER_LABELS[name]||name;
    btn.dataset.layer = name;
    btn.addEventListener('click', ()=>{
      const on = btn.classList.toggle('on');
      const g  = S.vectorGroups[name];
      if (!g) return;
      if (on) S.map.addLayer(g); else S.map.removeLayer(g);
    });
    el.appendChild(btn);
  });
}

// ============================================================
// チップ生成
// ============================================================
function buildChips(maps) {
  const c = document.getElementById('chip-scroll');
  c.innerHTML = '';

  // 「なし」チップ
  const none = mkChip({id:'none',name:'現代地図',era:'Modern',emoji:'🌍'}, false);
  none.addEventListener('click',()=>{
    clearOverlay();
    document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    none.classList.add('active');
    document.getElementById('hud-map-name').textContent='現代地図';
    document.getElementById('time-bar').classList.remove('visible');
  });
  c.appendChild(none);

  maps.slice(0,10).forEach(def=>{
    const chip = mkChip(def, def.price>0);
    chip.addEventListener('click',()=>{ loadMap(def); closeSheet(); });
    c.appendChild(chip);
  });

  // 地図追加ボタン
  const add = document.createElement('div');
  add.className = 'chip';
  add.innerHTML = `<span class="chip-emoji">➕</span><div class="chip-info"><span class="chip-name">地図を追加</span></div>`;
  add.addEventListener('click',()=>{ openSheet('max'); });
  c.appendChild(add);
}

function mkChip(def, locked) {
  const el = document.createElement('div');
  el.className = 'chip' + (def.id==='none'?' active':'');
  el.dataset.id = def.id;
  el.innerHTML = `
    <span class="chip-emoji">${def.emoji||'🗺'}</span>
    <div class="chip-info">
      <span class="chip-name">${def.name}</span>
      <span class="chip-era">${def.era||''}</span>
    </div>
    ${locked?`<span class="chip-lock">🔒</span>`:''}`;
  return el;
}

// ============================================================
// 地図カード（ブラウザ）
// ============================================================
function buildCards(maps, cat) {
  const std = maps.filter(m=>m.tier==='standard'&&(cat==='all'||m.category===cat||((cat==='fictional')&&['fiction','original','fictional'].includes(m.category))));
  const com = maps.filter(m=>m.tier!=='standard'&&(cat==='all'||m.category===cat||((cat==='fictional')&&['fiction','original','fictional'].includes(m.category))));

  buildCardSection('cards-std', std);
  buildCardSection('cards-com', com);

  document.getElementById('section-community').style.display = com.length ? '' : 'none';
}

function buildCardSection(elId, maps) {
  const c = document.getElementById(elId);
  c.innerHTML = '';
  if (!maps.length) {
    c.innerHTML = '<div class="empty-msg">地図がありません</div>';
    return;
  }
  maps.forEach(def=>{
    const card = document.createElement('div');
    card.className = 'map-card' + (def.id===S.activeMapId?' active':'');
    card.dataset.id = def.id;
    card.style.position = 'relative';

    const thumb = def.thumbnail_url
      ? `<img class="mc-thumb" src="${def.thumbnail_url}" alt="${def.name}" loading="lazy">`
      : `<div class="mc-thumb-placeholder">${def.emoji||'🗺'}</div>`;

    const isNew = def.created_at && (Date.now()-new Date(def.created_at))<7*86400000;
    let badges = def.is_standard
      ? `<span class="mc-badge std">公式</span>`
      : (def.price===0
        ? `<span class="mc-badge free">Free</span>`
        : `<span class="mc-badge paid">¥${def.price}</span>`);
    if (def.is_verified) badges += `<span class="mc-badge verified">認証済</span>`;
    if (isNew) badges += `<span class="mc-badge new">New</span>`;
    if (def.price>0) card.innerHTML += `<span class="mc-lock">🔒</span>`;

    card.innerHTML = `
      ${thumb}
      <div class="mc-body">
        <div class="mc-name">${def.name}</div>
        <div class="mc-era">${def.era||def.description||''}</div>
        <div class="mc-badges">${badges}</div>
      </div>`;

    card.addEventListener('click',()=>{ loadMap(def); closeSheet(); });
    c.appendChild(card);
  });
}

// ============================================================
// Supabaseからデータ取得
// ============================================================
async function fetchMaps() {
  try {
    const {data,error} = await db.from('maps').select('*')
      .eq('is_public',true).order('tier').order('created_at',{ascending:false});
    if (error) throw error;
    S.allMaps = data || [];
    buildChips(S.allMaps);
    buildCards(S.allMaps, S.currentCat);
  } catch(e) {
    document.getElementById('cards-std').innerHTML =
      `<div class="empty-msg">読み込みエラー<br>${e.message}</div>`;
  }
}

// ============================================================
// シートの開閉（3段階スナップ）
// ============================================================
const SHEET_HEIGHTS = {min:'28px', mid:'200px', max:'68vh'};

function openSheet(state) {
  S.sheetState = state;
  const el = document.getElementById('sheet');
  el.style.height = SHEET_HEIGHTS[state];
}
function closeSheet() { openSheet('mid'); }
function toggleSheet() {
  if (S.sheetState==='min') openSheet('mid');
  else if (S.sheetState==='mid') openSheet('max');
  else openSheet('min');
}

// ============================================================
// タイムスワイプ（左右スワイプで過去↔現在）
// ============================================================
function initSwipe() {
  const mapEl = document.getElementById('map');
  let startX = null, startY = null;

  const onStart = e => {
    if (S.sheetState !== 'min') return;
    startX = (e.touches?.[0]||e).clientX;
    startY = (e.touches?.[0]||e).clientY;
  };
  const onEnd = e => {
    if (startX===null) return;
    const dx = (e.changedTouches?.[0]||e).clientX - startX;
    const dy = (e.changedTouches?.[0]||e).clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      if (!S.activeDef) { startX=null; return; }
      S.swipeOverlay = S.swipeOverlay===0 ? 1 : 0;
      const hint = document.getElementById('swipe-hint');
      hint.textContent = S.swipeOverlay===0
        ? `← ${S.activeDef.era}` : '← 現代地図';
      hint.classList.add('show');
      setTimeout(()=>hint.classList.remove('show'), 1800);

      // フェードで切替
      if (S.overlay) {
        S.overlay.setOpacity(S.swipeOverlay===0 ? S.opacity : 0);
      }
      Object.values(S.vectorGroups).forEach(g=>{
        g.eachLayer(l=>l.setStyle&&l.setStyle({opacity:S.swipeOverlay===0?S.opacity:0,fillOpacity:S.swipeOverlay===0?.8:0}));
      });
    }
    startX = null;
  };

  mapEl.addEventListener('touchstart', onStart, {passive:true});
  mapEl.addEventListener('touchend',   onEnd,   {passive:true});
}

// ============================================================
// オーバーレイをクリア
// ============================================================
function clearOverlay() {
  if (S.overlay) { S.map.removeLayer(S.overlay); S.overlay=null; }
  Object.values(S.vectorGroups).forEach(g=>S.map.removeLayer(g));
  S.vectorGroups = {};
  document.getElementById('layer-pills').innerHTML = '';
  document.getElementById('ctrl-name').textContent = '地図を選んでください';
  document.getElementById('ctrl-era').textContent  = '';
  document.getElementById('time-bar').classList.remove('visible');
  S.activeMapId = null; S.activeDef = null;
}

// ============================================================
// 不透明度
// ============================================================
function initOpacitySlider() {
  const sl = document.getElementById('opacity-slider');
  sl.addEventListener('input', ()=>{
    const v = parseInt(sl.value);
    sl.style.setProperty('--p', v+'%');
    document.getElementById('opacity-val').textContent = v+'%';
    S.opacity = v/100;
    if (S.overlay) S.overlay.setOpacity(S.opacity);
    Object.values(S.vectorGroups).forEach(g=>{
      g.eachLayer(l=>l.setStyle&&l.setStyle({opacity:S.opacity,fillOpacity:S.opacity*.8}));
    });
  });
}

// GPS

function startGPS() {
  const btn = document.getElementById('btn-gps');
  btn.classList.add('locating');
  const fb = ()=>{ placeMarker(35.6812,139.7671); showToast('デモ位置を表示'); };
  if (!navigator.geolocation) { btn.style.opacity='.4'; fb(); return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    btn.classList.remove('locating');
    placeMarker(pos.coords.latitude, pos.coords.longitude);
    S.map.flyTo([pos.coords.latitude,pos.coords.longitude],16,{duration:1.5});
    showToast('現在地を表示中');
  }, ()=>{ btn.classList.remove('locating'); fb(); },{enableHighAccuracy:true,timeout:8000});
  if (S.watchId) navigator.geolocation.clearWatch(S.watchId);
  S.watchId = navigator.geolocation.watchPosition(
    pos=>placeMarker(pos.coords.latitude,pos.coords.longitude));
}

function placeMarker(lat,lng) {
  const icon = L.divIcon({className:'',
    html:`<div style="position:relative;width:16px;height:16px;">
      <div class="gps-dot"></div><div class="gps-ring"></div></div>`,
    iconSize:[32,32],iconAnchor:[16,16]});
  if (S.gpsMarker) S.gpsMarker.setLatLng([lat,lng]);
  else S.gpsMarker = L.marker([lat,lng],{icon,zIndexOffset:9999}).addTo(S.map);
}

// ============================================================
// コンパス
// ============================================================
function initCompass() {
  const needle = document.getElementById('compass-needle');
  const h = e => needle.style.transform =
    `rotate(${e.webkitCompassHeading!=null?e.webkitCompassHeading:360-(e.alpha??0)}deg)`;
  if (typeof DeviceOrientationEvent!=='undefined') {
    if (typeof DeviceOrientationEvent.requestPermission==='function')
      document.getElementById('compass').addEventListener('click',()=>
        DeviceOrientationEvent.requestPermission().then(r=>r==='granted'&&window.addEventListener('deviceorientation',h)));
    else window.addEventListener('deviceorientation',h);
  }
}

// ============================================================
// カテゴリタブ
// ============================================================
function initCatTabs() {
  document.getElementById('cat-tabs').addEventListener('click', e=>{
    const tab = e.target.closest('.cat-tab');
    if (!tab) return;
    document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    S.currentCat = tab.dataset.cat;
    buildCards(S.allMaps, S.currentCat);
  });
}

// ============================================================
// トースト
// ============================================================
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(()=>t.classList.remove('show'),2800);
}

// ============================================================
// シートスワイプ（上下）
// ============================================================
function initSheetGesture() {
  const handle = document.getElementById('sheet-handle');
  let sy=null;
  handle.addEventListener('touchstart',e=>{sy=(e.touches[0]).clientY;},{passive:true});
  handle.addEventListener('touchend',e=>{
    if (sy===null) return;
    const dy = sy - e.changedTouches[0].clientY;
    if (dy>30) openSheet(S.sheetState==='min'?'mid':'max');
    else if (dy<-30) openSheet(S.sheetState==='max'?'mid':'min');
    sy=null;
  },{passive:true});
  handle.addEventListener('click', toggleSheet);
}

// ============================================================
// BOOT
// ============================================================
document.addEventListener('DOMContentLoaded',()=>{
  initMap();
  initOpacitySlider();
  initCompass();
  initSwipe();
  initSheetGesture();
  initCatTabs();
  fetchMaps();

  document.getElementById('btn-start').addEventListener('click',()=>{
    document.getElementById('splash').classList.add('hidden');
    openSheet('mid');
    // 最初の地図を自動ロード（川越）
    setTimeout(()=>{
      if (S.allMaps.length) {
        const kawagoe = S.allMaps.find(m=>m.id==='standard-kawagoe-edo');
        if (kawagoe) loadMap(kawagoe);
      }
    }, 800);
  });

  document.getElementById('btn-gps').addEventListener('click',startGPS);
  document.getElementById('btn-north').addEventListener('click',()=>{
    document.getElementById('compass-needle').style.transform='rotate(0deg)';
    showToast('北向きにリセット');
  });

  // 地図タップでシートを閉じる
  document.getElementById('map').addEventListener('click',()=>{
    if (S.sheetState!=='min') openSheet('min');
  });

  // スワイプヒントを最初に表示
  setTimeout(()=>{
    const h = document.getElementById('swipe-hint');
    h.textContent='← 左右スワイプで過去↔現在を切替 →';
    h.classList.add('show');
    setTimeout(()=>h.classList.remove('show'),3000);
  }, 3000);
});
</script>
