<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ImmersaMap — 時を超える地図体験</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1a1008; --ink2:#221408;
  --parchment:#f2e8d0; --parchment2:#e8d8b0;
  --sepia:#8b6914; --gold:#d4a017; --gold-l:#f0c040;
  --rust:#c0392b; --blue:#3498db;
  --surface:rgba(22,14,4,0.93);
  --border:rgba(212,160,23,0.28);
  --sidebar-w:290px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box;
  -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden;
  font-family:'Noto Sans JP',sans-serif;
  background:var(--ink); color:var(--parchment); }

/* ── MAP ── */
#map { position:fixed; inset:0; z-index:1; }

/* ── SPLASH ── */
#splash { position:fixed; inset:0; z-index:200; background:var(--ink);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity .8s, visibility .8s; }
#splash.hidden { opacity:0; visibility:hidden; pointer-events:none; }
.sp-ring { width:72px; height:72px; border-radius:50%; border:1.5px solid var(--gold);
  display:flex; align-items:center; justify-content:center; font-size:28px;
  margin-bottom:22px; animation:pulseRing 3s ease-in-out infinite; }
@keyframes pulseRing { 0%,100%{box-shadow:0 0 0 0 rgba(212,160,23,.3);}
  50%{box-shadow:0 0 0 18px rgba(212,160,23,0);} }
.sp-logo { font-family:'Cinzel',serif; font-size:clamp(26px,6vw,40px);
  letter-spacing:.14em; color:var(--gold-l); margin-bottom:6px; }
.sp-sub  { font-size:12px; color:var(--sepia); letter-spacing:.22em; margin-bottom:44px; }
.sp-btn  { padding:13px 44px; border:1.5px solid var(--gold); border-radius:2px;
  background:transparent; color:var(--gold-l); font-family:'Cinzel',serif;
  font-size:13px; letter-spacing:.2em; cursor:pointer; transition:background .3s;
  text-transform:uppercase; }
.sp-btn:hover { background:rgba(212,160,23,.1); }
.sp-link { margin-top:18px; font-size:11px; color:var(--sepia); text-decoration:none;
  border-bottom:1px solid rgba(139,105,20,.25); padding-bottom:1px;
  letter-spacing:.1em; transition:color .2s; }
.sp-link:hover { color:var(--gold); }

/* ═══════════════════════════════════════════════
   PC レイアウト（768px以上）
   左サイドバー固定、地図が右側
   ═══════════════════════════════════════════════ */
#sidebar {
  position:fixed; top:0; left:0; bottom:0; z-index:20;
  width:var(--sidebar-w); background:var(--ink2);
  border-right:1px solid var(--border);
  display:none; flex-direction:column;
}
.sb-head { padding:14px 16px 10px; border-bottom:1px solid var(--border);
  flex-shrink:0; }
.sb-logo { font-family:'Cinzel',serif; font-size:16px;
  letter-spacing:.14em; color:var(--gold-l); margin-bottom:10px; }

/* 住所検索（PC） */
.sb-search { position:relative; margin-bottom:0; }
.sb-search-input {
  width:100%; background:rgba(255,255,255,.06);
  border:1px solid var(--border); border-radius:4px;
  padding:8px 34px 8px 10px; color:var(--parchment);
  font-size:12px; font-family:'Noto Sans JP',sans-serif;
  outline:none; transition:border-color .2s;
}
.sb-search-input::placeholder { color:var(--sepia); }
.sb-search-input:focus { border-color:var(--gold); }
.sb-search-btn {
  position:absolute; right:6px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--sepia); cursor:pointer;
  font-size:16px; padding:2px; transition:color .2s;
}
.sb-search-btn:hover { color:var(--gold); }
.sb-search-results {
  position:absolute; top:100%; left:0; right:0; z-index:100;
  background:var(--ink2); border:1px solid var(--border);
  border-top:none; border-radius:0 0 4px 4px;
  max-height:200px; overflow-y:auto; display:none;
}
.sb-search-result-item {
  padding:8px 12px; font-size:11px; color:var(--parchment2);
  cursor:pointer; border-bottom:1px solid rgba(212,160,23,.1);
  transition:background .15s; line-height:1.4;
}
.sb-search-result-item:hover { background:rgba(212,160,23,.1); color:var(--gold-l); }
.sb-search-result-item:last-child { border-bottom:none; }

/* カテゴリタブ */
.sb-cats { display:flex; overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid var(--border); flex-shrink:0; }
.sb-cats::-webkit-scrollbar { display:none; }
.sb-cat { flex-shrink:0; padding:8px 11px; font-size:10px;
  color:var(--sepia); background:transparent; border:none;
  border-bottom:2px solid transparent; cursor:pointer;
  white-space:nowrap; transition:all .2s;
  font-family:'Noto Sans JP',sans-serif; }
.sb-cat.active { color:var(--gold-l); border-bottom-color:var(--gold); }

/* 地図リスト */
.sb-list { flex:1; overflow-y:auto; padding:6px 0;
  scrollbar-width:thin; scrollbar-color:rgba(212,160,23,.2) transparent; }
.sb-tier { font-size:9px; color:var(--sepia); letter-spacing:.18em;
  text-transform:uppercase; padding:8px 16px 4px; }
.sb-item { display:flex; align-items:center; gap:10px;
  padding:8px 16px; cursor:pointer; transition:all .2s;
  border-left:2px solid transparent; }
.sb-item:hover { background:rgba(212,160,23,.06); }
.sb-item.active { background:rgba(212,160,23,.12); border-left-color:var(--gold); }
.sb-item-emoji { font-size:17px; flex-shrink:0; width:22px; text-align:center; }
.sb-item-info  { flex:1; min-width:0; }
.sb-item-name  { font-size:12px; color:var(--parchment);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-item-era   { font-size:10px; color:var(--sepia); margin-top:1px; }
.sbdiv { border:none; border-top:1px solid rgba(212,160,23,.1); margin:4px 16px; }

/* コントロールパネル */
.sb-ctrl { border-top:1px solid var(--border); padding:12px 16px; flex-shrink:0; }
.sb-ctrl-hd { font-size:10px; color:var(--sepia); letter-spacing:.12em;
  text-transform:uppercase; margin-bottom:8px; }
.sb-now-name { font-size:12px; color:var(--gold-l); font-family:'Cinzel',serif;
  margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-now-era  { font-size:10px; color:var(--sepia); margin-bottom:10px; }
.sb-aerial-note { font-size:10px; color:rgba(212,160,23,.6);
  margin-bottom:8px; line-height:1.5; display:none; }

/* スライダー共通 */
.ctrl-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.ctrl-lbl { font-size:10px; color:var(--sepia); white-space:nowrap; width:56px; }
.ctrl-val { font-size:11px; color:var(--gold); min-width:30px; text-align:right;
  font-family:'Cinzel',serif; }
input[type=range] {
  -webkit-appearance:none; flex:1; height:3px;
  background:linear-gradient(to right, var(--gold) 0%, var(--gold) var(--p,80%),
    rgba(212,160,23,.15) var(--p,80%));
  border-radius:2px; outline:none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
  background:var(--gold); border:2px solid var(--ink); cursor:pointer;
}
.layer-pills { display:flex; gap:5px; flex-wrap:wrap; }
.lpill { padding:3px 9px; border-radius:20px; font-size:10px;
  border:1px solid var(--border); color:var(--parchment2);
  cursor:pointer; transition:all .2s; background:transparent;
  font-family:'Noto Sans JP',sans-serif; }
.lpill.on { background:rgba(212,160,23,.14); border-color:var(--gold); color:var(--gold-l); }

.sb-create { display:block; text-align:center; padding:9px;
  border:1px dashed rgba(212,160,23,.2); border-radius:4px;
  font-size:11px; color:var(--sepia); text-decoration:none;
  margin:0 16px 12px; transition:all .2s; letter-spacing:.08em; }
.sb-create:hover { border-color:var(--gold); color:var(--gold);
  background:rgba(212,160,23,.04); }

/* ═══════════════════════════════════════════════
   スマホ レイアウト（767px以下）
   HUD上部 + ボトムシート
   ═══════════════════════════════════════════════ */
/* スマホHUD — ロゴ左、ボタン群右 */
#sp-hud {
  display:none;
  position:fixed; top:0; left:0; right:0; z-index:20;
  padding:max(12px,env(safe-area-inset-top)) 12px 10px;
  background:linear-gradient(to bottom,rgba(18,12,4,.92),transparent);
  align-items:flex-start; justify-content:space-between;
  pointer-events:none;
}
.sp-hud-left { pointer-events:none; }
.sp-hud-logo { font-family:'Cinzel',serif; font-size:15px;
  letter-spacing:.13em; color:var(--gold-l); }
.sp-hud-map  { font-size:10px; color:var(--sepia); margin-top:1px;
  max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
/* HUDの右側はコンパスが来るので空欄 */

/* スマホ用FABボタン群 — 右端縦列 */
#sp-fabs {
  display:none;
  position:fixed; right:12px; z-index:20;
  flex-direction:column; gap:8px;
  top:max(60px,calc(env(safe-area-inset-top)+46px));
}
.sp-fab {
  width:40px; height:40px; border-radius:6px;
  border:1px solid var(--border); background:var(--surface);
  backdrop-filter:blur(8px); color:var(--parchment);
  font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.sp-fab:active { transform:scale(.92); background:rgba(212,160,23,.15); }
/* コンパスはFABの上に同じ右端列 */
#compass {
  position:fixed; right:12px; z-index:20;
  width:40px; height:40px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
.c-ring { position:absolute; inset:0; border-radius:50%;
  border:1px solid rgba(212,160,23,.3);
  background:var(--surface); backdrop-filter:blur(8px); }
.c-needle { position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center;
  transition:transform .25s; }
.c-n { width:0; height:0; border-left:4px solid transparent;
  border-right:4px solid transparent; border-bottom:13px solid var(--rust); }
.c-s { width:0; height:0; border-left:4px solid transparent;
  border-right:4px solid transparent; border-top:13px solid rgba(212,160,23,.4); }
.c-lbl { position:absolute; top:3px; font-family:'Cinzel',serif;
  font-size:7px; color:var(--rust); font-weight:600; }

/* スマホ用住所検索バー */
#sp-search-bar {
  display:none;
  position:fixed; top:0; left:0; right:0; z-index:30;
  padding:max(10px,env(safe-area-inset-top)) 12px 10px;
  background:var(--surface); border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.sp-search-inner { display:flex; gap:6px; align-items:center; }
.sp-search-input {
  flex:1; background:rgba(255,255,255,.08);
  border:1px solid var(--border); border-radius:20px;
  padding:8px 14px; color:var(--parchment); font-size:13px;
  font-family:'Noto Sans JP',sans-serif; outline:none;
  transition:border-color .2s;
}
.sp-search-input::placeholder { color:var(--sepia); }
.sp-search-input:focus { border-color:var(--gold); }
.sp-search-close {
  background:none; border:none; color:var(--sepia);
  font-size:20px; cursor:pointer; padding:4px;
}
.sp-search-results {
  margin-top:8px; background:var(--ink2);
  border:1px solid var(--border); border-radius:6px;
  max-height:200px; overflow-y:auto; display:none;
}
.sp-search-result-item {
  padding:10px 14px; font-size:12px; color:var(--parchment2);
  cursor:pointer; border-bottom:1px solid rgba(212,160,23,.1);
  transition:background .15s; line-height:1.5;
}
.sp-search-result-item:hover { background:rgba(212,160,23,.1); color:var(--gold-l); }
.sp-search-result-item:last-child { border-bottom:none; }

/* ボトムシート */
#sheet {
  display:none;
  position:fixed; left:0; right:0; bottom:0; z-index:20;
  background:var(--ink2); border-top:1px solid var(--border);
  border-radius:14px 14px 0 0;
  height:28px; /* デフォルト最小 */
  transition:height .35s cubic-bezier(.16,1,.3,1);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.sheet-handle { height:28px; display:flex; align-items:center;
  justify-content:center; cursor:pointer; flex-shrink:0; }
.sheet-bar { width:36px; height:3px; border-radius:2px;
  background:rgba(212,160,23,.3); }
.sheet-inner { height:calc(100% - 28px); overflow:hidden;
  display:flex; flex-direction:column; }

/* シート内コントロール */
.sh-ctrl { padding:0 14px 8px; flex-shrink:0;
  border-bottom:1px solid rgba(212,160,23,.1); }
.sh-now { display:flex; justify-content:space-between;
  align-items:baseline; margin-bottom:8px; }
.sh-now-name { font-size:12px; color:var(--gold-l); font-family:'Cinzel',serif; }
.sh-now-era  { font-size:10px; color:var(--sepia); }
.sh-aerial-note { font-size:10px; color:rgba(212,160,23,.6);
  margin-bottom:6px; line-height:1.5; display:none; }

/* 横スクロールチップ */
#chip-scroll { display:flex; gap:7px; padding:8px 14px;
  overflow-x:auto; scrollbar-width:none; flex-shrink:0; }
#chip-scroll::-webkit-scrollbar { display:none; }
.chip { flex-shrink:0; display:flex; align-items:center; gap:6px;
  padding:5px 11px; border-radius:20px;
  border:1px solid var(--border); background:rgba(212,160,23,.03);
  cursor:pointer; transition:all .22s; }
.chip.active { background:rgba(212,160,23,.17); border-color:var(--gold); }
.chip-emoji { font-size:13px; }
.chip-info  { display:flex; flex-direction:column; }
.chip-name  { font-size:11px; color:var(--parchment); white-space:nowrap; }
.chip-era   { font-size:9px; color:var(--sepia); }

/* シート内ブラウザ */
#sh-browser { flex:1; overflow-y:auto; padding:0 14px 14px;
  scrollbar-width:thin; scrollbar-color:rgba(212,160,23,.18) transparent; }
.sh-cats { display:flex; overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid rgba(212,160,23,.15); margin-bottom:10px; flex-shrink:0; }
.sh-cats::-webkit-scrollbar { display:none; }
.sh-cat { flex-shrink:0; padding:7px 11px; font-size:11px;
  color:var(--sepia); background:transparent; border:none;
  border-bottom:2px solid transparent; cursor:pointer;
  white-space:nowrap; transition:all .2s;
  font-family:'Noto Sans JP',sans-serif; }
.sh-cat.active { color:var(--gold-l); border-bottom-color:var(--gold); }
.sh-tier { font-size:9px; color:var(--sepia); letter-spacing:.15em;
  text-transform:uppercase; margin-bottom:6px; }
.sh-cards { display:grid; grid-template-columns:repeat(2,1fr);
  gap:7px; margin-bottom:12px; }
.sh-card { border:1px solid var(--border); border-radius:7px;
  overflow:hidden; cursor:pointer; transition:all .22s;
  background:rgba(212,160,23,.03); }
.sh-card.active { border-color:var(--gold);
  box-shadow:0 0 10px rgba(212,160,23,.18); }
.sh-card:active { transform:scale(.97); }
.sh-thumb { width:100%; height:64px; object-fit:cover;
  display:block; filter:sepia(.3); }
.sh-thumb-ph { width:100%; height:64px; display:flex; align-items:center;
  justify-content:center; font-size:22px;
  background:linear-gradient(135deg,#2a1f0a,#1a1008);
  border-bottom:1px solid rgba(212,160,23,.08); }
.sh-body { padding:7px 8px; }
.sh-name { font-size:10px; color:var(--parchment); line-height:1.4; margin-bottom:2px; }
.sh-era  { font-size:9px; color:var(--sepia); font-family:'Cinzel',serif; }
.sh-badges { display:flex; gap:3px; margin-top:3px; flex-wrap:wrap; }

/* バッジ共通 */
.bdg { font-size:8px; padding:1px 5px; border-radius:3px; }
.bdg-std  { background:rgba(52,152,219,.1); color:#5dade2;
  border:1px solid rgba(52,152,219,.2); }
.bdg-free { background:rgba(46,204,113,.1); color:#2ecc71;
  border:1px solid rgba(46,204,113,.2); }
.bdg-paid { background:rgba(212,160,23,.1); color:var(--gold);
  border:1px solid rgba(212,160,23,.2); }
.bdg-new  { background:rgba(231,76,60,.1); color:#e74c3c;
  border:1px solid rgba(231,76,60,.2); }

/* スケルトン */
.skel { height:120px; border-radius:7px;
  background:linear-gradient(90deg,rgba(212,160,23,.04) 25%,rgba(212,160,23,.08) 50%,rgba(212,160,23,.04) 75%);
  background-size:200% 100%; animation:shimmer 1.4s infinite; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ポップアップ */
.im-popup .leaflet-popup-content-wrapper {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; color:var(--parchment);
  backdrop-filter:blur(10px); min-width:180px; max-width:260px;
}
.im-popup .leaflet-popup-tip { background:var(--surface); }
.pu-name { font-family:'Cinzel',serif; font-size:13px;
  color:var(--gold-l); margin-bottom:3px; }
.pu-era  { font-size:9px; color:var(--sepia); margin-bottom:6px; letter-spacing:.08em; }
.pu-desc { font-size:11px; color:var(--parchment2); line-height:1.65; }
.pu-now  { font-size:10px; color:var(--blue); margin-top:6px;
  padding-top:6px; border-top:1px solid rgba(212,160,23,.15); }

/* GPS マーカー */
.gps-dot { width:12px; height:12px; border-radius:50%;
  background:#4a9fff; border:2px solid white; position:absolute; top:2px; left:2px; }
.gps-ring { width:30px; height:30px; border-radius:50%;
  border:2px solid rgba(74,159,255,.4); position:absolute; top:-7px; left:-7px;
  animation:gpsRing 2s ease-out infinite; }
@keyframes gpsRing { 0%{transform:scale(.5);opacity:.8} 100%{transform:scale(2.2);opacity:0} }

/* トースト */
#toast { position:fixed; top:14px; left:50%;
  transform:translateX(-50%) translateY(-6px); z-index:50;
  background:var(--surface); border:1px solid var(--border);
  padding:9px 18px; border-radius:4px; font-size:11px;
  color:var(--parchment); letter-spacing:.08em;
  opacity:0; pointer-events:none; transition:all .3s;
  white-space:nowrap; backdrop-filter:blur(10px); }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ローディング */
#loading { position:fixed; inset:0; z-index:100; background:var(--ink);
  display:flex; align-items:center; justify-content:center; transition:opacity .5s; }
#loading.hidden { opacity:0; pointer-events:none; }
.loader { width:44px; height:44px; border-radius:50%;
  border:2px solid rgba(212,160,23,.1); border-top-color:var(--gold);
  animation:spin .9s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* ライセンス表記 */
.leaflet-control-zoom { display:none !important; }
.leaflet-control-attribution {
  background:rgba(18,12,4,.75) !important;
  color:rgba(242,232,208,.65) !important;
  font-size:10px !important; backdrop-filter:blur(4px);
  border-radius:3px 0 0 0 !important;
}
.leaflet-control-attribution a { color:rgba(212,160,23,.7) !important; }

/* ═══════════════════════════════════════════════
   レスポンシブ切替
   ═══════════════════════════════════════════════ */
@media (min-width:768px) {
  #map { left:var(--sidebar-w); }
  #sidebar { display:flex; }
  #compass { top:14px; right:14px; width:44px; height:44px; }
  #sp-hud, #sheet, #sp-fabs, #sp-search-bar { display:none !important; }
}
@media (max-width:767px) {
  #map { left:0; }
  #sidebar { display:none !important; }
  #sp-hud  { display:flex; }
  #sheet   { display:flex; flex-direction:column; }
  #sp-fabs { display:flex; }
  /* コンパスはFABの上（同じ右端列の一番上） */
  #compass {
    top:max(10px,env(safe-area-inset-top));
    right:12px; width:40px; height:40px;
  }
  /* FABはコンパスの下 */
  #sp-fabs {
    top:max(58px,calc(env(safe-area-inset-top)+48px));
  }
}
</style>
</head>
<body>
<div id="loading"><div class="loader"></div></div>

<!-- スプラッシュ -->
<div id="splash">
  <div class="sp-ring">🗺</div>
  <div class="sp-logo">ImmersaMap</div>

function initMap() {
  S.map = L.map('map', {
    center:[35.6812,139.7671], zoom:14,
    zoomControl:false, attributionControl:true, preferCanvas:true,
  });
  S.map.attributionControl.setPrefix('');
  S.base = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom:19, zIndex:1,
      attribution:'<a href="https://www.openstreetmap.org/copyright" target="_blank">© OpenStreetMap</a>' }
  ).addTo(S.map);
  S.base.once('tileload', () => document.getElementById('loading').classList.add('hidden'));
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 2500);
  S.isPC = window.innerWidth >= 768;
}

// ============================================================
// 地図を選択・表示
// ============================================================
function loadMap(def) {
  // 既存オーバーレイをクリア
  if (S.overlayTile) { S.map.removeLayer(S.overlayTile); S.overlayTile = null; }
  Object.values(S.vectorGroups).forEach(g => S.map.removeLayer(g));
  S.vectorGroups = {};

  S.activeId  = def.id;
  S.activeDef = def;
  const name = def.name;
  const era  = def.era || '';

  // UI更新
  document.getElementById('pc-now-name').textContent  = name;
  document.getElementById('pc-now-era').textContent   = era;
  document.getElementById('sp-hud-map').textContent   = name;
  document.getElementById('sh-now-name').textContent  = name;
  document.getElementById('sh-now-era').textContent   = era;

  // 年度別写真の注意表示
  const isNendo = def.tiles_url && def.tiles_url.includes('nendophoto');
  document.getElementById('pc-aerial-note').style.display = isNendo ? 'block' : 'none';
  document.getElementById('sh-aerial-note').style.display = isNendo ? 'block' : 'none';

  document.querySelectorAll('.sb-item, .sh-card, .chip').forEach(el =>
    el.classList.toggle('active', el.dataset.id === def.id));

  const gj = BUILTIN_GJ[def.id];

  if (gj) {
    loadVectorLayers(gj);
    // ベクター地図：現在の表示位置を保持しつつ、初回は中心へ
    if (!S.activeId || S.activeId !== def.id) {
      S.map.flyTo([def.center_lat, def.center_lng],
        def.zoom_default || 15, { duration:1.2 });
    }
    showToast(name + ' を表示中');

  } else if (def.tiles_url) {
    const attr = def.is_standard
      ? '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">国土地理院</a>'
      : (def.attribution || '');
    S.overlayTile = L.tileLayer(def.tiles_url, {
      opacity: S.opacity, zIndex: 2,
      minZoom: def.zoom_min || 2,
      maxZoom: def.zoom_max || 18,
      attribution: attr,
    }).addTo(S.map);
    buildLayerPills([]);
    // ★ 航空写真切替時は現在の表示位置を保持（flyToしない）
    if (isNendo && S.map.getZoom() < 14) {
      S.map.setZoom(14);
      showToast(name + ' （zoom14以上で表示）');
    } else {
      showToast(name + ' を表示中');
    }

  } else {
    buildLayerPills([]);
    showToast('現代地図（OSM）を表示中');
  }
}

// ============================================================
// ベクターレイヤー描画
// ============================================================
function loadVectorLayers(gj) {
  const names = [];
  gj.features.forEach(f => {
    const p = f.properties, layer = p.layer;
    if (!layer) return;
    if (!S.vectorGroups[layer]) {
      S.vectorGroups[layer] = L.layerGroup().addTo(S.map);
      names.push(layer);
    }
    const g = S.vectorGroups[layer];

    switch (f.geometry.type) {
      case 'LineString': {
        const coords = f.geometry.coordinates.map(c => [c[1],c[0]]);
        const style  = layer === 'rivers' ? RSTYLE.rivers
          : (RSTYLE.roads[p.type] || RSTYLE.roads.default);
        L.polyline(coords, {...style, opacity:S.opacity})
          .bindPopup(mkPopup(p), {className:'im-popup'}).addTo(g);
        break;
      }
      case 'Polygon': {
        const coords = f.geometry.coordinates[0].map(c => [c[1],c[0]]);
        let st;
        if (layer==='buildings') st = RSTYLE.buildings[p.type] || RSTYLE.buildings.default;
        else if (layer==='districts') st = RSTYLE.districts[p.type] || RSTYLE.districts.default;
        else st = RSTYLE.boundaries[p.type] || RSTYLE.boundaries.default;
        L.polygon(coords, {...st, opacity:S.opacity})
          .bindPopup(mkPopup(p), {className:'im-popup'}).addTo(g);
        break;
      }
      case 'Point': {
        const ll = [f.geometry.coordinates[1], f.geometry.coordinates[0]];
        const st = RSTYLE.places[p.type] || RSTYLE.places.default;
        L.circleMarker(ll, st)
          .bindPopup(mkPopup(p), {className:'im-popup'})
          .bindTooltip(p.name, {permanent:true, direction:'top',
            className:'', offset:[0,-8]})
          .addTo(g);
        break;
      }
    }
  });
  buildLayerPills([...new Set(gj.features.map(f=>f.properties.layer).filter(Boolean))]);
}

function mkPopup(p) {
  return `<div class="pu-name">${p.name}</div>
    <div class="pu-era">${p.era||''}${p.type?' · '+p.type:''}</div>
    <div class="pu-desc">${p.description||''}</div>
    ${p.now?`<div class="pu-now">📍 現在：${p.now}</div>`:''}`;
}

// ============================================================
// レイヤーピル（PC・スマホ同期）
// ============================================================
function buildLayerPills(layers) {
  ['pc-layer-pills','sp-layer-pills'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    layers.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'lpill on';
      btn.textContent = LAYER_LABEL[name] || name;
      btn.dataset.layer = name;
      btn.addEventListener('click', () => {
        const on = btn.classList.toggle('on');
        document.querySelectorAll(`.lpill[data-layer="${name}"]`)
          .forEach(b => b.classList.toggle('on', on));
        const g = S.vectorGroups[name];
        if (g) { if (on) S.map.addLayer(g); else S.map.removeLayer(g); }
      });
      el.appendChild(btn);
    });
  });
}

// ============================================================
// 不透明度スライダー（PC・スマホ同期）
// ============================================================
function initSliders() {
  ['pc-opacity','sp-opacity'].forEach(id => {
    const sl = document.getElementById(id);
    sl.addEventListener('input', () => {
      const v = parseInt(sl.value);
      sl.style.setProperty('--p', v+'%');
      S.opacity = v / 100;
      ['pc-opacity','sp-opacity'].forEach(sid => {
        const s = document.getElementById(sid);
        s.value = v;
        s.style.setProperty('--p', v+'%');
        document.getElementById(sid+'-val').textContent = v+'%';
      });
      if (S.overlayTile) S.overlayTile.setOpacity(S.opacity);
      Object.values(S.vectorGroups).forEach(g => {
        g.eachLayer(l => {
          if (l.setOpacity) l.setOpacity(S.opacity);
          if (l.setStyle) l.setStyle({opacity:S.opacity, fillOpacity:S.opacity*.85});
        });
      });
    });
  });
}

// ============================================================
// カテゴリフィルター
// ============================================================
function filterByCat(maps, cat) {
  if (cat === 'all') return maps;
  const catMap = {
    historical:   ['historical','ancient','edo','modern_japan','world_history'],
    story:        ['story','bakumatsu','meiji_people','war_history'],
    aerial_photo: ['aerial','aerial_photo'],
    terrain:      ['terrain'],
    fictional:    ['fiction','original','fictional'],
    themed:       ['themed','pilgrimage','ruins','local_culture','research'],
  };
  const cats = catMap[cat] || [cat];
  return maps.filter(m => m.category && (
    cats.includes(m.category) || cats.includes(m.subcategory)
  ));
}

// ============================================================
// Supabaseからデータ取得
// ============================================================
async function fetchMaps() {
  try {
    const { data, error } = await db.from('maps').select('*')
      .eq('is_public', true)
      .order('tier')
      .order('sort_order', { ascending:true, nullsFirst:false })
      .order('created_at', { ascending:false });
    if (error) throw error;
    S.allMaps = data || [];
    buildSidebar(S.allMaps, 'all');
    buildChips(S.allMaps);
    buildSheetCards(S.allMaps, 'all');
  } catch(e) {
    console.error('fetchMaps:', e);
    document.getElementById('sb-list').innerHTML =
      `<div style="padding:16px;font-size:11px;color:rgba(231,76,60,.7);">
        読み込みエラー: ${e.message}</div>`;
    showToast('データ読み込みエラー');
  }
}

// ============================================================
// PC サイドバーのリスト
// ============================================================
function buildSidebar(maps, cat) {
  const std = filterByCat(maps.filter(m=>m.tier==='standard'), cat);
  const com = filterByCat(maps.filter(m=>m.tier!=='standard'), cat);
  const el = document.getElementById('sb-list');
  el.innerHTML = '';
  if (std.length) {
    addTierLabel(el, 'Standard（公式・品質保証）');
    std.forEach(d => el.appendChild(mkSbItem(d)));
  }
  if (com.length) {
    const hr = document.createElement('hr'); hr.className='sbdiv'; el.appendChild(hr);
    addTierLabel(el, 'Community（ユーザー作成）');
    com.forEach(d => el.appendChild(mkSbItem(d)));
  }
  if (!std.length && !com.length) {
    el.innerHTML = '<div style="padding:16px;font-size:11px;color:var(--sepia);">このカテゴリの地図はまだありません</div>';
  }
}
function addTierLabel(parent, text) {
  const d = document.createElement('div');
  d.className = 'sb-tier'; d.textContent = text; parent.appendChild(d);
}
function mkSbItem(def) {
  const el = document.createElement('div');
  el.className = 'sb-item' + (def.id===S.activeId?' active':'');
  el.dataset.id = def.id;
  const isNew = def.created_at && Date.now()-new Date(def.created_at)<7*86400000;
  let badge = def.is_standard
    ? `<span class="bdg bdg-std">公式</span>`
    : (def.price===0 ? `<span class="bdg bdg-free">Free</span>`
                     : `<span class="bdg bdg-paid">¥${def.price}</span>`);
  if (isNew) badge = `<span class="bdg bdg-new">New</span>` + badge;
  el.innerHTML = `
    <span class="sb-item-emoji">${def.emoji||'🗺'}</span>
    <div class="sb-item-info">
      <div class="sb-item-name">${def.name}</div>
      <div class="sb-item-era">${def.era||''}</div>
    </div>${badge}`;
  el.addEventListener('click', () => loadMap(def));
  return el;
}

// ============================================================
// スマホ チップ
// ============================================================
function buildChips(maps) {
  const c = document.getElementById('chip-scroll');
  c.innerHTML = '';
  maps.slice(0, 15).forEach(def => {
    const el = document.createElement('div');
    el.className = 'chip' + (def.id===S.activeId?' active':'');
    el.dataset.id = def.id;
    el.innerHTML = `
      <span class="chip-emoji">${def.emoji||'🗺'}</span>
      <div class="chip-info">
        <span class="chip-name">${def.name}</span>
        <span class="chip-era">${def.era||''}</span>
      </div>`;
    el.addEventListener('click', () => { loadMap(def); setSheet('mid'); });
    c.appendChild(el);
  });
}

// ============================================================
// スマホ シートカード
// ============================================================
function buildSheetCards(maps, cat) {
  const std = filterByCat(maps.filter(m=>m.tier==='standard'), cat);
  const com = filterByCat(maps.filter(m=>m.tier!=='standard'), cat);
  buildCardSection('sh-cards-std', std);
  buildCardSection('sh-cards-com', com);
  document.getElementById('sh-com-tier').style.display = com.length ? '' : 'none';
}
function buildCardSection(elId, maps) {
  const c = document.getElementById(elId);
  if (!c) return;
  c.innerHTML = '';
  if (!maps.length) {
    c.innerHTML = '<div style="font-size:11px;color:var(--sepia);grid-column:1/-1;padding:4px;">なし</div>';
    return;
  }
  maps.forEach(def => {
    const card = document.createElement('div');
    card.className = 'sh-card' + (def.id===S.activeId?' active':'');
    card.dataset.id = def.id;
    const isNew = def.created_at && Date.now()-new Date(def.created_at)<7*86400000;
    let badges = def.is_standard
      ? `<span class="bdg bdg-std">公式</span>`
      : (def.price===0 ? `<span class="bdg bdg-free">Free</span>`
                       : `<span class="bdg bdg-paid">¥${def.price}</span>`);
    if (isNew) badges += `<span class="bdg bdg-new">New</span>`;
    const thumb = def.thumbnail_url
      ? `<img class="sh-thumb" src="${def.thumbnail_url}" alt="${def.name}" loading="lazy">`
      : `<div class="sh-thumb-ph">${def.emoji||'🗺'}</div>`;
    card.innerHTML = `${thumb}
      <div class="sh-body">
        <div class="sh-name">${def.name}</div>
        <div class="sh-era">${def.era||''}</div>
        <div class="sh-badges">${badges}</div>
      </div>`;
    card.addEventListener('click', () => { loadMap(def); setSheet('min'); });
    c.appendChild(card);
  });
}

// ============================================================
// 住所検索（Nominatim API）
// ============================================================
let searchTimer = null;
async function doSearch(query, resultsEl) {
  if (!query.trim()) { resultsEl.style.display='none'; return; }
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&accept-language=ja&countrycodes=jp`,
      { headers: { 'Accept-Language':'ja', 'User-Agent':'ImmersaMap/1.0' } }
    );
    const data = await res.json();
    if (!data.length) {
      resultsEl.innerHTML = '<div class="sb-search-result-item">見つかりませんでした</div>';
      resultsEl.style.display = 'block'; return;
    }
    resultsEl.innerHTML = '';
    data.forEach(item => {
      const el = document.createElement('div');
      el.className = 'sb-search-result-item';
      el.textContent = item.display_name.split(',').slice(0,3).join(', ');
      el.addEventListener('click', () => {
        S.map.flyTo([parseFloat(item.lat), parseFloat(item.lon)], 16, {duration:1.2});
        resultsEl.style.display = 'none';
        // スマホの場合は検索バーを閉じる
        if (!S.isPC) {
          document.getElementById('sp-search-bar').style.display = 'none';
          document.getElementById('sp-fabs').style.display = 'flex';
          document.getElementById('sp-hud').style.display = 'flex';
        }
        showToast(item.display_name.split(',')[0] + ' に移動');
      });
      resultsEl.appendChild(el);
    });
    resultsEl.style.display = 'block';
  } catch(e) {
    resultsEl.innerHTML = '<div class="sb-search-result-item">検索エラー</div>';
    resultsEl.style.display = 'block';
  }
}

function initSearch() {
  // PC検索
  const pcIn = document.getElementById('pc-search');
  const pcRe = document.getElementById('pc-search-results');
  pcIn.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(pcIn.value, pcRe), 400);
  });
  pcIn.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch(pcIn.value, pcRe);
  });
  document.getElementById('pc-search-btn').addEventListener('click', () =>
    doSearch(pcIn.value, pcRe));
  document.addEventListener('click', e => {
    if (!pcIn.contains(e.target) && !pcRe.contains(e.target))
      pcRe.style.display = 'none';
  });

  // スマホ検索
  const spIn = document.getElementById('sp-search');
  const spRe = document.getElementById('sp-search-results');
  spIn.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(spIn.value, spRe), 400);
  });
  spIn.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch(spIn.value, spRe);
  });

  // スマホ検索ボタン
  document.getElementById('sp-search-btn').addEventListener('click', () => {
    document.getElementById('sp-search-bar').style.display = 'block';
    document.getElementById('sp-fabs').style.display = 'none';
    document.getElementById('sp-hud').style.display = 'none';
    document.getElementById('sp-search').focus();
  });
  document.getElementById('sp-search-close').addEventListener('click', () => {
    document.getElementById('sp-search-bar').style.display = 'none';
    document.getElementById('sp-fabs').style.display = 'flex';
    document.getElementById('sp-hud').style.display = 'flex';
    spRe.style.display = 'none';
    spIn.value = '';
  });
}

// ============================================================
// GPS
// ============================================================
function startGPS(btnEl) {
  if (btnEl) btnEl.style.opacity = '.5';
  const fb = () => {
    placeMarker(35.6812,139.7671);
    showToast('GPS取得失敗 — デモ位置を表示');
    if (btnEl) btnEl.style.opacity = '1';
  };
  if (!navigator.geolocation) { fb(); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    if (btnEl) btnEl.style.opacity = '1';
    placeMarker(pos.coords.latitude, pos.coords.longitude);
    S.map.flyTo([pos.coords.latitude, pos.coords.longitude], 16, {duration:1.5});
    showToast('現在地を表示中');
  }, fb, {enableHighAccuracy:true, timeout:8000});
  if (S.watchId) navigator.geolocation.clearWatch(S.watchId);
  S.watchId = navigator.geolocation.watchPosition(
    pos => placeMarker(pos.coords.latitude, pos.coords.longitude));
}
function placeMarker(lat, lng) {
  const icon = L.divIcon({className:'',
    html:`<div style="position:relative;width:16px;height:16px;">
      <div class="gps-dot"></div><div class="gps-ring"></div></div>`,
    iconSize:[32,32], iconAnchor:[16,16]});
  if (S.gpsMarker) S.gpsMarker.setLatLng([lat,lng]);
  else S.gpsMarker = L.marker([lat,lng],{icon,zIndexOffset:9999}).addTo(S.map);
}

// ============================================================
// コンパス
// ============================================================
function initCompass() {
  const needle = document.getElementById('compass-needle');
  const h = e => needle.style.transform =
    `rotate(${e.webkitCompassHeading!=null?e.webkitCompassHeading:360-(e.alpha??0)}deg)`;
  if (typeof DeviceOrientationEvent !== 'undefined') {
    if (typeof DeviceOrientationEvent.requestPermission === 'function')
      document.getElementById('compass').addEventListener('click', () =>
        DeviceOrientationEvent.requestPermission()
          .then(r => r==='granted' && window.addEventListener('deviceorientation',h)));
    else window.addEventListener('deviceorientation', h);
  }
}

// ============================================================
// ボトムシート
// ============================================================
const SHEET_H = {min:'28px', mid:'200px', max:'68vh'};
function setSheet(s) {
  S.sheetH = s;
  document.getElementById('sheet').style.height = SHEET_H[s];
  document.getElementById('sp-menu-btn')?.classList.toggle('active', s!=='min');
}
function toggleSheet() {
  setSheet(S.sheetH==='min'?'mid': S.sheetH==='mid'?'max':'min');
}
function initSheetGesture() {
  const handle = document.getElementById('sheet-handle');
  let sy = null;
  handle.addEventListener('touchstart', e => {sy=e.touches[0].clientY;}, {passive:true});
  handle.addEventListener('touchend', e => {
    if (sy===null) return;
    const dy = sy - e.changedTouches[0].clientY;
    if (dy>30) setSheet(S.sheetH==='min'?'mid':'max');
    else if (dy<-30) setSheet(S.sheetH==='max'?'mid':'min');
    sy = null;
  }, {passive:true});
  handle.addEventListener('click', toggleSheet);
}

// ============================================================
// カテゴリタブ初期化
// ============================================================
function initCatTabs() {
  // PC
  document.getElementById('sb-cats').addEventListener('click', e => {
    const tab = e.target.closest('.sb-cat'); if(!tab) return;
    document.querySelectorAll('.sb-cat').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    S.currentCat = tab.dataset.cat;
    buildSidebar(S.allMaps, S.currentCat);
  });
  // スマホ
  document.getElementById('sh-cats').addEventListener('click', e => {
    const tab = e.target.closest('.sh-cat'); if(!tab) return;
    document.querySelectorAll('.sh-cat').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    buildSheetCards(S.allMaps, tab.dataset.cat);
  });
}

// ============================================================
// トースト
// ============================================================
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(()=>t.classList.remove('show'), 2800);
}

// ============================================================
// 起動
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  initSliders();
  initCompass();
  initSearch();
  initSheetGesture();
  initCatTabs();
  fetchMaps();

  // スプラッシュ
  document.getElementById('btn-start').addEventListener('click', () => {
    document.getElementById('splash').classList.add('hidden');
    setSheet('mid');
    const tryLoad = () => {
      if (S.allMaps.length) {
        const first = S.allMaps.find(m=>m.id==='standard-ryoma-kyoto') || S.allMaps[0];
        if (first) loadMap(first);
      } else {
        tryLoad._c = (tryLoad._c||0)+1;
        if (tryLoad._c < 12) setTimeout(tryLoad, 500);
      }
    };
    setTimeout(tryLoad, 300);
  });

  // PC ボタン
  document.getElementById('pc-gps-btn')?.addEventListener('click', e => startGPS(e.currentTarget));
  document.getElementById('pc-north-btn')?.addEventListener('click', () => {
    document.getElementById('compass-needle').style.transform = 'rotate(0deg)';
    showToast('北向きにリセット');
  });

  // スマホ FABボタン
  document.getElementById('sp-gps-btn').addEventListener('click', e => startGPS(e.currentTarget));
  document.getElementById('sp-north-btn').addEventListener('click', () => {
    document.getElementById('compass-needle').style.transform = 'rotate(0deg)';
    showToast('北向きにリセット');
  });
  document.getElementById('sp-menu-btn').addEventListener('click', () => {
    if (S.sheetH==='min') setSheet('mid'); else setSheet('min');
  });

  // 地図タップでシートを閉じる
  document.getElementById('map').addEventListener('click', () => {
    if (S.sheetH!=='min') setSheet('min');
    // 検索バーも閉じる
    const sb = document.getElementById('sp-search-bar');
    if (sb.style.display==='block') {
      sb.style.display='none';
      document.getElementById('sp-fabs').style.display='flex';
      document.getElementById('sp-hud').style.display='flex';
    }
  });
});
