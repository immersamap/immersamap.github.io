<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ImmersaMap — 時を超える地図体験</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   変数
   ============================================================ */
:root {
  --ink:#1a1008; --ink2:#221408;
  --parchment:#f2e8d0; --parchment2:#e8d8b0;
  --sepia:#8b6914; --gold:#d4a017; --gold-l:#f0c040;
  --rust:#c0392b; --blue:#3498db;
  --surface:rgba(22,14,4,0.92);
  --border:rgba(212,160,23,0.28);
  --radius:8px;
  --sidebar-w:290px;
  /* パネル高さ（スマホ用） */
  --panel-h:100px;
}
*, *::before, *::after {
  margin:0; padding:0; box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html, body {
  width:100%; height:100%; overflow:hidden;
  font-family:'Noto Sans JP',sans-serif;
  background:var(--ink); color:var(--parchment);
}

/* ============================================================
   地図（常にフルスクリーン・最背面）
   ============================================================ */
#map { position:fixed; inset:0; z-index:1; }

/* ============================================================
   スプラッシュ
   ============================================================ */
#splash {
  position:fixed; inset:0; z-index:200; background:var(--ink);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  transition:opacity .8s, visibility .8s;
}
#splash.hidden { opacity:0; visibility:hidden; pointer-events:none; }
.sp-ring {
  width:72px; height:72px; border-radius:50%;
  border:1.5px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:28px; margin-bottom:20px;
  animation:pulseRing 3s ease-in-out infinite;
}
@keyframes pulseRing {
  0%,100% { box-shadow:0 0 0 0 rgba(212,160,23,.3); }
  50%      { box-shadow:0 0 0 18px rgba(212,160,23,0); }
}
.sp-logo { font-family:'Cinzel',serif; font-size:clamp(26px,6vw,40px);
  letter-spacing:.14em; color:var(--gold-l); margin-bottom:6px; }
.sp-sub  { font-size:12px; color:var(--sepia); letter-spacing:.22em; margin-bottom:44px; }
.sp-btn  { padding:13px 44px; border:1.5px solid var(--gold); border-radius:2px;
  background:transparent; color:var(--gold-l); font-family:'Cinzel',serif;
  font-size:13px; letter-spacing:.2em; cursor:pointer; transition:background .3s;
  text-transform:uppercase; }
.sp-btn:hover { background:rgba(212,160,23,.1); }
.sp-link { margin-top:18px; font-size:11px; color:var(--sepia);
  text-decoration:none; border-bottom:1px solid rgba(139,105,20,.25);
  padding-bottom:1px; letter-spacing:.1em; transition:color .2s; }
.sp-link:hover { color:var(--gold); }

/* ============================================================
   ① 検索バー（地図の上に浮く・半透明）
      スマホ：上部固定　PC：サイドバー内
   ============================================================ */
#search-overlay {
  position:fixed; top:0; left:0; right:0; z-index:30;
  padding:max(10px,env(safe-area-inset-top)) 12px 8px;
  pointer-events:none;
}
/* スマホ時は右側にコンパス分のスペース確保 */
.search-box {
  display:flex; align-items:center; gap:8px;
  background:var(--surface); backdrop-filter:blur(12px);
  border:1px solid var(--border); border-radius:24px;
  padding:10px 16px; pointer-events:all;
  box-shadow:0 2px 12px rgba(0,0,0,.35);
}
.search-input {
  flex:1; background:transparent; border:none;
  color:var(--parchment); font-size:14px;
  font-family:'Noto Sans JP',sans-serif; outline:none;
}
.search-input::placeholder { color:var(--sepia); }
.search-icon { color:var(--sepia); font-size:16px; flex-shrink:0; cursor:pointer; }
.search-results {
  margin-top:6px; background:var(--ink2);
  border:1px solid var(--border); border-radius:var(--radius);
  max-height:220px; overflow-y:auto; display:none;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
  z-index:40; position:relative;
}
.search-result-item {
  padding:11px 16px; font-size:12px; color:var(--parchment2);
  cursor:pointer; border-bottom:1px solid rgba(212,160,23,.08);
  transition:background .15s; line-height:1.5;
}
.search-result-item:hover { background:rgba(212,160,23,.1); color:var(--gold-l); }
.search-result-item:last-child { border-bottom:none; }

/* ============================================================
   ② コンパス（右上・単独・Google Maps SDK標準位置）
      タップで北向きリセット
   ============================================================ */
#compass {
  position:fixed; z-index:25;
  width:44px; height:44px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
.c-ring {
  position:absolute; inset:0; border-radius:50%;
  border:1px solid rgba(212,160,23,.35);
  background:var(--surface); backdrop-filter:blur(8px);
}
.c-needle {
  position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center;
  transition:transform .3s;
}
.c-n { width:0; height:0;
  border-left:4px solid transparent; border-right:4px solid transparent;
  border-bottom:13px solid var(--rust); }
.c-s { width:0; height:0;
  border-left:4px solid transparent; border-right:4px solid transparent;
  border-top:13px solid rgba(212,160,23,.4); }
.c-lbl { position:absolute; top:3px; font-family:'Cinzel',serif;
  font-size:7px; color:var(--rust); font-weight:600; }

/* ============================================================
   ③ 現在地表示バッジ（左上・地図名と出典を常時表示）
   ============================================================ */
#map-badge {
  position:fixed; z-index:25; left:12px;
  background:var(--surface); backdrop-filter:blur(10px);
  border:1px solid var(--border); border-radius:6px;
  padding:6px 10px; max-width:200px;
  opacity:0; transition:opacity .35s;
  pointer-events:none;
}
#map-badge.visible { opacity:1; }
.badge-name { font-size:11px; color:var(--gold-l);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.badge-attr { font-size:9px; color:var(--sepia); margin-top:2px; }

/* ============================================================
   ④ 現在地ボタン（右下・青い丸・標準GPS表示）
      パネルの高さ分だけ上にオフセット
   ============================================================ */
#loc-btn {
  position:fixed; z-index:25; right:14px;
  width:48px; height:48px; border-radius:50%;
  border:1px solid var(--border); background:var(--surface);
  backdrop-filter:blur(8px); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
  transition:bottom .35s cubic-bezier(.16,1,.3,1), transform .15s;
}
#loc-btn:active { transform:scale(.92); }
.loc-icon {
  width:20px; height:20px; border-radius:50%;
  background:#4a9fff; border:3px solid white;
  box-shadow:0 0 8px rgba(74,159,255,.5);
}

/* GPS マーカー */
.gps-dot { width:14px; height:14px; border-radius:50%;
  background:#4a9fff; border:3px solid white;
  box-shadow:0 0 8px rgba(74,159,255,.5);
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%); }
.gps-ring { width:34px; height:34px; border-radius:50%;
  border:2px solid rgba(74,159,255,.4);
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  animation:gpsRing 2s ease-out infinite; }
@keyframes gpsRing {
  0%   { transform:translate(-50%,-50%) scale(.4); opacity:.8; }
  100% { transform:translate(-50%,-50%) scale(2.2); opacity:0; }
}

/* ============================================================
   ⑤ タイル読み込みインジケーター（地図中央）
   ============================================================ */
#tile-loading {
  position:fixed; top:50%; left:50%; z-index:50;
  transform:translate(-50%,-50%);
  background:var(--surface); border:1px solid var(--border);
  border-radius:24px; padding:8px 16px;
  display:none; align-items:center; gap:8px;
  font-size:11px; color:var(--parchment2);
  backdrop-filter:blur(8px);
  pointer-events:none;
}
#tile-loading.show { display:flex; }
.tl-spinner {
  width:14px; height:14px; border-radius:50%;
  border:2px solid rgba(212,160,23,.2);
  border-top-color:var(--gold);
  animation:spin .8s linear infinite; flex-shrink:0;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* zoom範囲外ガイド（地図中央） */
#zoom-guide {
  position:fixed; top:50%; left:50%; z-index:50;
  transform:translate(-50%,-50%);
  background:var(--surface); border:1.5px solid var(--gold);
  border-radius:var(--radius); padding:14px 20px;
  display:none; align-items:center; gap:10px;
  font-size:13px; color:var(--parchment);
  backdrop-filter:blur(10px);
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  pointer-events:none; text-align:center;
  max-width:260px; line-height:1.6;
}
#zoom-guide.show { display:flex !important; flex-direction:column; align-items:center; }
#zoom-guide-icon { font-size:28px; margin-bottom:4px; }
#zoom-guide-text { font-size:12px; color:var(--parchment2); }

/* ============================================================
   出典表記（地図右下・常時表示）
   ============================================================ */
.leaflet-control-zoom { display:none !important; }
.leaflet-control-attribution {
  background:rgba(18,12,4,.72) !important;
  color:rgba(242,232,208,.65) !important;
  font-size:10px !important;
  backdrop-filter:blur(4px);
  border-radius:4px 0 0 0 !important;
  padding:3px 8px !important;
}
.leaflet-control-attribution a { color:rgba(212,160,23,.75) !important; }

/* ============================================================
   ⑥ スマホ ボトムパネル
      閉じた状態：「地図を選ぶ▼」ボタンのみ常時表示
      開いた状態：詳細コントロール＋地図選択リスト
   ============================================================ */
#panel {
  position:fixed; left:0; right:0; bottom:0; z-index:20;
  background:var(--ink2); border-top:1px solid var(--border);
  border-radius:14px 14px 0 0;
  transition:height .35s cubic-bezier(.16,1,.3,1);
  padding-bottom:env(safe-area-inset-bottom,0px);
  display:none;
}
/* 閉じた状態：常時表示ボタン */
.panel-trigger {
  height:var(--panel-h);
  display:flex; flex-direction:column;
  justify-content:center; padding:0 16px; gap:8px;
  flex-shrink:0;
}
.panel-map-btn {
  width:100%; padding:12px 16px;
  border:1.5px solid var(--border); border-radius:var(--radius);
  background:rgba(212,160,23,.07); color:var(--gold-l);
  font-family:'Noto Sans JP',sans-serif; font-size:13px;
  font-weight:500; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:space-between;
  text-align:left;
}
.panel-map-btn:hover { background:rgba(212,160,23,.14); border-color:var(--gold); }
.panel-map-btn .btn-left { display:flex; align-items:center; gap:8px; }
.panel-map-btn .btn-name { font-size:13px; color:var(--gold-l); }
.panel-map-btn .btn-era  { font-size:10px; color:var(--sepia); margin-top:1px; }
.panel-map-btn .btn-arrow { font-size:14px; color:var(--sepia); transition:transform .25s; }
.panel-map-btn.open .btn-arrow { transform:rotate(180deg); }

/* 開いた状態：詳細コントロール */
.panel-detail {
  padding:0 16px 10px;
  border-bottom:1px solid rgba(212,160,23,.1);
  flex-shrink:0;
}
.panel-attr {
  font-size:10px; color:var(--sepia);
  margin-bottom:8px; display:none;
}
.panel-zoom-note {
  font-size:11px; color:rgba(212,160,23,.7);
  background:rgba(212,160,23,.07); border-radius:4px;
  padding:5px 10px; margin-bottom:8px; display:none;
}
/* スライダー共通 */
.ctrl-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.ctrl-lbl { font-size:11px; color:var(--sepia); white-space:nowrap; min-width:40px; }
.ctrl-val { font-size:11px; color:var(--gold); min-width:32px; text-align:right;
  font-family:'Cinzel',serif; }
input[type=range] {
  -webkit-appearance:none; flex:1; height:3px;
  background:linear-gradient(to right,
    var(--gold) 0%, var(--gold) var(--p,80%),
    rgba(212,160,23,.15) var(--p,80%));
  border-radius:2px; outline:none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
  background:var(--gold); border:2px solid var(--ink); cursor:pointer;
}
.layer-pills { display:flex; gap:5px; flex-wrap:wrap; }
.lpill { padding:4px 10px; border-radius:20px; font-size:11px;
  border:1px solid var(--border); color:var(--parchment2);
  cursor:pointer; transition:all .2s; background:transparent; }
.lpill.on { background:rgba(212,160,23,.14); border-color:var(--gold); color:var(--gold-l); }

/* 地図選択リスト */
.panel-list-wrap {
  flex:1; overflow:hidden; display:flex; flex-direction:column;
}
.panel-cats {
  display:flex; overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid rgba(212,160,23,.15);
  flex-shrink:0; padding:0 16px;
}
.panel-cats::-webkit-scrollbar { display:none; }
.panel-cat {
  flex-shrink:0; padding:8px 12px; font-size:11px;
  color:var(--sepia); background:transparent; border:none;
  border-bottom:2px solid transparent; cursor:pointer;
  white-space:nowrap; transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;
}
.panel-cat.active { color:var(--gold-l); border-bottom-color:var(--gold); }
.panel-list {
  flex:1; overflow-y:auto; padding:6px 0;
  scrollbar-width:thin; scrollbar-color:rgba(212,160,23,.2) transparent;
}
.list-tier { font-size:9px; color:var(--sepia); letter-spacing:.16em;
  text-transform:uppercase; padding:8px 16px 4px; }
.list-item {
  display:flex; align-items:center; gap:12px;
  padding:10px 16px; cursor:pointer; transition:all .2s;
  border-left:2px solid transparent;
}
.list-item:hover { background:rgba(212,160,23,.06); }
.list-item.active { background:rgba(212,160,23,.12); border-left-color:var(--gold); }
.list-item-emoji { font-size:20px; flex-shrink:0; width:24px; text-align:center; }
.list-item-info  { flex:1; min-width:0; }
.list-item-name  { font-size:13px; color:var(--parchment);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.list-item-era   { font-size:10px; color:var(--sepia); margin-top:2px; }
.list-divider { border:none; border-top:1px solid rgba(212,160,23,.1); margin:4px 16px; }
.bdg { font-size:9px; padding:2px 6px; border-radius:3px; flex-shrink:0; }
.bdg-std  { background:rgba(52,152,219,.12); color:#5dade2;
  border:1px solid rgba(52,152,219,.22); }
.bdg-free { background:rgba(46,204,113,.1); color:#2ecc71;
  border:1px solid rgba(46,204,113,.18); }
.bdg-paid { background:rgba(212,160,23,.1); color:var(--gold);
  border:1px solid rgba(212,160,23,.2); }
.bdg-new  { background:rgba(231,76,60,.1); color:#e74c3c;
  border:1px solid rgba(231,76,60,.18); }
.list-empty { font-size:12px; color:var(--sepia); padding:20px 16px; }

/* ============================================================
   PC サイドバー
   ============================================================ */
#sidebar {
  position:fixed; top:0; left:0; bottom:0; z-index:20;
  width:var(--sidebar-w); background:var(--ink2);
  border-right:1px solid var(--border);
  display:none; flex-direction:column;
}
.sb-head { padding:14px 16px 10px; border-bottom:1px solid var(--border);
  flex-shrink:0; position:relative; overflow:visible; }
.sb-logo { font-family:'Cinzel',serif; font-size:16px;
  letter-spacing:.14em; color:var(--gold-l); margin-bottom:10px; }
/* PC検索（サイドバー内） */
.sb-search-box {
  display:flex; align-items:center; gap:8px;
  background:rgba(255,255,255,.06); border:1px solid var(--border);
  border-radius:20px; padding:8px 14px;
}
.sb-search-input {
  flex:1; background:transparent; border:none;
  color:var(--parchment); font-size:13px;
  font-family:'Noto Sans JP',sans-serif; outline:none;
}
.sb-search-input::placeholder { color:var(--sepia); }
.sb-search-results {
  position:absolute; left:0; right:0; z-index:200;
  background:var(--ink2); border:1px solid var(--border);
  border-radius:0 0 var(--radius) var(--radius);
  max-height:200px; overflow-y:auto; display:none;
}
.sb-search-result-item {
  padding:9px 14px; font-size:12px; color:var(--parchment2);
  cursor:pointer; border-bottom:1px solid rgba(212,160,23,.08);
  transition:background .15s; line-height:1.5;
}
.sb-search-result-item:hover { background:rgba(212,160,23,.1); color:var(--gold-l); }
.sb-search-result-item:last-child { border-bottom:none; }
/* PCカテゴリタブ */
.sb-cats { display:flex; overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid var(--border); flex-shrink:0; }
.sb-cats::-webkit-scrollbar { display:none; }
.sb-cat { flex-shrink:0; padding:8px 11px; font-size:10px;
  color:var(--sepia); background:transparent; border:none;
  border-bottom:2px solid transparent; cursor:pointer;
  white-space:nowrap; transition:all .2s;
  font-family:'Noto Sans JP',sans-serif; }
.sb-cat.active { color:var(--gold-l); border-bottom-color:var(--gold); }
/* PCリスト */
.sb-list { flex:1; overflow-y:auto; padding:6px 0;
  scrollbar-width:thin; scrollbar-color:rgba(212,160,23,.2) transparent; }
.sb-tier { font-size:9px; color:var(--sepia); letter-spacing:.16em;
  text-transform:uppercase; padding:8px 16px 4px; }
.sb-item { display:flex; align-items:center; gap:10px;
  padding:9px 16px; cursor:pointer; transition:all .2s;
  border-left:2px solid transparent; }
.sb-item:hover { background:rgba(212,160,23,.06); }
.sb-item.active { background:rgba(212,160,23,.12); border-left-color:var(--gold); }
.sb-item-emoji { font-size:18px; flex-shrink:0; width:22px; text-align:center; }
.sb-item-info  { flex:1; min-width:0; }
.sb-item-name  { font-size:12px; color:var(--parchment);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-item-era   { font-size:10px; color:var(--sepia); margin-top:1px; }
.sb-divider    { border:none; border-top:1px solid rgba(212,160,23,.1); margin:4px 16px; }
/* PCコントロール */
.sb-ctrl { border-top:1px solid var(--border); padding:12px 16px; flex-shrink:0; }
.sb-ctrl-hd { font-size:10px; color:var(--sepia); letter-spacing:.12em;
  text-transform:uppercase; margin-bottom:8px; }
.sb-now-name { font-size:13px; color:var(--gold-l); font-family:'Cinzel',serif;
  margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sb-now-attr { font-size:10px; color:var(--sepia); margin-bottom:8px; }
.sb-zoom-note { font-size:11px; color:rgba(212,160,23,.7);
  background:rgba(212,160,23,.07); border-radius:4px;
  padding:5px 10px; margin-bottom:8px; display:none; }
.sb-create { display:block; text-align:center; padding:9px;
  border:1px dashed rgba(212,160,23,.2); border-radius:4px;
  font-size:11px; color:var(--sepia); text-decoration:none;
  margin:0 16px 12px; transition:all .2s; letter-spacing:.08em; }
.sb-create:hover { border-color:var(--gold); color:var(--gold); }

/* ============================================================
   ポップアップ
   ============================================================ */
.im-popup .leaflet-popup-content-wrapper {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); color:var(--parchment);
  backdrop-filter:blur(10px); min-width:190px; max-width:270px;
}
.im-popup .leaflet-popup-tip { background:var(--surface); }
.pu-name { font-family:'Cinzel',serif; font-size:13px;
  color:var(--gold-l); margin-bottom:3px; }
.pu-era  { font-size:9px; color:var(--sepia); margin-bottom:6px; letter-spacing:.08em; }
.pu-desc { font-size:11px; color:var(--parchment2); line-height:1.65; }
.pu-now  { font-size:10px; color:var(--blue); margin-top:6px;
  padding-top:6px; border-top:1px solid rgba(212,160,23,.15); }

/* ============================================================
   トースト
   ============================================================ */
#toast {
  position:fixed; top:max(70px,calc(env(safe-area-inset-top)+60px));
  left:50%; transform:translateX(-50%) translateY(-6px);
  z-index:50; background:var(--surface); border:1px solid var(--border);
  padding:9px 18px; border-radius:4px; font-size:11px;
  color:var(--parchment); letter-spacing:.08em;
  opacity:0; pointer-events:none; transition:all .3s;
  white-space:nowrap; backdrop-filter:blur(10px);
}

// ============================================================
// STATE
// ============================================================
const S = {
  map:null, base:null, overlayTile:null, vectorGroups:{},
  activeId:null, activeDef:null, opacity:.8,
  allMaps:[], currentCat:'all',
  gpsMarker:null, watchId:null,
  panelOpen:false, isPC:false,
  zoomGuideListener:null,  // zoomendリスナー管理用
  effectiveMinZoom:2,      // 現在選択中の地図のzoom_min
  effectiveMaxZoom:18,     // 現在選択中の地図のzoom_max
};

// ============================================================
// 地図初期化
// ============================================================
function initMap() {
  S.map = L.map('map', {
    center:[35.6812,139.7671], zoom:14,
    zoomControl:false, attributionControl:true, preferCanvas:true,
  });
  S.map.attributionControl.setPrefix('');
  S.base = L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom:19, zIndex:1,
      attribution:'<a href="https://www.openstreetmap.org/copyright" target="_blank">© OpenStreetMap contributors</a>' }
  ).addTo(S.map);
  S.base.once('tileload', () =>
    document.getElementById('loading').classList.add('hidden'));
  setTimeout(() =>
    document.getElementById('loading').classList.add('hidden'), 2500);
  S.isPC = window.innerWidth >= 768;

  // zoomendを永続的にバインド（地図切替に依存しない）
  S.map.on('zoomend', updateZoomGuide);
}

// ============================================================
// 地図を選択・表示
// ============================================================
function loadMap(def) {
  if (S.overlayTile) { S.map.removeLayer(S.overlayTile); S.overlayTile = null; }
  Object.values(S.vectorGroups).forEach(g => S.map.removeLayer(g));
  S.vectorGroups = {};
  // 前の地図のzoom-guideとzoomイベントをクリア
  const prevGuide = document.getElementById('zoom-guide');
  if (prevGuide) { prevGuide.classList.remove('show'); prevGuide.style.display='none'; }
  // zoomendはinitMapで永続バインド済み

  S.activeId  = def.id;
  S.activeDef = def;
  const name = def.name;
  const era  = def.era || '';
  const isNendo = def.tiles_url && def.tiles_url.includes('nendophoto');
  const attr = def.is_standard && (def.category === 'aerial_photo' || def.category === 'aerial' || def.category === 'terrain')
    ? '国土地理院'
    : (def.attribution || '');

  // UI全更新
  setMapUI(name, era, attr, def.emoji || '🗺', isNendo);

  // アクティブ状態更新
  document.querySelectorAll('.sb-item,.list-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === def.id));

  const gj = BUILTIN_GJ[def.id];

  if (gj) {
    loadVectorLayers(gj);
    S.map.flyTo([def.center_lat, def.center_lng],
      def.zoom_default || 15, {duration:1.2});
    showToast(name + ' を表示中');
    hideTileLoading();

  } else if (def.tiles_url) {
    showTileLoading('読み込み中...');
    const attrStr = attr
      ? `<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">${attr}</a>`
      : '';
    // tiles_urlからzoom範囲を自動推定（DBのzoom_minが未設定の場合のフォールバック）
    const guessMinZoom = (url) => {
      if (!url) return 2;
      if (url.includes('nendophoto')) return 14;
      if (url.includes('ort_riku10') || url.includes('ort_1928')) return 13;
      if (url.includes('gazo') || url.includes('ort_old') || url.includes('ort_USA')) return 10;
      return 2;
    };
    const guessMaxZoom = (url) => {
      if (!url) return 18;
      if (url.includes('nendophoto')) return 18;
      if (url.includes('gazo') || url.includes('ort_old') || url.includes('ort_USA')) return 17;
      if (url.includes('ort_riku10') || url.includes('ort_1928')) return 18;
      if (url.includes('relief') || url.includes('hillshade')) return 16;
      return 18;
    };
    // S（state）に保存して常に最新値を参照
    S.effectiveMinZoom = def.zoom_min || guessMinZoom(def.tiles_url);
    S.effectiveMaxZoom = def.zoom_max || guessMaxZoom(def.tiles_url);
    const effectiveMinZoom = S.effectiveMinZoom;
    const effectiveMaxZoom = S.effectiveMaxZoom;
    S.overlayTile = L.tileLayer(def.tiles_url, {
      opacity: S.opacity, zIndex: 2,
      minZoom: effectiveMinZoom,
      maxZoom: effectiveMaxZoom,
      attribution: attrStr,
    }).addTo(S.map);
    S.overlayTile.once('tileload', () => {
      hideTileLoading();
      updateZoomGuide(); // タイル読み込み完了後にzoom状態を確認
    });
    S.overlayTile.on('tileerror', () => {
      hideTileLoading();
      const curZ = S.map.getZoom();
      const minZ = S.effectiveMinZoom || 2;
      const maxZ = S.effectiveMaxZoom || 18;
      if (curZ >= minZ && curZ <= maxZ) {
        // zoom範囲内なのにタイルがない → 地域のデータなし
        showToast('この地域・年代のデータがありません');
      } else {
        // zoom範囲外 → ガイドを強制表示
        updateZoomGuide();
      }
    });
    buildLayerPills([]);

    updateZoomGuide();
    // zoomendはinitMap内で永続バインド済み（ここでは不要）
    showToast(name + ' を表示中');

  } else {
    buildLayerPills([]);
    hideTileLoading();
    showToast('現代地図（OpenStreetMap）を表示中');
  }

  // パネルを閉じる
  closePanel();
}

function setMapUI(name, era, attr, emoji, isNendo) {
  // バッジ（左上）
  document.getElementById('badge-name').textContent = name;
  document.getElementById('badge-attr').textContent = attr ? `出典：${attr}` : '';
  document.getElementById('map-badge').classList.add('visible');

  // PCサイドバー
  document.getElementById('pc-now-name').textContent = name;
  document.getElementById('pc-now-attr').textContent = attr ? `出典：${attr}` : '';
  const pcZoom = document.getElementById('pc-zoom-note');
  pcZoom.style.display = isNendo ? 'block' : 'none';

  // スマホパネルボタン
  document.getElementById('btn-emoji').textContent = emoji;
  document.getElementById('btn-name').textContent  = name;
  document.getElementById('btn-era').textContent   = era;

  // スマホ詳細
  const panelAttr = document.getElementById('panel-attr');
  panelAttr.textContent = attr ? `出典：${attr}` : '';
  panelAttr.style.display = attr ? 'block' : 'none';
  document.getElementById('panel-zoom-note').style.display =
    isNendo ? 'block' : 'none';
}

// ============================================================
// ベクターレイヤー描画
// ============================================================
function loadVectorLayers(gj) {
  const names = [];
  gj.features.forEach(f => {
    const p = f.properties, layer = p.layer;
    if (!layer) return;
    if (!S.vectorGroups[layer]) {
      S.vectorGroups[layer] = L.layerGroup().addTo(S.map);
      names.push(layer);
    }
    const g = S.vectorGroups[layer];
    switch (f.geometry.type) {
      case 'LineString': {
        const coords = f.geometry.coordinates.map(c => [c[1],c[0]]);
        const st = layer === 'rivers' ? RSTYLE.rivers
          : (RSTYLE.roads[p.type] || RSTYLE.roads.default);
        L.polyline(coords, {...st, opacity:S.opacity})
          .bindPopup(mkPopup(p), {className:'im-popup'}).addTo(g);
        break;
      }
      case 'Polygon': {
        const coords = f.geometry.coordinates[0].map(c => [c[1],c[0]]);
        let st;
        if      (layer==='buildings')  st = RSTYLE.buildings[p.type]  || RSTYLE.buildings.default;
        else if (layer==='districts')  st = RSTYLE.districts[p.type]  || RSTYLE.districts.default;
        else                           st = RSTYLE.boundaries[p.type] || RSTYLE.boundaries.default;
        L.polygon(coords, {...st, opacity:S.opacity})
          .bindPopup(mkPopup(p), {className:'im-popup'}).addTo(g);
        break;
      }
      case 'Point': {
        const ll = [f.geometry.coordinates[1], f.geometry.coordinates[0]];
        const st = RSTYLE.places[p.type] || RSTYLE.places.default;
        L.circleMarker(ll, st)
          .bindPopup(mkPopup(p), {className:'im-popup'})
          .bindTooltip(p.name, {permanent:false, direction:'top',
            className:'', offset:[0,-8]})
          .addTo(g);
        break;
      }
    }
  });
  buildLayerPills([...new Set(gj.features.map(f=>f.properties.layer).filter(Boolean))]);
}

function mkPopup(p) {
  return `<div class="pu-name">${p.name}</div>
    <div class="pu-era">${p.era||''}${p.type?' · '+p.type:''}</div>
    <div class="pu-desc">${p.description||''}</div>
    ${p.now?`<div class="pu-now">📍 現在：${p.now}</div>`:''}`;
}

// ============================================================
// レイヤーピル（PC・スマホ同期）
// ============================================================
function buildLayerPills(layers) {
  ['pc-layer-pills','sp-layer-pills'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    layers.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'lpill on';
      btn.textContent = LAYER_LABEL[name] || name;
      btn.dataset.layer = name;
      btn.addEventListener('click', () => {
        const on = btn.classList.toggle('on');
        document.querySelectorAll(`.lpill[data-layer="${name}"]`)
          .forEach(b => b.classList.toggle('on', on));
        const g = S.vectorGroups[name];
        if (g) { if (on) S.map.addLayer(g); else S.map.removeLayer(g); }
      });
      el.appendChild(btn);
    });
  });
}

// ============================================================
// 不透明度（PC・スマホ同期）
// ============================================================
function initSliders() {
  ['pc-opacity','sp-opacity'].forEach(id => {
    const sl = document.getElementById(id);
    if (!sl) return;
    sl.addEventListener('input', () => {
      const v = parseInt(sl.value);
      S.opacity = v / 100;
      ['pc-opacity','sp-opacity'].forEach(sid => {
        const s = document.getElementById(sid);
        if (!s) return;
        s.value = v;
        s.style.setProperty('--p', v+'%');
        const vl = document.getElementById(sid+'-val');
        if (vl) vl.textContent = v+'%';
      });
      if (S.overlayTile) S.overlayTile.setOpacity(S.opacity);
      Object.values(S.vectorGroups).forEach(g => {
        g.eachLayer(l => {
          if (l.setOpacity) l.setOpacity(S.opacity);
          if (l.setStyle) l.setStyle({opacity:S.opacity, fillOpacity:S.opacity*.85});
        });
      });
    });
  });
}

// ============================================================
// zoom範囲外ガイド（グローバル関数・常に最新のS.effectiveMinZoomを参照）
// ============================================================
function updateZoomGuide() {
  if (!S.overlayTile) {
    // オーバーレイなし（ベクター地図or地図未選択）はガイド非表示
    const guide = document.getElementById('zoom-guide');
    if (guide) { guide.classList.remove('show'); guide.style.display = 'none'; }
    return;
  }
  const z       = S.map.getZoom();
  const minZ    = S.effectiveMinZoom || 2;
  const maxZ    = S.effectiveMaxZoom || 18;
  const guide   = document.getElementById('zoom-guide');
  const guideText = document.getElementById('zoom-guide-text');
  const guideIcon = document.getElementById('zoom-guide-icon');
  const zoomNote   = document.getElementById('panel-zoom-note');
  const pcZoomNote = document.getElementById('pc-zoom-note');

  let msg = '', icon = '';
  if (z < minZ) {
    icon = '🔍＋';
    msg  = '拡大すると空中写真が表示されます';
  } else if (z > maxZ) {
    icon = '🔍－';
    msg  = '縮小すると空中写真が表示されます';
  }

  if (guide) {
    guideIcon.textContent = icon;
    guideText.textContent = msg;
    if (msg) { guide.classList.add('show'); guide.style.display = 'flex'; }
    else     { guide.classList.remove('show'); guide.style.display = 'none'; }
  }
  const plainMsg = msg;
  if (zoomNote)   { zoomNote.textContent = plainMsg; zoomNote.style.display = msg ? 'block' : 'none'; }
  if (pcZoomNote) { pcZoomNote.textContent = plainMsg; pcZoomNote.style.display = msg ? 'block' : 'none'; }
}

// ============================================================
// タイル読み込みインジケーター
// ============================================================
let tileLoadTimer = null;
function showTileLoading(msg) {
  const el = document.getElementById('tile-loading');
  document.getElementById('tile-loading-text').textContent = msg;
  el.classList.add('show');
  clearTimeout(tileLoadTimer);
  tileLoadTimer = setTimeout(hideTileLoading, 8000); // 最大8秒
}
function hideTileLoading() {
  clearTimeout(tileLoadTimer);
  document.getElementById('tile-loading').classList.remove('show');
}

// ============================================================
// カテゴリフィルター
// ============================================================
function filterByCat(maps, cat) {
  if (cat === 'all') return maps;
  const catMap = {
    historical:   ['historical','ancient','edo','modern_japan','world_history'],
    story:        ['story','bakumatsu','meiji_people','war_history'],
    aerial_photo: ['aerial','aerial_photo'],
    terrain:      ['terrain'],
    fictional:    ['fiction','original','fictional'],
    themed:       ['themed','pilgrimage','ruins','local_culture','research'],
  };
  const cats = catMap[cat] || [cat];
  return maps.filter(m => {
    if (!m.category) return false;
    // categoryまたはsubcategoryが一致
    if (cats.includes(m.category) || cats.includes(m.subcategory)) return true;
    // 旧データ互換: aerial → aerial_photo
    if (cat === 'aerial_photo' && m.category === 'aerial') return true;
    return false;
  });
}

// ============================================================
// Supabaseからデータ取得
// ============================================================
async function fetchMaps() {
  try {
    const { data, error } = await db.from('maps').select('*')
      .eq('is_public', true)
      .order('tier')
      .order('sort_order', {ascending:true, nullsFirst:false})
      .order('created_at', {ascending:false});
    if (error) throw error;
    S.allMaps = data || [];
    buildSidebar(S.allMaps, 'all');
    buildPanelList(S.allMaps, 'all');
  } catch(e) {
    console.error('fetchMaps:', e);
    document.getElementById('sb-list').innerHTML =
      `<div class="list-empty">読み込みエラー: ${e.message}</div>`;
    showToast('データの読み込みに失敗しました');
  }
}

// ============================================================
// PC サイドバーリスト
// ============================================================
function buildSidebar(maps, cat) {
  const std = filterByCat(maps.filter(m=>m.tier==='standard'), cat);
  const com = filterByCat(maps.filter(m=>m.tier!=='standard'), cat);
  const el = document.getElementById('sb-list');
  el.innerHTML = '';
  if (std.length) {
    addLabel(el, 'sb-tier', 'Standard（公式・品質保証）');
    std.forEach(d => el.appendChild(mkSbItem(d)));
  }
  if (com.length) {
    const hr = document.createElement('hr'); hr.className='sb-divider'; el.appendChild(hr);
    addLabel(el, 'sb-tier', 'Community（ユーザー作成）');
    com.forEach(d => el.appendChild(mkSbItem(d)));
  }
  if (!std.length && !com.length)
    el.innerHTML = '<div class="list-empty">このカテゴリの地図はまだありません</div>';
}

function mkSbItem(def) {
  const el = document.createElement('div');
  el.className = 'sb-item' + (def.id===S.activeId?' active':'');
  el.dataset.id = def.id;
  el.innerHTML = `
    <span class="sb-item-emoji">${def.emoji||'🗺'}</span>
    <div class="sb-item-info">
      <div class="sb-item-name">${def.name}</div>
      <div class="sb-item-era">${def.era||''}</div>
    </div>
    ${mkBadge(def)}`;
  el.addEventListener('click', () => loadMap(def));
  return el;
}

// ============================================================
// スマホ パネルリスト
// ============================================================
function buildPanelList(maps, cat) {
  const std = filterByCat(maps.filter(m=>m.tier==='standard'), cat);
  const com = filterByCat(maps.filter(m=>m.tier!=='standard'), cat);
  const el = document.getElementById('panel-list');
  el.innerHTML = '';
  if (std.length) {
    addLabel(el, 'list-tier', 'Standard（公式）');
    std.forEach(d => el.appendChild(mkListItem(d)));
  }
  if (com.length) {
    const hr = document.createElement('hr'); hr.className='list-divider'; el.appendChild(hr);
    addLabel(el, 'list-tier', 'Community');
    com.forEach(d => el.appendChild(mkListItem(d)));
  }
  if (!std.length && !com.length)
    el.innerHTML = '<div class="list-empty">このカテゴリの地図はまだありません</div>';
}

function mkListItem(def) {
  const el = document.createElement('div');
  el.className = 'list-item' + (def.id===S.activeId?' active':'');
  el.dataset.id = def.id;
  el.innerHTML = `
    <span class="list-item-emoji">${def.emoji||'🗺'}</span>
    <div class="list-item-info">
      <div class="list-item-name">${def.name}</div>
      <div class="list-item-era">${def.era||''}</div>
    </div>
    ${mkBadge(def)}`;
  el.addEventListener('click', () => loadMap(def));
  return el;
}

function addLabel(parent, cls, text) {
  const d = document.createElement('div');
  d.className = cls; d.textContent = text; parent.appendChild(d);
}
function mkBadge(def) {
  const isNew = def.created_at && Date.now()-new Date(def.created_at)<7*86400000;
  let b = def.is_standard
    ? `<span class="bdg bdg-std">公式</span>`
    : (def.price===0 ? `<span class="bdg bdg-free">Free</span>`
                     : `<span class="bdg bdg-paid">¥${def.price}</span>`);
  if (isNew) b += `<span class="bdg bdg-new">New</span>`;
  return b;
}

// スマホ パネル開閉
// ============================================================
function openPanel() {
  S.panelOpen = true;
  const panel = document.getElementById('panel');
  panel.style.height = '75vh';
  document.getElementById('panel-detail').style.display = 'block';
  document.getElementById('panel-list-wrap').style.display = 'flex';

  S.panelOpen = false;
  const panel = document.getElementById('panel');
  panel.style.height = 'var(--panel-h)';
  document.getElementById('panel-detail').style.display = 'none';
  document.getElementById('panel-list-wrap').style.display = 'none';
  document.getElementById('panel-map-btn').classList.remove('open');

  document.getElementById('loc-btn').style.bottom =
    'calc(var(--panel-h) + env(safe-area-inset-bottom,0px) + 14px)';
}

// ============================================================
// 住所検索（Nominatim）
// ============================================================
let searchTimer = null;
async function doSearch(query, resultsEl) {
  if (!query.trim()) { resultsEl.style.display='none'; return; }
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&accept-language=ja`,
      {headers:{'User-Agent':'ImmersaMap/1.0'}}
    );
    const data = await res.json();
    resultsEl.innerHTML = '';
    if (!data.length) {
      resultsEl.innerHTML = '<div class="search-result-item">見つかりませんでした</div>';
    } else {
      data.forEach(item => {
        const el = document.createElement('div');
        el.className = 'search-result-item';
        el.textContent = item.display_name.split(',').slice(0,3).join(', ');
        el.addEventListener('click', (e) => {
          e.stopPropagation(); // 外側クリックイベントの伝播を止める
          S.map.flyTo([parseFloat(item.lat), parseFloat(item.lon)], 16, {duration:1.2});
          resultsEl.style.display = 'none';
          // 両方の検索inputをクリア
          const si = document.getElementById('search-input');
          const pi = document.getElementById('pc-search-input');
          if (si) si.value = '';
          if (pi) pi.value = '';
          showToast(item.display_name.split(',')[0] + ' に移動');
        });
        resultsEl.appendChild(el);
      });
    }
    resultsEl.style.display = 'block';
  } catch(e) {
    resultsEl.innerHTML = '<div class="search-result-item">検索エラーが発生しました</div>';
    resultsEl.style.display = 'block';
  }
}

function initSearch() {
  // スマホ検索
  const searchInput   = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  // PC検索（先に宣言）
  const pcInput   = document.getElementById('pc-search-input');
  const pcResults = document.getElementById('pc-search-results');

  // スマホ検索イベント
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => doSearch(searchInput.value, searchResults), 400);
    });
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch(searchInput.value, searchResults);
      if (e.key === 'Escape') searchResults.style.display = 'none';
    });
  }

  // PC検索イベント
  if (pcInput) {
    pcInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => doSearch(pcInput.value, pcResults), 400);
    });
    pcInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch(pcInput.value, pcResults);
      if (e.key === 'Escape') pcResults.style.display = 'none';
    });
  }

  // 外側クリックで検索結果を閉じる
  document.addEventListener('click', e => {
    const overlay = document.getElementById('search-overlay');
    const sbHead  = document.querySelector('.sb-head');
    if (overlay && !overlay.contains(e.target))
      searchResults.style.display = 'none';
    if (sbHead && !sbHead.contains(e.target) && pcResults)
      pcResults.style.display = 'none';
  });
}

// ============================================================
// GPS・現在地ボタン
// ============================================================
function initLocBtn() {
  document.getElementById('loc-btn').addEventListener('click', startGPS);
}
function startGPS() {
  const btn = document.getElementById('loc-btn');
  btn.style.opacity = '.5';
  const fb = () => {
    placeMarker(35.6812,139.7671);
    showToast('GPS取得失敗 — デモ位置（東京）を表示');
    btn.style.opacity = '1';
  };
  if (!navigator.geolocation) { fb(); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    btn.style.opacity = '1';
    placeMarker(pos.coords.latitude, pos.coords.longitude);
    S.map.flyTo([pos.coords.latitude, pos.coords.longitude], 16, {duration:1.5});
    showToast('現在地を表示しています');
  }, fb, {enableHighAccuracy:true, timeout:8000});
  if (S.watchId) navigator.geolocation.clearWatch(S.watchId);
  S.watchId = navigator.geolocation.watchPosition(
    pos => placeMarker(pos.coords.latitude, pos.coords.longitude));
}

function placeMarker(lat, lng) {
  const icon = L.divIcon({className:'',
    html:`<div style="position:relative;width:20px;height:20px;">
      <div class="gps-ring"></div>
      <div class="gps-dot"></div>
    </div>`,
    iconSize:[40,40], iconAnchor:[20,20]});
  if (S.gpsMarker) S.gpsMarker.setLatLng([lat,lng]);
  else S.gpsMarker = L.marker([lat,lng],
    {icon, zIndexOffset:9999}).addTo(S.map);
}

// ============================================================
// コンパス（タップで北向きリセット）
// ============================================================
function initCompass() {
  const needle = document.getElementById('compass-needle');
  const h = e => {
    const deg = e.webkitCompassHeading != null
      ? e.webkitCompassHeading : 360 - (e.alpha ?? 0);
    needle.style.transform = `rotate(${deg}deg)`;
  };
  // タップで北向きリセット
  document.getElementById('compass').addEventListener('click', () => {
    needle.style.transform = 'rotate(0deg)';
    showToast('北向きにリセットしました');
    // iOS: コンパス権限リクエスト
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(r => r==='granted' && window.addEventListener('deviceorientation',h));
    }
  });
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission !== 'function') {
    window.addEventListener('deviceorientation', h);
  }
}

// ============================================================
// カテゴリタブ初期化
// ============================================================
function initCatTabs() {
  // PCサイドバー
  document.getElementById('sb-cats').addEventListener('click', e => {
    const tab = e.target.closest('.sb-cat'); if(!tab) return;
    document.querySelectorAll('.sb-cat').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    buildSidebar(S.allMaps, tab.dataset.cat);
  });
  // スマホパネル
  document.getElementById('panel-cats').addEventListener('click', e => {
    const tab = e.target.closest('.panel-cat'); if(!tab) return;
    document.querySelectorAll('.panel-cat').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    buildPanelList(S.allMaps, tab.dataset.cat);
  });
}

// ============================================================
// トースト
// ============================================================
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(()=>t.classList.remove('show'), 2800);
}

// ============================================================
// 起動
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  initSliders();
  initCompass();
  initSearch();
  initLocBtn();
  initCatTabs();
  fetchMaps();

  // スプラッシュ
  document.getElementById('btn-start').addEventListener('click', () => {
    document.getElementById('splash').classList.add('hidden');
    // 地図は自動選択しない。利用者が選ぶ
    // パネルを開いて地図一覧を表示する
    openPanel();
  });

  // スマホ：「地図を選ぶ」ボタン → 1タップで全開
  document.getElementById('panel-map-btn').addEventListener('click', () => {
    if (S.panelOpen) closePanel(); else openPanel();
  });

  // 地図タップでパネルを閉じる
  document.getElementById('map').addEventListener('click', () => {
    if (S.panelOpen) closePanel();
  });
});
</script>
</body>
