<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ImmersaMap — 時を超える地図体験</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   変数・リセット
   ============================================================ */
:root {
  --ink:#1a1008; --ink2:#221408;
  --parchment:#f2e8d0; --parchment2:#e8d8b0;
  --sepia:#8b6914; --gold:#d4a017; --gold-l:#f0c040;
  --rust:#c0392b; --blue:#3498db;
  --surface:rgba(22,14,4,0.93);
  --border:rgba(212,160,23,0.28);
  --sidebar-w:280px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box;
  -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden;
  font-family:'Noto Sans JP',sans-serif;
  background:var(--ink); color:var(--parchment); }

/* ============================================================
   地図（常にフルスクリーン・最背面）
   OSM が常にベースとして表示される
   ============================================================ */
#map {
  position: fixed;
  inset: 0;
  z-index: 1;
}

/* ============================================================
   スプラッシュ
   ============================================================ */
#splash {
  position:fixed; inset:0; z-index:200;
  background:var(--ink);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  transition:opacity .8s ease, visibility .8s ease;
}
#splash.hidden { opacity:0; visibility:hidden; pointer-events:none; }
.splash-ring {
  width:76px; height:76px; border-radius:50%;
  border:1.5px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:30px; margin-bottom:22px;
  animation:pulseRing 3s ease-in-out infinite;
}
@keyframes pulseRing {
  0%,100% { box-shadow:0 0 0 0 rgba(212,160,23,.3); }
  50%      { box-shadow:0 0 0 18px rgba(212,160,23,0); }
}
.splash-logo { font-family:'Cinzel',serif; font-size:clamp(28px,6vw,42px);
  letter-spacing:.14em; color:var(--gold-l); margin-bottom:6px; }
.splash-sub  { font-size:12px; color:var(--sepia); letter-spacing:.22em;
  margin-bottom:44px; }
.splash-btn  { padding:13px 44px; border:1.5px solid var(--gold); border-radius:2px;
  background:transparent; color:var(--gold-l); font-family:'Cinzel',serif;
  font-size:13px; letter-spacing:.2em; cursor:pointer; transition:background .3s;
  text-transform:uppercase; }
.splash-btn:hover { background:rgba(212,160,23,.1); }
.splash-link { margin-top:18px; font-size:11px; color:var(--sepia);
  text-decoration:none; border-bottom:1px solid rgba(139,105,20,.25);
  padding-bottom:1px; letter-spacing:.1em; transition:color .2s; }
.splash-link:hover { color:var(--gold); }

/* ============================================================
   PC レイアウト：左サイドバー固定
   ============================================================ */
#sidebar {
  position:fixed; top:0; left:0; bottom:0; z-index:20;
  width:var(--sidebar-w);
  background:var(--ink2);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  transition:transform .3s ease;
}

/* サイドバー上部ヘッダー */
.sb-header {
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
}
.sb-logo { font-family:'Cinzel',serif; font-size:16px;
  letter-spacing:.14em; color:var(--gold-l); }
.sb-header-btns { display:flex; gap:6px; }
.sb-icon-btn {
  width:32px; height:32px; border-radius:5px;
  border:1px solid var(--border); background:transparent;
  color:var(--parchment); font-size:15px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.sb-icon-btn:hover { background:rgba(212,160,23,.1); border-color:var(--gold); }

/* カテゴリタブ */
.sb-cattabs {
  display:flex; overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sb-cattabs::-webkit-scrollbar { display:none; }
.sb-cattab {
  flex-shrink:0; padding:8px 12px; font-size:11px;
  color:var(--sepia); background:transparent; border:none;
  border-bottom:2px solid transparent; cursor:pointer;
  white-space:nowrap; transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;
}
.sb-cattab.active { color:var(--gold-l); border-bottom-color:var(--gold); }

/* 地図リスト */
.sb-list {
  flex:1; overflow-y:auto; padding:8px 0;
  scrollbar-width:thin;
  scrollbar-color:rgba(212,160,23,.2) transparent;
}
.sb-tier-label {
  font-size:9px; color:var(--sepia); letter-spacing:.18em;
  text-transform:uppercase; padding:8px 16px 4px;
}
.sb-map-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 16px; cursor:pointer; transition:all .2s;
  border-left:2px solid transparent;
}
.sb-map-item:hover { background:rgba(212,160,23,.06); }
.sb-map-item.active {
  background:rgba(212,160,23,.12);
  border-left-color:var(--gold);
}
.sb-item-emoji { font-size:18px; flex-shrink:0; width:24px; text-align:center; }
.sb-item-info  { flex:1; min-width:0; }
.sb-item-name  { font-size:12px; color:var(--parchment);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-item-era   { font-size:10px; color:var(--sepia); margin-top:1px; }
.sb-item-badge {
  font-size:8px; padding:1px 6px; border-radius:3px; flex-shrink:0;
  font-family:'Cinzel',serif;
}
.badge-std  { background:rgba(52,152,219,.14); color:#5dade2;
  border:1px solid rgba(52,152,219,.25); }
.badge-free { background:rgba(46,204,113,.12); color:#2ecc71;
  border:1px solid rgba(46,204,113,.2); }
.badge-paid { background:rgba(212,160,23,.12); color:var(--gold);
  border:1px solid rgba(212,160,23,.22); }
.badge-new  { background:rgba(231,76,60,.1); color:#e74c3c;
  border:1px solid rgba(231,76,60,.2); }
.sb-divider { border:none; border-top:1px solid rgba(212,160,23,.1);
  margin:6px 16px; }

/* コントロールパネル（サイドバー下部） */
.sb-ctrl {
  border-top:1px solid var(--border);
  padding:12px 16px 14px;
  flex-shrink:0;
}
.sb-ctrl-title {
  font-size:10px; color:var(--sepia); letter-spacing:.14em;
  text-transform:uppercase; margin-bottom:10px;
}
.sb-now-name { font-size:13px; color:var(--gold-l);
  font-family:'Cinzel',serif; margin-bottom:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.sb-now-era  { font-size:10px; color:var(--sepia); margin-bottom:10px; }

/* スライダー */
.ctrl-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.ctrl-label { font-size:10px; color:var(--sepia); white-space:nowrap; width:60px; }
.ctrl-val   { font-size:11px; color:var(--gold); min-width:30px; text-align:right;
  font-family:'Cinzel',serif; }
input[type=range] {
  -webkit-appearance:none; flex:1; height:3px;
  background:linear-gradient(to right,
    var(--gold) 0%, var(--gold) var(--p,80%),
    rgba(212,160,23,.15) var(--p,80%));
  border-radius:2px; outline:none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
  background:var(--gold); border:2px solid var(--ink); cursor:pointer;
}

/* レイヤーピル */
.layer-pills { display:flex; gap:5px; flex-wrap:wrap; }
.layer-pill {
  padding:3px 9px; border-radius:20px; font-size:10px;
  border:1px solid var(--border); color:var(--parchment2);
  cursor:pointer; transition:all .2s; background:transparent;
  font-family:'Noto Sans JP',sans-serif;
}
.layer-pill.on { background:rgba(212,160,23,.14); border-color:var(--gold);
  color:var(--gold-l); }

/* 地図作成リンク */
.sb-create-link {
  display:block; text-align:center; padding:10px;
  border:1px dashed rgba(212,160,23,.2); border-radius:4px;
  font-size:11px; color:var(--sepia); text-decoration:none;
  margin:0 16px 14px; transition:all .2s; letter-spacing:.08em;
}
.sb-create-link:hover { border-color:var(--gold); color:var(--gold);
  background:rgba(212,160,23,.05); }

/* ============================================================
   スマホ レイアウト：ボトムシート（モバイルのみ表示）
   ============================================================ */
#mobile-hud {
  display:none; /* PC では非表示 */
  position:fixed; top:0; left:0; right:0; z-index:20;
  padding:max(12px,env(safe-area-inset-top)) 12px 10px;
  background:linear-gradient(to bottom,rgba(18,12,4,.92),transparent);
  pointer-events:none;
  align-items:center; justify-content:space-between;
}
.mhud-logo { font-family:'Cinzel',serif; font-size:15px;
  letter-spacing:.13em; color:var(--gold-l); }
.mhud-mapname { font-size:10px; color:var(--sepia); margin-top:1px;
  max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mhud-right { display:flex; gap:6px; pointer-events:all; }
.mhud-btn {
  height:38px; border-radius:5px; padding:0 12px;
  border:1px solid var(--border); background:var(--surface);
  backdrop-filter:blur(8px); color:var(--parchment);
  font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.mhud-btn:active { transform:scale(.92); }
.mhud-btn.menu-open { background:rgba(212,160,23,.25); border-color:var(--gold); }

#sheet {
  display:none; /* PC では非表示 */
  position:fixed; left:0; right:0; bottom:0; z-index:30;
  background:var(--ink2);
  border-top:1px solid var(--border);
  border-radius:14px 14px 0 0;
  transition:height .35s cubic-bezier(.16,1,.3,1);
  height:28px;
  padding-bottom:env(safe-area-inset-bottom,0px);
  transition:height .35s cubic-bezier(.16,1,.3,1);
}
.sheet-handle {
  height:28px; display:flex; align-items:center;
  justify-content:center; cursor:pointer; flex-shrink:0;
}
.sheet-bar { width:36px; height:3px; border-radius:2px;
  background:rgba(212,160,23,.3); }
.sheet-inner { height:calc(100% - 28px); overflow:hidden;
  display:flex; flex-direction:column; }

/* シート内コントロール */
.sheet-ctrl { padding:0 14px 8px; flex-shrink:0;
  border-bottom:1px solid rgba(212,160,23,.1); }
.sheet-now { display:flex; justify-content:space-between;
  align-items:baseline; margin-bottom:8px; }
.sheet-now-name { font-size:12px; color:var(--gold-l);
  font-family:'Cinzel',serif; }
.sheet-now-era  { font-size:10px; color:var(--sepia); }

/* 横スクロールチップ */
#chip-scroll {
  display:flex; gap:7px; padding:8px 14px;
  overflow-x:auto; scrollbar-width:none; flex-shrink:0;
}
#chip-scroll::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; display:flex; align-items:center; gap:6px;
  padding:5px 11px; border-radius:20px;
  border:1px solid var(--border); background:rgba(212,160,23,.03);
  cursor:pointer; transition:all .22s;
}
.chip.active { background:rgba(212,160,23,.17); border-color:var(--gold); }
.chip-emoji  { font-size:13px; }
.chip-info   { display:flex; flex-direction:column; }
.chip-name   { font-size:11px; color:var(--parchment); white-space:nowrap; }
.chip-era    { font-size:9px;  color:var(--sepia); }

/* シート内ブラウザ */
#sheet-browser {
  flex:1; overflow-y:auto; padding:0 14px 14px;
  scrollbar-width:thin;
  scrollbar-color:rgba(212,160,23,.18) transparent;
}
.browser-cattabs {
  display:flex; overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid rgba(212,160,23,.15);
  margin-bottom:12px; flex-shrink:0;
}
.browser-cattabs::-webkit-scrollbar { display:none; }
.browser-cattab {
  flex-shrink:0; padding:7px 12px; font-size:11px; color:var(--sepia);
  background:transparent; border:none; border-bottom:2px solid transparent;
  cursor:pointer; white-space:nowrap; transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;
}
.browser-cattab.active { color:var(--gold-l); border-bottom-color:var(--gold); }
.browser-tier-label { font-size:9px; color:var(--sepia); letter-spacing:.15em;
  text-transform:uppercase; margin-bottom:6px; }
.browser-cards { display:grid; grid-template-columns:repeat(2,1fr); gap:7px;
  margin-bottom:14px; }
.browser-card {
  border:1px solid var(--border); border-radius:7px; overflow:hidden;
  cursor:pointer; transition:all .22s;
  background:rgba(212,160,23,.03);
}
.browser-card.active { border-color:var(--gold);
  box-shadow:0 0 10px rgba(212,160,23,.18); }
.browser-card:active { transform:scale(.97); }
.bc-thumb {
  width:100%; height:68px; object-fit:cover; display:block; filter:sepia(.3);
}
.bc-thumb-ph {
  width:100%; height:68px; display:flex; align-items:center;
  justify-content:center; font-size:22px;
  background:linear-gradient(135deg,#2a1f0a,#1a1008);
  border-bottom:1px solid rgba(212,160,23,.08);
}
.bc-body { padding:7px 8px; }
.bc-name  { font-size:10px; color:var(--parchment); line-height:1.4; margin-bottom:2px; }
.bc-era   { font-size:9px; color:var(--sepia); font-family:'Cinzel',serif; }
.bc-badges { display:flex; gap:3px; margin-top:3px; flex-wrap:wrap; }

/* スケルトン */
.skeleton { height:128px; border-radius:7px;
  background:linear-gradient(90deg,
    rgba(212,160,23,.04) 25%, rgba(212,160,23,.08) 50%,
    rgba(212,160,23,.04) 75%);
  background-size:200% 100%; animation:shimmer 1.4s infinite; }
@keyframes shimmer {
  0%   { background-position:200% 0; }
  100% { background-position:-200% 0; }
}
.empty-state { font-size:12px; color:var(--sepia); text-align:center;
  padding:20px 0; line-height:1.8; }

/* ============================================================
   コンパス（PC: 地図上 右上 / スマホ: 地図上 右上）
   ============================================================ */
#compass {
  position:fixed; z-index:20; top:14px; right:14px;
  width:44px; height:44px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
}
.c-ring {
  position:absolute; inset:0; border-radius:50%;
  border:1px solid rgba(212,160,23,.3);
  background:var(--surface); backdrop-filter:blur(8px);
}
.c-needle { position:relative; z-index:1;
  display:flex; flex-direction:column; align-items:center;
  transition:transform .25s; }
.c-n { width:0; height:0;
  border-left:4px solid transparent; border-right:4px solid transparent;
  border-bottom:13px solid var(--rust); }
.c-s { width:0; height:0;
  border-left:4px solid transparent; border-right:4px solid transparent;
  border-top:13px solid rgba(212,160,23,.4); }
.c-lbl { position:absolute; top:3px;
  font-family:'Cinzel',serif; font-size:7px;
  color:var(--rust); font-weight:600; }

/* GPS マーカー */
.gps-dot { width:12px; height:12px; border-radius:50%;
  background:#4a9fff; border:2px solid white;
  box-shadow:0 0 6px rgba(74,159,255,.5);
  position:absolute; top:2px; left:2px; }
.gps-ring { width:30px; height:30px; border-radius:50%;
  border:2px solid rgba(74,159,255,.4);
  position:absolute; top:-7px; left:-7px;
  animation:gpsRing 2s ease-out infinite; }
@keyframes gpsRing {
  0%   { transform:scale(.5); opacity:.8; }
  100% { transform:scale(2.2); opacity:0; }
}

/* ポップアップ */
.im-popup .leaflet-popup-content-wrapper {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; color:var(--parchment);
  backdrop-filter:blur(10px); min-width:180px;
}
.im-popup .leaflet-popup-tip { background:var(--surface); }
.popup-name { font-family:'Cinzel',serif; font-size:13px;
  color:var(--gold-l); margin-bottom:3px; }
.popup-era  { font-size:9px; color:var(--sepia); margin-bottom:6px;
  letter-spacing:.08em; }
.popup-desc { font-size:11px; color:var(--parchment2); line-height:1.65; }
.popup-now  { font-size:10px; color:var(--blue); margin-top:6px;
  padding-top:6px; border-top:1px solid rgba(212,160,23,.15); }

/* トースト */
#toast {
  position:fixed; top:14px; left:50%;
  transform:translateX(-50%) translateY(-6px);
  z-index:50; background:var(--surface);
  border:1px solid var(--border); padding:9px 18px;
  border-radius:4px; font-size:11px; color:var(--parchment);
  letter-spacing:.08em; opacity:0; pointer-events:none;
  transition:all .3s; white-space:nowrap;
  backdrop-filter:blur(10px);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ローディング */
#loading {
  position:fixed; inset:0; z-index:100;
  background:var(--ink);
  display:flex; align-items:center; justify-content:center;
  transition:opacity .5s;
}
#loading.hidden { opacity:0; pointer-events:none; }
.loader { width:44px; height:44px; border-radius:50%;
  border:2px solid rgba(212,160,23,.1);
  border-top-color:var(--gold);
  animation:spin .9s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Leaflet デフォルトUIを非表示 */
.leaflet-control-zoom { display:none !important; }

/* スマホ用FABボタン */
#sp-fab {
  display:none;
  position:fixed;
  right:12px;
  z-index:20;
  flex-direction:column;
  gap:8px;
}
.sp-fab-btn {
  width:40px; height:40px; border-radius:6px;
  border:1px solid var(--border); background:var(--surface);
  backdrop-filter:blur(8px); color:var(--parchment);
  font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
.sp-fab-btn:active { transform:scale(.92); }

@media (max-width: 767px) {
  #sp-fab {
    display:flex;
    /* コンパス(40px) + top位置 + gap */
    top:max(120px,calc(env(safe-area-inset-top)+106px));
  }
}
@media (min-width: 768px) {
  #sp-fab { display:none !important; }
}
.leaflet-control-attribution {
  background:rgba(18,12,4,0.75) !important;
  color:rgba(242,232,208,0.7) !important;
  font-size:10px !important;
  backdrop-filter:blur(4px);
  border-radius:3px 0 0 0 !important;
}
.leaflet-control-attribution a {
  color:rgba(212,160,23,0.8) !important;
}

/* ============================================================
   レスポンシブ切替
   PC: サイドバー表示 / スマホ: ボトムシート表示
   ============================================================ */
@media (min-width: 768px) {
  /* PC: サイドバー分だけ地図をずらす */
  #map { left:var(--sidebar-w); }
  #compass { right:14px; top:14px; }
  #sidebar { display:flex; }
  #mobile-hud { display:none !important; }
  #sheet { display:none !important; }
}

@media (max-width: 767px) {
  #sidebar { display:none !important; }
  #map { left:0; }
  #mobile-hud { display:flex; }
  #sheet { display:flex; flex-direction:column; }
  /* コンパスはHUDボタンの下に配置（重ならないよう） */
  #compass {
    top:max(70px,calc(env(safe-area-inset-top)+56px));
    right:12px;
    width:40px; height:40px;
  }
}
</style>
</head>
<body>

<div id="loading"><div class="loader"></div></div>

<!-- スプラッシュ -->
<div id="splash">
  <div class="splash-ring">🗺</div>
  <div class="splash-logo">ImmersaMap</div>
  <div class="splash-sub">時を超える地図体験</div>
  <button class="splash-btn" id="btn-start">探索を始める</button>
  <a href="./create.html" class="splash-link">✏️ 地図を作る・公開する</a>
</div>

<!-- OSMベース地図（常にこれが土台） -->
<div id="map"></div>

<!-- ============================================================
     PC サイドバー
     ============================================================ -->
<div id="sidebar">
  <div class="sb-header">
    <div class="sb-logo">ImmersaMap</div>
    <div class="sb-header-btns">
      <button class="sb-icon-btn" id="pc-gps-btn"   aria-label="現在地">📍</button>
      <button class="sb-icon-btn" id="pc-north-btn" aria-label="北向きに戻す">🔺</button>
    </div>
  </div>

  <!-- カテゴリタブ -->
  <div class="sb-cattabs" id="sb-cattabs">
    <button class="sb-cattab active" data-cat="all">すべて</button>

    document.getElementById('loading').classList.add('hidden');
  });
  // フォールバック: 2秒後に強制的に消す
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 2000);
}

/* ── 地図を選択・表示 ────────────────────────────────── */
function loadMap(def) {
  /* 既存オーバーレイをすべてクリア */
  if (S.overlayTile) { S.map.removeLayer(S.overlayTile); S.overlayTile = null; }
  Object.values(S.vectorGroups).forEach(g => S.map.removeLayer(g));
  S.vectorGroups = {};

  S.activeId  = def.id;
  S.activeDef = def;

  const name = def.name;
  const era  = def.era || '';

  /* UI 更新 */
  document.getElementById('pc-now-name').textContent   = name;
  document.getElementById('pc-now-era').textContent    = era;
  document.getElementById('sp-now-name').textContent   = name;
  document.getElementById('sp-sheet-name').textContent = name;
  document.getElementById('sp-sheet-era').textContent  = era;

  document.querySelectorAll('.sb-map-item,.browser-card,.chip').forEach(el =>
    el.classList.toggle('active', el.dataset.id === def.id));

  /* レイヤーの種類に応じて処理を分岐 */
  const gj = BUILTIN_GJ[def.id];

  if (gj) {
    /* ベクターGeoJSON → OSMの上に重ねる */
    loadVectorLayers(gj);
    S.map.flyTo([def.center_lat, def.center_lng],
      def.zoom_default || 15, { duration:1.2 });
    showToast(name + ' を表示中');

  } else if (def.tiles_url) {
    /* タイル画像 → OSMの上に重ねる（zIndex:2） */
    const attr = def.is_standard && def.category && def.category.includes('aerial')
      ? '<a href="https://maps.gsi.go.jp/development/ichiran.html" target="_blank">国土地理院</a>'
      : (def.attribution || '');
    S.overlayTile = L.tileLayer(def.tiles_url, {
      opacity: S.opacity,
      zIndex:  2,
      minZoom: def.zoom_min || 2,
      maxZoom: def.zoom_max || 18,
      attribution: attr,
    }).addTo(S.map);
    // 年度別写真はzoom14以上が必要なので自動ズーム
    if (def.zoom_min && def.zoom_min >= 14 && S.map.getZoom() < 14) {
      S.map.setZoom(14);
      showToast(name + ' — ズームイン済（zoom14以上必要）');
    }
    buildLayerPills([]);
    S.map.flyTo([def.center_lat, def.center_lng],
      def.zoom_default || 14, { duration:1.2 });
    showToast(name + ' を表示中');

  } else {
    buildLayerPills([]);
    showToast('現代地図（OSM）のみ表示');
  }
}

/* ── ベクターレイヤーを描画 ──────────────────────────── */
function loadVectorLayers(gj) {
  const layerNames = [];

  gj.features.forEach(f => {
    const p     = f.properties;
    const layer = p.layer;
    if (!layer) return;

    if (!S.vectorGroups[layer]) {
      S.vectorGroups[layer] = L.layerGroup().addTo(S.map);
      layerNames.push(layer);
    }
    const g = S.vectorGroups[layer];

    switch (f.geometry.type) {

      case 'LineString': {
        const coords = f.geometry.coordinates.map(c => [c[1], c[0]]);
        const style  = layer === 'rivers'
          ? RSTYLE.rivers
          : (RSTYLE.roads[p.type] || RSTYLE.roads.default);
        L.polyline(coords, { ...style, opacity: S.opacity })
          .bindPopup(makePopup(p), { className:'im-popup' })
          .addTo(g);
        break;
      }

      case 'Polygon': {
        const coords = f.geometry.coordinates[0].map(c => [c[1], c[0]]);
        let style;
        if (layer === 'buildings') style = RSTYLE.buildings[p.type] || RSTYLE.buildings.default;
        else if (layer === 'districts') style = RSTYLE.districts[p.type] || RSTYLE.districts.default;
        else style = RSTYLE.boundaries[p.type] || RSTYLE.boundaries.default;
        L.polygon(coords, { ...style, opacity: S.opacity })
          .bindPopup(makePopup(p), { className:'im-popup' })
          .addTo(g);
        break;
      }

      case 'Point': {
        const ll    = [f.geometry.coordinates[1], f.geometry.coordinates[0]];
        const style = RSTYLE.places[p.type] || RSTYLE.places.default;
        L.circleMarker(ll, style)
          .bindPopup(makePopup(p), { className:'im-popup' })
          .bindTooltip(p.name, { permanent:true, direction:'top',
            className:'', offset:[0,-8] })
          .addTo(g);
        break;
      }
    }
  });

  buildLayerPills([...new Set(gj.features.map(f => f.properties.layer).filter(Boolean))]);
}

/* ── ポップアップ HTML ───────────────────────────────── */
function makePopup(p) {
  return `<div class="popup-name">${p.name}</div>
    <div class="popup-era">${p.era || ''}${p.type ? ' · ' + p.type : ''}</div>
    <div class="popup-desc">${p.description || ''}</div>
    ${p.now ? `<div class="popup-now">📍 現在：${p.now}</div>` : ''}`;
}

/* ── レイヤーON/OFFピル ─────────────────────────────── */
function buildLayerPills(layers) {
  ['pc-layer-pills', 'sp-layer-pills'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    layers.forEach(name => {
      const btn = document.createElement('button');
      btn.className    = 'layer-pill on';
      btn.textContent  = LAYER_LABEL[name] || name;
      btn.dataset.layer = name;
      btn.addEventListener('click', () => {
        const on = btn.classList.toggle('on');
        const g  = S.vectorGroups[name];
        if (!g) return;
        // 同じレイヤー名のボタンを両方同期
        document.querySelectorAll(`.layer-pill[data-layer="${name}"]`)
          .forEach(b => b.classList.toggle('on', on));
        if (on) S.map.addLayer(g); else S.map.removeLayer(g);
      });
      el.appendChild(btn);
    });
  });
}

/* ── 不透明度スライダー ──────────────────────────────── */
function initSliders() {
  ['pc-opacity', 'sp-opacity'].forEach(id => {
    const sl = document.getElementById(id);
    const vl = document.getElementById(id + '-val');
    sl.addEventListener('input', () => {
      const v = parseInt(sl.value);
      sl.style.setProperty('--p', v + '%');
      vl.textContent = v + '%';
      S.opacity = v / 100;
      // 同じスライダーを同期
      ['pc-opacity','sp-opacity'].forEach(sid => {
        const s = document.getElementById(sid);
        s.value = v;
        s.style.setProperty('--p', v + '%');
        document.getElementById(sid + '-val').textContent = v + '%';
      });
      // レイヤーに反映
      if (S.overlayTile) S.overlayTile.setOpacity(S.opacity);
      Object.values(S.vectorGroups).forEach(g => {
        g.eachLayer(l => {
          if (l.setOpacity)  l.setOpacity(S.opacity);
          if (l.setStyle)    l.setStyle({ opacity: S.opacity,
            fillOpacity: S.opacity * .85 });
        });
      });
    });
  });
}

/* ── Supabaseからデータ取得 ──────────────────────────── */
async function fetchMaps() {
  try {
    // Supabase v2 新しいAPIキー形式に対応
    const { data, error } = await db
      .from('maps').select('*')
      .eq('is_public', true)
      .order('tier')
      .order('sort_order', { ascending:true, nullsFirst:false })
      .order('created_at', { ascending:false });

    if (error) throw error;

    S.allMaps = data || [];

    if (S.allMaps.length === 0) {
      // DBにデータがない場合でも画面が動くようにフォールバック
      showToast('地図データが見つかりません。SQLを実行してください。');
    }

    buildSidebar(S.allMaps, 'all');
    buildChips(S.allMaps);
    buildBrowserCards(S.allMaps, 'all');

  } catch(e) {
    console.error('fetchMaps error:', e);
    // エラーでもスプラッシュは閉じられるようにallMapsに空配列を設定済み
    const errMsg = `<div style="padding:16px;font-size:11px;color:rgba(231,76,60,.8);line-height:1.8;">
      データ読み込みエラー<br>${e.message}<br>
      <small>Supabaseの設定を確認してください</small></div>`;
    document.getElementById('sb-list').innerHTML = errMsg;
    showToast('接続エラー — ページを再読み込みしてください');
  }
}

/* ── PC サイドバーのリスト生成 ──────────────────────── */
function buildSidebar(maps, cat) {
  const std = filterByCat(maps.filter(m => m.tier === 'standard'), cat);
  const com = filterByCat(maps.filter(m => m.tier !== 'standard'), cat);
  const el  = document.getElementById('sb-list');
  el.innerHTML = '';

  if (std.length) {
    appendTierLabel(el, 'Standard（公式・品質保証）');
    std.forEach(def => el.appendChild(makeSidebarItem(def)));
  }
  if (com.length) {
    const hr = document.createElement('hr');
    hr.className = 'sb-divider';
    el.appendChild(hr);
    appendTierLabel(el, 'Community（ユーザー作成）');
    com.forEach(def => el.appendChild(makeSidebarItem(def)));
  }
  if (!std.length && !com.length) {
    el.innerHTML = '<div class="empty-state">このカテゴリの地図はまだありません</div>';
  }
}

function appendTierLabel(parent, text) {
  const d = document.createElement('div');
  d.className = 'sb-tier-label';
  d.textContent = text;
  parent.appendChild(d);
}

function makeSidebarItem(def) {
  const el = document.createElement('div');
  el.className = 'sb-map-item' + (def.id === S.activeId ? ' active' : '');
  el.dataset.id = def.id;
  const isNew = def.created_at &&
    Date.now() - new Date(def.created_at) < 7 * 86400000;
  let badge = def.is_standard
    ? `<span class="sb-item-badge badge-std">公式</span>`
    : (def.price === 0
      ? `<span class="sb-item-badge badge-free">Free</span>`
      : `<span class="sb-item-badge badge-paid">¥${def.price}</span>`);
  if (isNew) badge = `<span class="sb-item-badge badge-new">New</span>` + badge;

  el.innerHTML = `
    <span class="sb-item-emoji">${def.emoji || '🗺'}</span>
    <div class="sb-item-info">
      <div class="sb-item-name">${def.name}</div>
      <div class="sb-item-era">${def.era || def.description || ''}</div>
    </div>
    ${badge}`;
  el.addEventListener('click', () => loadMap(def));
  return el;
}

/* ── スマホ: 横スクロールチップ ──────────────────────── */
function buildChips(maps) {
  const c = document.getElementById('chip-scroll');
  c.innerHTML = '';
  maps.slice(0, 12).forEach(def => {
    const el = document.createElement('div');
    el.className = 'chip' + (def.id === S.activeId ? ' active' : '');
    el.dataset.id = def.id;
    el.innerHTML = `
      <span class="chip-emoji">${def.emoji || '🗺'}</span>
      <div class="chip-info">
        <span class="chip-name">${def.name}</span>
        <span class="chip-era">${def.era || ''}</span>
      </div>`;
    el.addEventListener('click', () => {
      loadMap(def);
      setSheet('mid');
    });
    c.appendChild(el);
  });
}

/* ── スマホ: ブラウザカード ──────────────────────────── */
function buildBrowserCards(maps, cat) {
  const std = filterByCat(maps.filter(m => m.tier === 'standard'), cat);
  const com = filterByCat(maps.filter(m => m.tier !== 'standard'), cat);
  buildCardSection('sp-cards-std', std);
  buildCardSection('sp-cards-com', com);
  document.getElementById('sp-com-label').style.display =
    com.length ? '' : 'none';
}

function buildCardSection(elId, maps) {
  const c = document.getElementById(elId);
  if (!c) return;
  c.innerHTML = '';
  if (!maps.length) {
    c.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">なし</div>';
    return;
  }
  maps.forEach(def => {
    const card = document.createElement('div');
    card.className = 'browser-card' + (def.id === S.activeId ? ' active' : '');
    card.dataset.id = def.id;
    const isNew = def.created_at &&
      Date.now() - new Date(def.created_at) < 7 * 86400000;
    let badges = def.is_standard
      ? `<span class="sb-item-badge badge-std">公式</span>`
      : (def.price === 0
        ? `<span class="sb-item-badge badge-free">Free</span>`
        : `<span class="sb-item-badge badge-paid">¥${def.price}</span>`);
    if (isNew) badges += `<span class="sb-item-badge badge-new">New</span>`;
    const thumb = def.thumbnail_url
      ? `<img class="bc-thumb" src="${def.thumbnail_url}" alt="${def.name}" loading="lazy">`
      : `<div class="bc-thumb-ph">${def.emoji || '🗺'}</div>`;
    card.innerHTML = `${thumb}
      <div class="bc-body">
        <div class="bc-name">${def.name}</div>
        <div class="bc-era">${def.era || ''}</div>
        <div class="bc-badges">${badges}</div>
      </div>`;
    card.addEventListener('click', () => { loadMap(def); setSheet('min'); });
    c.appendChild(card);
  });
}

/* ── カテゴリフィルター ──────────────────────────────── */
function filterByCat(maps, cat) {
  if (cat === 'all') return maps;
  return maps.filter(m => {
    if (!m.category) return false;
    if (cat === 'fictional')    return ['fiction','original','fictional'].includes(m.category);
    if (cat === 'aerial_photo') return ['aerial','aerial_photo'].includes(m.category);
    if (cat === 'terrain')      return ['terrain'].includes(m.category);
    if (cat === 'story')        return ['story','bakumatsu','meiji_people','war_history'].includes(m.category) || m.subcategory === 'bakumatsu';
    if (cat === 'historical')   return ['historical','ancient','edo','modern_japan','world_history'].includes(m.category);
    if (cat === 'themed')       return ['themed','pilgrimage','ruins','local_culture','research'].includes(m.category);
    return m.category === cat;
  });
}

/* ── GPS ────────────────────────────────────────────── */
function startGPS(btnEl) {
  btnEl.style.opacity = '.5';
  const fb = () => {
    placeMarker(35.6812, 139.7671);
    showToast('GPS取得失敗 — デモ位置（東京）を表示');
    btnEl.style.opacity = '1';
  };
  if (!navigator.geolocation) { fb(); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    btnEl.style.opacity = '1';
    placeMarker(pos.coords.latitude, pos.coords.longitude);
    S.map.flyTo([pos.coords.latitude, pos.coords.longitude], 16, { duration:1.5 });
    showToast('現在地を表示中（ベース: OpenStreetMap）');
  }, fb, { enableHighAccuracy:true, timeout:8000 });
  if (S.watchId) navigator.geolocation.clearWatch(S.watchId);
  S.watchId = navigator.geolocation.watchPosition(
    pos => placeMarker(pos.coords.latitude, pos.coords.longitude));
}

function placeMarker(lat, lng) {
  const icon = L.divIcon({ className:'',
    html:`<div style="position:relative;width:16px;height:16px;">
      <div class="gps-dot"></div><div class="gps-ring"></div></div>`,
    iconSize:[32,32], iconAnchor:[16,16] });
  if (S.gpsMarker) S.gpsMarker.setLatLng([lat, lng]);
  else S.gpsMarker = L.marker([lat, lng],
    { icon, zIndexOffset:9999 }).addTo(S.map);
}

/* ── コンパス ───────────────────────────────────────── */
function initCompass() {
  const needle = document.getElementById('compass-needle');
  const h = e => needle.style.transform =
    `rotate(${e.webkitCompassHeading != null
      ? e.webkitCompassHeading : 360 - (e.alpha ?? 0)}deg)`;
  if (typeof DeviceOrientationEvent !== 'undefined') {
    if (typeof DeviceOrientationEvent.requestPermission === 'function')
      document.getElementById('compass').addEventListener('click', () =>
        DeviceOrientationEvent.requestPermission()
          .then(r => r === 'granted' && window.addEventListener('deviceorientation', h)));
    else window.addEventListener('deviceorientation', h);
  }
}

/* ── ボトムシート（スマホ）─────────────────────────── */
const SHEET_HEIGHTS = { min:'28px', mid:'190px', max:'68vh' };
function setSheet(state) {
  S.sheetH = state;
  document.getElementById('sheet').style.height = SHEET_HEIGHTS[state];
}
function toggleSheet() {
  setSheet(S.sheetH === 'min' ? 'mid' : S.sheetH === 'mid' ? 'max' : 'min');
}
function initSheetGesture() {
  const handle = document.getElementById('sheet-handle');
  let sy = null;
  handle.addEventListener('touchstart', e => { sy = e.touches[0].clientY; },
    { passive:true });
  handle.addEventListener('touchend', e => {
    if (sy === null) return;
    const dy = sy - e.changedTouches[0].clientY;
    if      (dy >  30) setSheet(S.sheetH === 'min' ? 'mid' : 'max');
    else if (dy < -30) setSheet(S.sheetH === 'max' ? 'mid' : 'min');
    sy = null;
  }, { passive:true });
  handle.addEventListener('click', toggleSheet);
}

/* ── トースト ───────────────────────────────────────── */
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ── 起動 ───────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  initSliders();
  initCompass();
  initSheetGesture();
  fetchMaps();

  /* スプラッシュ */
  document.getElementById('btn-start').addEventListener('click', () => {
    document.getElementById('splash').classList.add('hidden');
    setSheet('mid');

    // allMapsがすでに取得済みならすぐloadMap、まだなら待機
    const tryLoad = () => {
      if (S.allMaps.length) {
        const first = S.allMaps.find(m => m.id === 'standard-ryoma-kyoto')
          || S.allMaps[0];
        if (first) loadMap(first);
      } else {
        // まだ取得中なら500ms後に再試行（最大5回）
        tryLoad._count = (tryLoad._count || 0) + 1;
        if (tryLoad._count < 10) setTimeout(tryLoad, 500);
      }
    };
    setTimeout(tryLoad, 300);
  });

  /* PC ボタン */
  document.getElementById('pc-gps-btn').addEventListener('click', e =>
    startGPS(e.currentTarget));
  document.getElementById('pc-north-btn').addEventListener('click', () => {
    document.getElementById('compass-needle').style.transform = 'rotate(0deg)';
    showToast('北向きにリセット');
  });

  /* スマホ ボタン */
  // スマホFABボタン（#sp-fab内）
  document.getElementById('sp-gps-btn')?.addEventListener('click', e =>
    startGPS(e.currentTarget));
  document.getElementById('sp-north-btn')?.addEventListener('click', () => {
    document.getElementById('compass-needle').style.transform = 'rotate(0deg)';
    showToast('北向きにリセット');
  });
  // スマホ：メニューボタンでシート開閉
  document.getElementById('sp-menu-btn').addEventListener('click', () => {
    const btn = document.getElementById('sp-menu-btn');
    if (S.sheetH === 'min') {
      setSheet('mid');
      btn.classList.add('menu-open');
    } else {
      setSheet('min');
      btn.classList.remove('menu-open');
    }
  });
  // シートが閉じたらボタンのactiveを解除
  document.getElementById('map').addEventListener('click', () => {
    if (S.sheetH !== 'min') {
      setSheet('min');
      document.getElementById('sp-menu-btn')?.classList.remove('menu-open');
    }
  });

  /* PC カテゴリタブ */
  document.getElementById('sb-cattabs').addEventListener('click', e => {
    const tab = e.target.closest('.sb-cattab');
    if (!tab) return;
    document.querySelectorAll('.sb-cattab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    S.currentCat = tab.dataset.cat;
    buildSidebar(S.allMaps, S.currentCat);
  });

  /* スマホ カテゴリタブ */
  document.getElementById('browser-cattabs').addEventListener('click', e => {
    const tab = e.target.closest('.browser-cattab');
    if (!tab) return;
    document.querySelectorAll('.browser-cattab').forEach(t =>
      t.classList.remove('active'));
    tab.classList.add('active');
    buildBrowserCards(S.allMaps, tab.dataset.cat);
  });
});
</script>
