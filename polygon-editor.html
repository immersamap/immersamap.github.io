<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImmersaMap — カバレッジポリゴン編集ツール</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Helvetica Neue',sans-serif;background:#1a1008;color:#f2e8d0;height:100vh;display:flex;flex-direction:column;}

/* ヘッダー */
#header{background:#160e04;border-bottom:1px solid rgba(212,160,23,.3);padding:10px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;flex-shrink:0;}
#header h1{font-size:15px;color:#d4a017;letter-spacing:.1em;}
.ctrl{display:flex;align-items:center;gap:8px;}
label{font-size:12px;color:#8b6914;}
select,input{background:#2a1e08;border:1px solid rgba(212,160,23,.3);color:#f2e8d0;padding:5px 10px;border-radius:4px;font-size:12px;}
button{padding:6px 14px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;}
.btn-primary{background:#d4a017;color:#1a1008;}
.btn-primary:hover{background:#f0c040;}
.btn-danger{background:#c0392b;color:white;}
.btn-danger:hover{background:#e74c3c;}
.btn-secondary{background:rgba(212,160,23,.15);color:#d4a017;border:1px solid rgba(212,160,23,.3);}
.btn-secondary:hover{background:rgba(212,160,23,.25);}
.btn-success{background:#27ae60;color:white;}
.btn-success:hover{background:#2ecc71;}

/* メインエリア */
#main{display:flex;flex:1;overflow:hidden;}

/* 地図 */
#map{flex:1;}

/* サイドパネル */
#panel{width:320px;background:#160e04;border-left:1px solid rgba(212,160,23,.2);display:flex;flex-direction:column;overflow:hidden;}
.panel-section{border-bottom:1px solid rgba(212,160,23,.15);padding:12px;}
.panel-title{font-size:10px;color:#8b6914;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;}

/* ポリゴン一覧 */
#polygon-list{flex:1;overflow-y:auto;padding:8px;}
.poly-item{background:rgba(212,160,23,.06);border:1px solid rgba(212,160,23,.15);border-radius:6px;padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:all .2s;}
.poly-item:hover{background:rgba(212,160,23,.12);}
.poly-item.active{background:rgba(212,160,23,.18);border-color:#d4a017;}
.poly-item-header{display:flex;align-items:center;justify-content:space-between;}
.poly-item-name{font-size:12px;color:#f2e8d0;}
.poly-item-count{font-size:10px;color:#8b6914;}
.poly-item-btns{display:flex;gap:4px;margin-top:6px;}
.poly-item-btns button{padding:3px 8px;font-size:10px;}

/* JSON出力 */
#json-output{background:#0d0800;border:1px solid rgba(212,160,23,.2);border-radius:4px;padding:10px;font-family:monospace;font-size:10px;color:#d4a017;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;}

/* ステータス */
#status{padding:6px 16px;background:#0d0800;border-top:1px solid rgba(212,160,23,.2);font-size:11px;color:#8b6914;flex-shrink:0;}

/* Leaflet override */
.leaflet-control-zoom{display:block!important;}
.leaflet-control-attribution{font-size:9px!important;}
</style>
</head>
<body>

<div id="header">
  <h1>🗺 ポリゴン編集ツール</h1>
  <div class="ctrl">
    <label>年代:</label>
    <select id="era-select">
      <option value="ort_riku10">1930年代</option>
      <option value="ort_USA10" selected>1940年代</option>
      <option value="ort_old10">1960年代</option>
    </select>
  </div>
  <div class="ctrl">
    <label>ポリゴン名:</label>
    <input type="text" id="poly-name" value="東京" style="width:100px">
  </div>
  <button class="btn-primary" id="btn-new">＋ 新規ポリゴン開始</button>
  <button class="btn-danger" id="btn-clear-pts" style="display:none">✕ 頂点クリア</button>
  <button class="btn-success" id="btn-finish" style="display:none">✓ ポリゴン確定</button>
  <button class="btn-secondary" id="btn-undo" style="display:none">↩ 最後の頂点削除</button>
</div>

<div id="main">
  <div id="map"></div>
  <div id="panel">
    <div class="panel-section">
      <div class="panel-title">操作方法</div>
      <div style="font-size:11px;color:#8b6914;line-height:1.7;">
        1. 年代・ポリゴン名を設定<br>
        2. 「新規ポリゴン開始」をクリック<br>
        3. 地図上をクリックで頂点追加<br>
        4. 「ポリゴン確定」で保存<br>
        5. 全ポリゴン完成後「JSONコピー」<br>
        6. index.htmlのAERIAL_COVERAGEに貼り付け
      </div>
    </div>

    <div class="panel-section" style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="btn-secondary" id="btn-load-current">現在のデータ読込</button>
      <button class="btn-danger" id="btn-clear-all">全クリア</button>
    </div>

    <div class="panel-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="panel-title">登録済みポリゴン</div>
      <div id="polygon-list"></div>
    </div>

    <div class="panel-section">
      <div class="panel-title" style="margin-bottom:6px;">JSON出力</div>
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <button class="btn-primary" id="btn-copy-json" style="flex:1;">📋 JSONコピー</button>
        <button class="btn-secondary" id="btn-download">⬇ ダウンロード</button>
      </div>
      <div id="json-output">（ポリゴンを追加するとJSONが生成されます）</div>
    </div>
  </div>
</div>

<div id="status">地図をクリックしてポリゴンを描画してください</div>

<script>
// ============================================================
// 地図初期化
// ============================================================
const map = L.map('map', {center:[36.5,137.5], zoom:6});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:18, attribution:'© OpenStreetMap contributors'
}).addTo(map);

// 各年代の背景タイルも参照用に表示できるよう
// 現在選択中の空中写真をオーバーレイ
let overlayTile = null;
function updateOverlay() {
  if (overlayTile) { map.removeLayer(overlayTile); overlayTile = null; }
  const era = document.getElementById('era-select').value;
  const urls = {
    'ort_riku10': 'https://cyberjapandata.gsi.go.jp/xyz/ort_riku10/{z}/{x}/{y}.png',
    'ort_USA10':  'https://cyberjapandata.gsi.go.jp/xyz/ort_USA10/{z}/{x}/{y}.png',
    'ort_old10':  'https://cyberjapandata.gsi.go.jp/xyz/ort_old10/{z}/{x}/{y}.png',
  };
  if (urls[era]) {
    overlayTile = L.tileLayer(urls[era], {
      opacity:0.7, zIndex:2,
      minZoom: era==='ort_riku10'?13:10,
      maxZoom:22, maxNativeZoom:18,
    }).addTo(map);
  }
}
document.getElementById('era-select').addEventListener('change', () => {
  updateOverlay();
  renderList();
  updateJson();
});
updateOverlay();

// ============================================================
// データ管理
// ============================================================
// era -> [{name, coords:[{lat,lng}]}]
const polygons = {
  'ort_riku10': [],
  'ort_USA10':  [],
  'ort_old10':  [],
};

// 描画中の状態
let drawing = false;
let currentPts = [];
let tempMarkers = [];
let tempLine = null;
let finishedLayers = {}; // era -> [L.polygon]

Object.keys(polygons).forEach(era => { finishedLayers[era] = []; });

// ============================================================
// 描画操作
// ============================================================
function getCurrentEra() { return document.getElementById('era-select').value; }

document.getElementById('btn-new').addEventListener('click', () => {
  if (drawing) finishPolygon();
  drawing = true;
  currentPts = [];
  clearTempLayers();
  document.getElementById('btn-new').style.display = 'none';
  document.getElementById('btn-clear-pts').style.display = '';
  document.getElementById('btn-finish').style.display = '';
  document.getElementById('btn-undo').style.display = '';
  setStatus('地図上をクリックして頂点を追加（最低3点）');
  map.getContainer().style.cursor = 'crosshair';
});

map.on('click', e => {
  if (!drawing) return;
  currentPts.push([e.latlng.lat, e.latlng.lng]);
  
  // マーカー追加
  const m = L.circleMarker([e.latlng.lat, e.latlng.lng], {
    radius:5, color:'#4a9fff', fillColor:'#4a9fff', fillOpacity:1, weight:2
  }).addTo(map);
  tempMarkers.push(m);
  
  // プレビューライン更新
  updateTempLine();
  setStatus(`${currentPts.length}点追加済み（あと${Math.max(0,3-currentPts.length)}点以上必要）`);
});

function updateTempLine() {
  if (tempLine) { map.removeLayer(tempLine); tempLine = null; }
  if (currentPts.length < 2) return;
  const pts = [...currentPts, currentPts[0]]; // 閉じる
  tempLine = L.polyline(pts, {color:'#4a9fff', weight:2, dashArray:'5,4', opacity:.8}).addTo(map);
}

document.getElementById('btn-undo').addEventListener('click', () => {
  if (!drawing || currentPts.length === 0) return;
  currentPts.pop();
  if (tempMarkers.length > 0) {
    map.removeLayer(tempMarkers.pop());
  }
  updateTempLine();
  setStatus(`${currentPts.length}点`);
});

document.getElementById('btn-clear-pts').addEventListener('click', () => {
  currentPts = [];
  clearTempLayers();
  setStatus('頂点をクリアしました。再度クリックして開始');
});

document.getElementById('btn-finish').addEventListener('click', finishPolygon);

function finishPolygon() {
  if (currentPts.length < 3) {
    setStatus('⚠️ 最低3点が必要です');
    return;
  }
  
  const era = getCurrentEra();
  const name = document.getElementById('poly-name').value || `ポリゴン${polygons[era].length+1}`;
  
  // 保存
  const coords = currentPts.map(p => [Math.round(p[0]*100)/100, Math.round(p[1]*100)/100]);
  polygons[era].push({name, coords});
  
  // 確定ポリゴンを地図に表示
  const poly = L.polygon(coords, {
    color:'#4a9fff', weight:2, fillColor:'#4a9fff',
    fillOpacity:0.12, dashArray:'6,4'
  }).addTo(map);
  poly.bindTooltip(name, {permanent:true, direction:'center', className:''});
  finishedLayers[era].push({poly, name});
  
  // リセット
  clearTempLayers();
  drawing = false;
  currentPts = [];
  document.getElementById('btn-new').style.display = '';
  document.getElementById('btn-clear-pts').style.display = 'none';
  document.getElementById('btn-finish').style.display = 'none';
  document.getElementById('btn-undo').style.display = 'none';
  map.getContainer().style.cursor = '';
  
  renderList();
  updateJson();
  setStatus(`✅ "${name}" を保存しました`);
}

function clearTempLayers() {
  tempMarkers.forEach(m => map.removeLayer(m));
  tempMarkers = [];
  if (tempLine) { map.removeLayer(tempLine); tempLine = null; }
}

// ============================================================
// ポリゴン一覧
// ============================================================
function renderList() {
  const era = getCurrentEra();
  const list = document.getElementById('polygon-list');
  list.innerHTML = '';
  
  if (polygons[era].length === 0) {
    list.innerHTML = '<div style="font-size:11px;color:#8b6914;padding:8px;">ポリゴンなし</div>';
    return;
  }
  
  polygons[era].forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'poly-item';
    div.innerHTML = `
      <div class="poly-item-header">
        <span class="poly-item-name">${p.name}</span>
        <span class="poly-item-count">${p.coords.length}点</span>
      </div>
      <div class="poly-item-btns">
        <button class="btn-secondary" onclick="focusPoly(${i})">🔍 表示</button>
        <button class="btn-danger" onclick="deletePoly(${i})">✕ 削除</button>
      </div>`;
    list.appendChild(div);
  });
}

function focusPoly(i) {
  const era = getCurrentEra();
  const coords = polygons[era][i].coords;
  map.fitBounds(L.polygon(coords).getBounds().pad(0.3));
}

function deletePoly(i) {
  const era = getCurrentEra();
  polygons[era].splice(i, 1);
  // レイヤー削除
  if (finishedLayers[era][i]) {
    map.removeLayer(finishedLayers[era][i].poly);
    finishedLayers[era].splice(i, 1);
  }
  renderList();
  updateJson();
}

// ============================================================
// JSON生成
// ============================================================
function updateJson() {
  const era = getCurrentEra();
  const data = polygons[era];
  
  if (data.length === 0) {
    document.getElementById('json-output').textContent = '（ポリゴンなし）';
    return;
  }
  
  // index.htmlのAERIAL_COVERAGE形式で出力
  const lines = [`'${era}': {`];
  lines.push(`  label: '${getLabel(era)}',`);
  lines.push(`  sublabel: '${getSublabel(era)}',`);
  
  // centerをポリゴン群の重心に自動計算
  const allPts = data.flatMap(p => p.coords);
  const clat = allPts.reduce((s,p)=>s+p[0],0)/allPts.length;
  const clng = allPts.reduce((s,p)=>s+p[1],0)/allPts.length;
  lines.push(`  center: [${clat.toFixed(2)}, ${clng.toFixed(2)}],`);
  lines.push(`  zoom: ${era==='ort_riku10'?12:11},`);
  lines.push(`  features: [`);
  
  data.forEach(p => {
    lines.push(`    // ${p.name}`);
    const pts = p.coords.map(c=>`[${c[0]},${c[1]}]`).join(',');
    lines.push(`    [${pts}],`);
  });
  
  lines.push(`  ]`);
  lines.push(`},`);
  
  document.getElementById('json-output').textContent = lines.join('\n');
}

function getLabel(era) {
  return {
    'ort_riku10':'1930年代の空中写真が存在するエリア',
    'ort_USA10':'1940年代の空中写真が存在するエリア',
    'ort_old10':'1960年代の空中写真が存在するエリア',
  }[era] || '';
}
function getSublabel(era) {
  return {
    'ort_riku10':'東京23区・大阪市のみ対応',
    'ort_USA10':'米軍撮影・主要都市周辺（概略範囲）',
    'ort_old10':'主要都市・工業地帯（概略範囲）',
  }[era] || '';
}

// ============================================================
// コピー・ダウンロード
// ============================================================
document.getElementById('btn-copy-json').addEventListener('click', () => {
  const text = document.getElementById('json-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    setStatus('✅ JSONをクリップボードにコピーしました');
  }).catch(() => {
    // フォールバック
    const el = document.getElementById('json-output');
    const range = document.createRange();
    range.selectNodeContents(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    setStatus('✅ JSONをコピーしました');
  });
});

document.getElementById('btn-download').addEventListener('click', () => {
  const era = getCurrentEra();
  const text = document.getElementById('json-output').textContent;
  const blob = new Blob([text], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `coverage_${era}.txt`;
  a.click();
});

// ============================================================
// 現在のデータを読み込む（index.htmlから）
// ============================================================

    ],

      {name:'東京・横浜', coords:[[35.85,139.45],[35.87,139.65],[35.85,139.90],[35.78,140.02],[35.65,140.05],[35.50,139.95],[35.38,139.80],[35.28,139.55],[35.32,139.42],[35.50,139.38],[35.68,139.40],[35.85,139.45]]},

    ],
  };
  
  const era = getCurrentEra();
  
  // 現在表示中のポリゴンをクリア
  finishedLayers[era].forEach(l => map.removeLayer(l.poly));
  finishedLayers[era] = [];
  
  polygons[era] = currentData[era] || [];
  
  // 地図に表示
  polygons[era].forEach((p, i) => {
    const poly = L.polygon(p.coords, {
      color:'#4a9fff', weight:2, fillColor:'#4a9fff',
      fillOpacity:0.12, dashArray:'6,4'
    }).addTo(map);
    poly.bindTooltip(p.name, {permanent:true, direction:'center'});
    finishedLayers[era].push({poly, name:p.name});
  });
  
  renderList();
  updateJson();
  setStatus(`✅ ${era} のデータを読み込みました（${polygons[era].length}件）`);
});

document.getElementById('btn-clear-all').addEventListener('click', () => {
  const era = getCurrentEra();
  finishedLayers[era].forEach(l => map.removeLayer(l.poly));
  finishedLayers[era] = [];
  polygons[era] = [];
  clearTempLayers();
  drawing = false;
  document.getElementById('btn-new').style.display = '';
  document.getElementById('btn-clear-pts').style.display = 'none';
  document.getElementById('btn-finish').style.display = 'none';
  document.getElementById('btn-undo').style.display = 'none';
  map.getContainer().style.cursor = '';
  renderList();
  updateJson();
  setStatus('全ポリゴンをクリアしました');
});

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// 初期表示
renderList();
updateJson();
</script>
</body>
</html>
