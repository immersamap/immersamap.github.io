<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImmersaMap - 古い地図と現在の地図を重ね合わせる</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; overflow: hidden; }
    .header { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    .header-title { font-size: 18px; font-weight: bold; }
    .header-menu-btn { width: 40px; height: 40px; border: none; background: none; cursor: pointer; color: #fff; font-size: 24px; }
    #map { position: absolute; top: 56px; left: 0; right: 0; bottom: 0; width: 100%; height: calc(100% - 56px); }
    .time-selector-panel { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.98); border-top: 1px solid #ddd; z-index: 500; padding: 16px; max-height: 200px; overflow-y: auto; transition: max-height 0.3s; }
    .time-selector-panel.collapsed { max-height: 0; opacity: 0; pointer-events: none; }
    .current-layer-display { font-size: 14px; font-weight: 500; color: #333; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
    .current-layer-name { display: block; font-size: 16px; font-weight: bold; color: #2c3e50; margin-bottom: 4px; }
    .current-layer-subtitle { font-size: 12px; color: #888; }
    .time-selector-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .time-btn { background: #3498db; color: #fff; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
    .time-btn:hover:not(:disabled) { background: #2980b9; }
    .time-btn:disabled { background: #bdc3c7; cursor: not-allowed; opacity: 0.6; }
    .time-current { flex: 1; text-align: center; font-size: 14px; font-weight: 500; color: #2c3e50; }
    .opacity-control { margin-bottom: 12px; }
    .opacity-label { font-size: 12px; color: #666; margin-bottom: 4px; display: flex; justify-content: space-between; }
    .opacity-slider { width: 100%; height: 4px; border-radius: 2px; background: #ddd; -webkit-appearance: none; appearance: none; }
    .opacity-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #3498db; cursor: pointer; }
    .opacity-slider::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #3498db; cursor: pointer; border: none; }
    .layer-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .layer-btn { flex: 1; min-width: 100px; padding: 10px 12px; border: 2px solid #ddd; background: #f9f9f9; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; color: #333; text-align: center; }
    .layer-btn:hover { border-color: #3498db; background: #ecf0f1; }
    .layer-btn.active { background: #3498db; color: #fff; border-color: #3498db; }
    .current-location-btn { position: fixed; bottom: 220px; right: 16px; width: 48px; height: 48px; border-radius: 50%; background: #fff; border: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 400; }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255, 255, 255, 0.9); display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 16px; left: 16px; background: #2c3e50; color: #fff; padding: 12px 16px; border-radius: 4px; font-size: 14px; z-index: 1500; opacity: 0; }
    @media (min-width: 769px) { .time-selector-panel { position: fixed; bottom: 16px; right: 16px; left: auto; width: 320px; border-radius: 8px; border: 1px solid #ddd; max-height: 400px; } .current-location-btn { bottom: 340px; } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">🗺️ ImmersaMap</div>
    <button class="header-menu-btn" id="menu-btn">≡</button>
  </div>
  <div id="map"></div>
  <button class="current-location-btn" id="current-location-btn">📍</button>
  <div class="time-selector-panel" id="time-selector-panel">
    <div class="current-layer-display">
      <span class="current-layer-name" id="current-layer-name">読み込み中...</span>
      <span class="current-layer-subtitle" id="current-layer-subtitle">OpenStreetMap</span>
    </div>
    <div class="time-selector-controls">
      <button class="time-btn" id="prev-time-btn">◀</button>
      <div class="time-current" id="time-current">読み込み中...</div>
      <button class="time-btn" id="next-time-btn">▶</button>
    </div>
    <div class="opacity-control">
      <div class="opacity-label"><span>表示の濃さ</span><span id="opacity-value">70%</span></div>
      <input type="range" id="opacity-slider" class="opacity-slider" min="0" max="100" value="70">
    </div>
    <div class="layer-buttons" id="layer-buttons"></div>
  </div>
  <div class="loading-overlay" id="loading-overlay"><div class="spinner"></div></div>
  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = 'https://kgafuinoddiapaaljkkw.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0zOqrbsnXgdurLgfGp3fsQ_wBsCjFs3';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let map = null;
    const state = {
      currentCategory: null,
      currentTimeIndex: 0,
      currentOpacity: 70,
      overlayTile: null,
      categories: [],
      mapsByCategory: {}
    };

    async function initializeApp() {
      document.getElementById('loading-overlay').style.display = 'flex';
      try {
        const { data: categories } = await sb.from('layer_categories').select('*').order('display_order');
        const { data: maps } = await sb.from('maps').select('*').eq('is_visible', true);

        state.categories = categories || [];
        state.mapsByCategory = {};
        
        (maps || []).forEach(m => {
          if (!state.mapsByCategory[m.category]) {
            state.mapsByCategory[m.category] = [];
          }
          state.mapsByCategory[m.category].push(m);
        });

        if (state.categories.length > 0) {
          state.currentCategory = state.categories[0].category;
        }

        if (map) map.remove();
        map = L.map('map', { center: [36.5, 139.5], zoom: 9 });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        buildUI();
        updateLayerDisplay();

      } catch (e) {
        console.error('Init error:', e);
        showToast('初期化失敗');
      } finally {
        document.getElementById('loading-overlay').style.display = 'none';
      }
    }

    function buildUI() {
      const container = document.getElementById('layer-buttons');
      container.innerHTML = '';
      
      state.categories.forEach((cat, i) => {
        const btn = document.createElement('button');
        btn.className = 'layer-btn' + (i === 0 ? ' active' : '');
        btn.dataset.category = cat.category;
        btn.innerHTML = `${cat.emoji} ${cat.display_name}`;
        btn.addEventListener('click', () => selectCategory(cat.category));
        container.appendChild(btn);
      });
    }

    function selectCategory(category) {
      state.currentCategory = category;
      state.currentTimeIndex = 0;
      document.querySelectorAll('.layer-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.category === category);
      });
      updateLayerDisplay();
    }

    function updateLayerDisplay() {
      const maps = state.mapsByCategory[state.currentCategory] || [];
      if (maps.length === 0) return;

      const m = maps[state.currentTimeIndex];
      const cat = state.categories.find(c => c.category === state.currentCategory);

      document.getElementById('current-layer-name').textContent = `${cat.emoji} ${m.name}`;
      document.getElementById('current-layer-subtitle').textContent = `${cat.display_name}`;
      document.getElementById('time-current').textContent = m.name;
      document.getElementById('prev-time-btn').disabled = state.currentTimeIndex === 0;
      document.getElementById('next-time-btn').disabled = state.currentTimeIndex === maps.length - 1;

      if (state.overlayTile) map.removeLayer(state.overlayTile);
      if (m.tiles_url) {
        state.overlayTile = L.tileLayer(m.tiles_url, { opacity: state.currentOpacity / 100, maxZoom: m.zoom_max || 19 }).addTo(map);
      }
    }

    document.getElementById('prev-time-btn').addEventListener('click', () => {
      const maps = state.mapsByCategory[state.currentCategory] || [];
      if (state.currentTimeIndex > 0) {
        state.currentTimeIndex--;
        updateLayerDisplay();
      }
    });

    document.getElementById('next-time-btn').addEventListener('click', () => {
      const maps = state.mapsByCategory[state.currentCategory] || [];
      if (state.currentTimeIndex < maps.length - 1) {
        state.currentTimeIndex++;
        updateLayerDisplay();
      }
    });

    document.getElementById('opacity-slider').addEventListener('input', (e) => {
      state.currentOpacity = parseInt(e.target.value);
      document.getElementById('opacity-value').textContent = state.currentOpacity + '%';
      if (state.overlayTile) state.overlayTile.setOpacity(state.currentOpacity / 100);
    });

    document.getElementById('current-location-btn').addEventListener('click', () => {
      navigator.geolocation.getCurrentPosition(p => {
        map.flyTo([p.coords.latitude, p.coords.longitude], 13);
        showToast('現在地に移動');
      });
    });

    document.getElementById('menu-btn').addEventListener('click', () => {
      document.getElementById('time-selector-panel').classList.toggle('collapsed');
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.opacity = '1';
      setTimeout(() => t.style.opacity = '0', 3000);
    }

    window.addEventListener('load', initializeApp);
  </script>
</body>
</html>
