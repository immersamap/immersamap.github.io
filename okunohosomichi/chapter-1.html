<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="『おくのほそ道』第1章 - 江戸から千住へ。松尾芭蕉の旅路を地図で追体験。">
<meta property="og:title" content="おくのほそ道 第1章 — ImmersaMap">
<title>おくのほそ道 第1章：江戸〜千住 — ImmersaMap</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Cinzel:wght@400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --ink:#1a1008;
  --ink2:#221408;
  --parchment:#f2e8d0;
  --parchment2:#e8d8b0;
  --sepia:#8b6914;
  --gold:#d4a017;
  --gold-l:#f0c040;
  --surface:rgba(22,14,4,0.92);
  --border:rgba(212,160,23,0.28);
  --radius:8px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  font-family:'Noto Sans JP',sans-serif;
  background:var(--ink);
  color:var(--parchment);
  overflow:hidden;
}

header {
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
  background:linear-gradient(180deg, rgba(26,16,8,0.95) 0%, rgba(26,16,8,0) 100%);
  padding:12px 16px;
}

nav {
  display:flex;
  align-items:center;
  gap:16px;
  max-width:1200px;
  margin:0 auto;
}

.nav-logo {
  font-family:'Cinzel',serif;
  font-size:18px;
  color:var(--gold-l);
  text-decoration:none;
  letter-spacing:0.1em;
}

.nav-breadcrumb {
  font-size:12px;
  color:var(--sepia);
  letter-spacing:0.05em;
}

.nav-breadcrumb a {
  color:var(--sepia);
  text-decoration:none;
  transition:color 0.2s;
}

.nav-breadcrumb a:hover { color:var(--gold); }

.nav-spacer { flex:1; }

.nav-button {
  padding:8px 16px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  font-size:11px;
  cursor:pointer;
  transition:all 0.2s;
  text-decoration:none;
  letter-spacing:0.1em;
}

.nav-button:hover { background:rgba(212,160,23,0.1); }

main {
  position:fixed;
  top:60px;
  bottom:0;
  width:100%;
  display:flex;
  flex-direction:column;
}

#map {
  flex:0 0 auto;
  height:70vh;
  min-height:300px;
  z-index:1;
  background:var(--ink);
}

.leaflet-tile-container { filter: sepia(0.1) contrast(1.05); }

.leaflet-popup-content-wrapper {
  background: rgba(26, 16, 8, 0.95) !important;
  border: 2px solid var(--gold) !important;
  border-radius: var(--radius) !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4) !important;
}

.leaflet-popup-tip { background: rgba(26, 16, 8, 0.95) !important; }

.location-popup {
  width: 280px;
  color: var(--parchment);
  font-family: 'Noto Serif JP', serif;
}

.location-popup h3 {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  color: var(--gold-l);
  margin: 0 0 12px 0;
  letter-spacing: 0.1em;
}

.popup-image {
  width: 100%;
  height: 120px;
  overflow: hidden;
  border-radius: 4px;
  margin-bottom: 12px;
  background: rgba(0,0,0,0.3);
}

.popup-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.image-caption {
  font-size: 11px;
  color: var(--sepia);
  margin-top: 4px;
  text-align: center;
  line-height: 1.4;
}

.location-popup .verse {
  font-size: 14px;
  color: var(--gold);
  font-style: italic;
  line-height: 1.6;
  margin: 0 0 10px 0;
  padding-left: 12px;
  border-left: 2px solid var(--sepia);
}

.location-popup .description {
  font-size: 13px;
  color: var(--parchment2);
  line-height: 1.5;
  margin: 0;
}

.leaflet-popup-close-button {
  color: var(--gold);
  opacity: 0.7;
  transition: opacity 0.2s;
}

.leaflet-popup-close-button:hover { opacity: 1; }

@keyframes popupFadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.leaflet-popup { animation: popupFadeIn 0.3s ease-out; }

.controls {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:12px 16px;
  background:var(--surface);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  z-index:50;
}

.chapter-nav {
  display:flex;
  gap:8px;
  align-items:center;
}

.chapter-button {
  padding:10px 16px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  font-size:12px;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.1em;
}

.chapter-button:hover:not(:disabled) { background:rgba(212,160,23,0.1); }
.chapter-button:disabled { opacity:0.5; cursor:not-allowed; }

.chapter-info {
  font-size:13px;
  color:var(--sepia);
  margin:0 16px;
  letter-spacing:0.05em;
}

.playback-button {
  padding:10px 20px;
  border:1.5px solid var(--gold-l);
  background:rgba(212,160,23,0.1);
  color:var(--gold-l);
  font-size:12px;
  cursor:pointer;
  transition:all 0.2s;
  letter-spacing:0.1em;
  font-weight:500;
}

.playback-button:hover { background:rgba(212,160,23,0.2); }
.playback-button.playing {
  background:rgba(192,57,43,0.2);
  border-color:#c0392b;
  color:#c0392b;
}

.timeline-container {
  flex:0 0 auto;
  height:auto;
  max-height:150px;
  overflow-y:auto;
  padding:12px 16px;
  background:rgba(34,20,8,0.6);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}

.timeline {
  display:flex;
  gap:8px;
  min-width:min-content;
}

.timeline-item {
  flex:0 0 auto;
  padding:8px 12px;
  border:1px solid var(--border);
  border-radius:4px;
  background:rgba(26,16,8,0.6);
  font-size:11px;
  color:var(--parchment2);
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
}

.timeline-item:hover {
  border-color:var(--gold);
  background:rgba(34,20,8,0.9);
}

.timeline-item.active {
  border-color:var(--gold-l);
  background:rgba(212,160,23,0.2);
  color:var(--gold-l);
  font-weight:600;
}

.timeline-item .number {
  display:block;
  font-size:10px;
  color:var(--sepia);
}

.location-panel {
  flex:1;
  overflow-y:auto;
  padding:20px;
  background:rgba(34,20,8,0.8);
}

.location-card {
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
  margin-bottom:16px;
  background:rgba(26,16,8,0.6);
  transition:all 0.3s;
  scroll-margin-top:120px;
}

.location-card:hover {
  border-color:var(--gold);
  background:rgba(34,20,8,0.9);
}

.location-card.active {
  border-color:var(--gold-l);
  background:rgba(212,160,23,0.1);
}

.card-image {
  width:100%;
  height:200px;
  overflow:hidden;
  border-radius:4px;
  margin-bottom:16px;
  background:rgba(0,0,0,0.3);
}

.card-image img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.location-order {
  font-size:11px;
  color:var(--sepia);
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin-bottom:8px;
}

.location-name {
  font-family:'Noto Serif JP',serif;
  font-size:22px;
  font-weight:600;
  color:var(--gold-l);
  margin-bottom:12px;
}

.verse-section {
  margin-bottom:20px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border);
}

.verse-text {
  font-family:'Noto Serif JP',serif;
  font-size:16px;
  font-weight:400;
  color:var(--gold);
  margin-bottom:8px;
  line-height:1.8;
}

.verse-explanation {
  font-size:13px;
  color:var(--parchment2);
  line-height:1.7;
}

.description {
  font-size:13px;
  color:var(--parchment2);
  line-height:1.7;
  margin-bottom:12px;
}

.location-meta {
  font-size:11px;
  color:var(--sepia);
  margin-top:12px;
  letter-spacing:0.05em;
}

.location-meta span {
  display:inline-block;
  margin-right:12px;
}

.loading {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100%;
  font-size:14px;
  color:var(--sepia);
}

.error {
  color:#c0392b;
  padding:20px;
  border:1px solid #c0392b;
  border-radius:var(--radius);
  background:rgba(192,57,43,0.1);
}

@media (max-width:768px) {
  header { padding:10px 12px; }
  .nav-logo { font-size:14px; }
  .nav-breadcrumb { font-size:10px; }
  .nav-button { padding:6px 12px; font-size:10px; }
  #map { height:50vh; min-height:200px; }
  .controls { padding:10px 12px; gap:8px; }
  .chapter-button, .playback-button { padding:8px 12px; font-size:11px; }
  .chapter-info { font-size:11px; margin:0 8px; }
  .timeline-container { max-height:100px; }
  .location-panel { padding:16px; }
  .location-card { padding:20px; }
  .location-name { font-size:18px; }
  .verse-text { font-size:14px; }
  .card-image { height:150px; }
}
</style>
</head>
<body>

<header>
  <nav>
    <a href="/" class="nav-logo">ImmersaMap</a>
    <div class="nav-breadcrumb">
      <a href="/">ホーム</a> / <a href="/okunohosomichi/">おくのほそ道</a> / 第1章
    </div>
    <div class="nav-spacer"></div>
    <a href="/map/" class="nav-button">地図探索モード</a>
  </nav>
</header>

<main>
  <div id="map"></div>

  <div class="controls">
    <div class="chapter-nav">
      <button id="prev-chapter" class="chapter-button" onclick="goToPrevChapter()" disabled>◀ 前の章</button>
      <span class="chapter-info">第1章：江戸〜千住</span>
      <button id="next-chapter" class="chapter-button" onclick="goToNextChapter()">次の章 ▶</button>
    </div>
    <button id="playback-button" class="playback-button" onclick="togglePlayback()">▶ 再生</button>
  </div>

  <div class="timeline-container" id="timeline-container">
    <div class="timeline" id="timeline"></div>
  </div>

  <div class="location-panel" id="location-panel">
    <div class="loading">データを読み込み中...</div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
const S = {
  map: null,
  currentChapter: 1,
  workId: 'okunohosomichi',
  isPlaying: false,
  locations: [],
  markers: [],
  markerGroup: null,
  db: null,
  currentLocationIndex: 0
};

const SUPABASE_URL = 'https://kgafuinoddiapaaljkkw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0zOqrbsnXgdurLgfGp3fsQ_wBsCjFs3';

async function init() {
  try {
    S.db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    initializeMap();
    await loadLocations();
    renderMarkers();
    renderLocationPanel();
    renderTimeline();
  } catch (error) {
    console.error('初期化エラー:', error);
    showError('データの読み込みに失敗しました。ページをリロードしてください。');
  }
}

function initializeMap() {
  const centerLat = 35.9;
  const centerLng = 139.9;

  S.map = L.map('map').setView([centerLat, centerLng], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(S.map);

  S.markerGroup = L.featureGroup().addTo(S.map);
}

async function loadLocations() {
  try {
    const { data: chapters } = await S.db
      .from('chapters')
      .select('id')
      .eq('work_id', S.workId)
      .eq('chapter_number', S.currentChapter);

    if (!chapters || chapters.length === 0) throw new Error('章データが見つかりません');

    const chapterId = chapters[0].id;

    const { data: locations, error: locError } = await S.db
      .from('locations')
      .select('id, location_name, latitude, longitude, order_in_chapter, description, has_verse')
      .eq('chapter_id', chapterId)
      .order('order_in_chapter');

    if (locError) throw locError;

    S.locations = locations || [];

    for (let loc of S.locations) {
      if (loc.has_verse) {
        const { data: verses } = await S.db
          .from('verses')
          .select('verse_text, explanation')
          .eq('location_id', loc.id)
          .limit(1);

        if (verses && verses.length > 0) {
          loc.verse = verses[0];
        }
      }
    }

  } catch (error) {
    console.error('地点データ読み込みエラー:', error);
    throw error;
  }
}

function renderMarkers() {
  S.markerGroup.clearLayers();
  S.markers = [];

  for (let loc of S.locations) {
    let popupHTML = `<div class="location-popup">
      <h3>${loc.location_name}</h3>`;
    
    if (loc.has_verse && loc.verse) {
      popupHTML += `<p class="verse">${loc.verse.verse_text}</p>`;
    }
    
    popupHTML += `<p class="description">${loc.description}</p>
    </div>`;

    const marker = L.marker([loc.latitude, loc.longitude], {
      title: loc.location_name
    })
      .bindPopup(popupHTML)
      .on('click', () => {
        scrollToLocation(loc.id);
        S.currentLocationIndex = loc.order_in_chapter - 1;
        updateTimeline();
      })
      .addTo(S.markerGroup);

    S.markers.push({ id: loc.id, marker: marker });
  }

  S.map.fitBounds(S.markerGroup.getBounds(), { padding: [50, 50] });
}

function renderLocationPanel() {
  const panel = document.getElementById('location-panel');
  panel.innerHTML = '';

  for (let loc of S.locations) {
    const card = document.createElement('div');
    card.className = 'location-card';
    card.id = `location-${loc.id}`;

    let html = `<div class="location-order">地点 ${loc.order_in_chapter}</div>
      <h2 class="location-name">${loc.location_name}</h2>`;

    if (loc.has_verse && loc.verse) {
      html += `<div class="verse-section">
        <div class="verse-text">${loc.verse.verse_text}</div>
        <div class="verse-explanation">${loc.verse.explanation}</div>
      </div>`;
    }

    html += `<div class="description">${loc.description}</div>
      <div class="location-meta">
        <span>座標: ${loc.latitude.toFixed(4)}, ${loc.longitude.toFixed(4)}</span>
      </div>`;

    card.innerHTML = html;
    panel.appendChild(card);
  }
}

function renderTimeline() {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  for (let loc of S.locations) {
    const item = document.createElement('div');
    item.className = 'timeline-item';
    item.innerHTML = `<div class="number">${loc.order_in_chapter}</div>${loc.location_name}`;
    item.onclick = () => {
      S.currentLocationIndex = loc.order_in_chapter - 1;
      scrollToLocation(loc.id);
      S.map.flyTo([loc.latitude, loc.longitude], 14, { duration: 1.5 });
      updateTimeline();
    };
    timeline.appendChild(item);
  }
  updateTimeline();
}

function updateTimeline() {
  document.querySelectorAll('.timeline-item').forEach((item, idx) => {
    item.classList.toggle('active', idx === S.currentLocationIndex);
  });
}

function scrollToLocation(locationId) {
  const element = document.getElementById(`location-${locationId}`);
  if (element) {
    element.scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.querySelectorAll('.location-card').forEach(card => {
      card.classList.remove('active');
    });
    element.classList.add('active');
  }
}

// 2地点間の距離を計算（Haversine の公式）
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371; // 地球の半径（km）
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = 
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// 2地点が見える最適なズームレベルを計算
function calculateOptimalZoom(lat1, lng1, lat2, lng2) {
  const distance = getDistance(lat1, lng1, lat2, lng2);
  if (distance < 3) return 13;
  if (distance < 5) return 12;
  if (distance < 10) return 11;
  if (distance < 20) return 10;
  if (distance < 50) return 9;
  return 8;
}

function togglePlayback() {
  const button = document.getElementById('playback-button');

  if (S.isPlaying) {
    S.isPlaying = false;
    button.textContent = '▶ 再生';
    button.classList.remove('playing');
  } else {
    S.isPlaying = true;
    button.textContent = '⏸ 一時停止';
    button.classList.add('playing');
    playSequence();
  }
}

async function playSequence() {
  for (let idx = 0; idx < S.locations.length; idx++) {
    if (!S.isPlaying) break;

    const loc = S.locations[idx];
    const nextLoc = idx + 1 < S.locations.length ? S.locations[idx + 1] : null;

    S.currentLocationIndex = idx;
    updateTimeline();

    // 現在地と次の地点が見える最適なズームレベルを計算
    const optimalZoom = nextLoc ? 
      calculateOptimalZoom(loc.latitude, loc.longitude, nextLoc.latitude, nextLoc.longitude) : 14;

    // ステップ1：現在地でズームアウト
    S.map.flyTo([loc.latitude, loc.longitude], optimalZoom, { duration: 1.5 });
    await sleep(1500);

    // ステップ2：次の地点へ移動（ズームレベルそのまま）
    if (nextLoc) {
      S.map.flyTo([nextLoc.latitude, nextLoc.longitude], optimalZoom, { duration: 2 });
      await sleep(2000);
    }

    // ステップ3：目的地でズームイン
    S.map.flyTo([loc.latitude, loc.longitude], 14, { duration: 1.5 });
    await sleep(500);

    // ステップ4：ポップアップ・パネル表示
    const marker = S.markers.find(m => m.id === loc.id);
    if (marker?.marker) marker.marker.openPopup();
    scrollToLocation(loc.id);

    // ステップ5：表示
    await sleep(3000);
  }

  if (S.isPlaying) {
    S.isPlaying = false;
    const button = document.getElementById('playback-button');
    button.textContent = '▶ 再生';
    button.classList.remove('playing');
    S.currentLocationIndex = 0;
    updateTimeline();
  }
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function goToPrevChapter() {
  if (S.currentChapter > 1) {
    location.href = `/okunohosomichi/chapter-${S.currentChapter - 1}.html`;
  }
}

function goToNextChapter() {
  location.href = `/okunohosomichi/chapter-${S.currentChapter + 1}.html`;
}

function showError(message) {
  const panel = document.getElementById('location-panel');
  panel.innerHTML = `<div class="error">${message}</div>`;
}

window.addEventListener('load', init);
</script>

</body>
</html>
