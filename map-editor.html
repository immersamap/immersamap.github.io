<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古地図エディタ — ImmersaMap</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg-alt: #fafafa;
    --bg-panel: #f5f5f5;
    --border: #e5e5e5;
    --border-strong: #d0d0d0;
    --text: #1a1a1a;
    --text-muted: #555;
    --text-faint: #888;
    --accent: #1a1a1a;
    --accent-on: #ffffff;
    --blue: #2563eb;
    --green: #2d8659;
    --red: #c0392b;
    --amber: #b8651e;
    --shadow: 0 2px 8px rgba(0,0,0,0.12);
    --shadow-strong: 0 4px 12px rgba(0,0,0,0.18);
    --header-h: 52px;
    --sidebar-w: 360px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: 'Noto Sans JP', system-ui, sans-serif; color: var(--text); }
  button, input, select, textarea { font-family: inherit; }

  .header {
    position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
    background: #fff; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; z-index: 1000;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .header-title i { font-size: 20px; }
  .header-link { color: var(--text-muted); text-decoration: none; font-size: 13px; padding: 6px 10px; border-radius: 6px; }
  .header-link:hover { background: #f0f0f0; color: var(--text); }

  .sidebar {
    position: fixed; top: var(--header-h); left: 0; bottom: 0; width: var(--sidebar-w);
    background: var(--bg-alt); border-right: 1px solid var(--border);
    overflow-y: auto; z-index: 500;
  }
  .map-area {
    position: fixed; top: var(--header-h); left: var(--sidebar-w); right: 0; bottom: 0;
  }
  #map { width: 100%; height: 100%; }

  .step {
    border-bottom: 1px solid var(--border);
    padding: 16px 18px;
  }
  .step-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    background: #e5e5e5; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500; flex-shrink: 0;
  }
  .step.active .step-num { background: var(--accent); color: #fff; }
  .step.done .step-num { background: var(--green); color: #fff; }
  .step-title { font-size: 14px; font-weight: 500; }
  .step-hint { font-size: 12px; color: var(--text-faint); margin-bottom: 10px; line-height: 1.5; }
  .step-body { padding-left: 34px; }

  .form-row { margin-bottom: 10px; }
  .form-label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 8px 10px; font-size: 13px;
    border: 1px solid var(--border); border-radius: 6px;
    background: #fff; outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 60px; font-family: inherit; }
  .file-drop {
    border: 2px dashed var(--border-strong); border-radius: 8px;
    padding: 24px 12px; text-align: center; cursor: pointer;
    background: #fff; transition: border-color .15s, background .15s;
  }
  .file-drop:hover, .file-drop.dragover { border-color: var(--accent); background: #fafafa; }
  .file-drop i { font-size: 24px; color: var(--text-faint); display: block; margin-bottom: 6px; }
  .file-drop-text { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

  .btn {
    padding: 9px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border-strong); background: #fff; color: var(--text);
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover:not(:disabled) { background: #f0f0f0; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover:not(:disabled) { background: #000; }
  .btn-green { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-green:hover:not(:disabled) { background: #226649; }
  .btn-danger { color: var(--red); border-color: var(--red); background: #fff; }
  .btn-danger:hover:not(:disabled) { background: #fbeaea; }
  .btn-block { display: flex; width: 100%; justify-content: center; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row .btn { flex: 1; justify-content: center; }

  /* GCP リスト */
  .gcp-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
  .gcp-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; background: #fff; border: 1px solid var(--border); border-radius: 6px;
    font-size: 12px;
  }
  .gcp-num { width: 22px; height: 22px; border-radius: 50%; background: var(--blue); color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .gcp-item.pending .gcp-num { background: var(--amber); }
  .gcp-info { flex: 1; min-width: 0; font-size: 11px; color: var(--text-muted); line-height: 1.3; }
  .gcp-del { background: transparent; border: none; color: var(--text-faint); cursor: pointer; padding: 2px 4px; font-size: 14px; }
  .gcp-del:hover { color: var(--red); }
  .gcp-stats { font-size: 11px; color: var(--text-faint); margin-top: 6px; padding: 6px 10px; background: #fff; border-radius: 6px; border: 1px solid var(--border); }
  .gcp-stats .ok { color: var(--green); }
  .gcp-stats .warn { color: var(--amber); }

  /* 微調整スライダー */
  .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .slider-row label { font-size: 11px; color: var(--text-muted); width: 60px; flex-shrink: 0; }
  .slider-row input[type=range] { flex: 1; }
  .slider-row .val { font-size: 11px; color: var(--text); width: 50px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

  /* GCP指定モード時のヒント */
  #gcp-hint {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--blue); color: #fff;
    padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
    box-shadow: var(--shadow-strong); z-index: 1100; display: none;
  }
  #gcp-hint.show { display: block; }
  #gcp-hint .step-arrow { margin: 0 8px; opacity: 0.7; }

  /* 古地図小窓 */
  #img-window {
    position: absolute; top: 80px; right: 16px; width: 360px;
    background: #1a1a1a; border-radius: 8px; box-shadow: var(--shadow-strong);
    overflow: hidden; z-index: 700; display: none;
  }
  #img-window.show { display: block; }
  #img-window-head {
    background: #2a2a2a; color: #fff; padding: 8px 12px;
    font-size: 12px; display: flex; justify-content: space-between; align-items: center;
    cursor: move; user-select: none;
  }
  #img-window-head .head-title { display: flex; align-items: center; gap: 6px; }
  #img-window-close { background: transparent; border: none; color: #fff; cursor: pointer; font-size: 16px; }
  #img-window-body { position: relative; overflow: hidden; max-height: 380px; }
  #img-window-body img { display: block; width: 100%; cursor: crosshair; -webkit-user-drag: none; user-select: none; }
  .img-marker {
    position: absolute; width: 22px; height: 22px;
    background: var(--blue); color: #fff;
    border: 2px solid #fff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
    transform: translate(-50%, -50%); pointer-events: none;
    box-shadow: 0 0 4px rgba(0,0,0,0.6);
  }

  /* マップ上のGCPピン */
  .map-pin {
    background: var(--blue); color: #fff;
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    box-shadow: 0 0 4px rgba(0,0,0,0.5);
  }

  /* Status */
  .status-bar {
    position: absolute; bottom: 16px; left: 16px;
    background: rgba(26,26,26,0.92); color: #fff;
    padding: 8px 14px; border-radius: 6px; font-size: 12px;
    z-index: 600; max-width: 60%; opacity: 0; transition: opacity .3s;
  }
  .status-bar.show { opacity: 1; }

  /* Toast */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(26,26,26,0.92); color: #fff;
    padding: 10px 18px; border-radius: 6px; font-size: 13px;
    z-index: 2000; opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--red); }

  /* レスポンシブ：モバイル時は2画面切替で */
  @media (max-width: 768px) {
    .sidebar { width: 100%; bottom: 50vh; }
    .map-area { left: 0; top: calc(var(--header-h) + 50vh); }
    #img-window { top: calc(var(--header-h) + 50vh + 16px); right: 16px; width: 240px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a href="/" class="header-link" title="トップへ"><i class="ti ti-arrow-left"></i></a>
    <div class="header-title"><i class="ti ti-map"></i><span>古地図エディタ</span></div>
  </div>
  <div>
    <a href="/map/" class="header-link"><i class="ti ti-external-link"></i> /map/ で見る</a>
  </div>
</header>

<aside class="sidebar">

  <!-- ステップ 1: 画像をアップロード -->
  <section class="step active" id="step-1">
    <div class="step-head">
      <div class="step-num">1</div>
      <div class="step-title">古地図画像をアップロード</div>
    </div>
    <div class="step-body">
      <div class="step-hint">JPG / PNG 推奨。最大10MB程度まで。</div>
      <div class="file-drop" id="file-drop">
        <i class="ti ti-cloud-upload"></i>
        <div class="file-drop-text">クリックまたはドラッグ&amp;ドロップ<br>で画像を選択</div>
        <input type="file" id="file-input" accept="image/*" style="display:none;">
      </div>
      <div id="file-info" style="font-size: 11px; color: var(--green); margin-top: 8px; display: none;"></div>
    </div>
  </section>

  <!-- ステップ 2: 位置合わせ -->
  <section class="step" id="step-2">
    <div class="step-head">
      <div class="step-num">2</div>
      <div class="step-title">位置合わせ</div>
    </div>
    <div class="step-body">
      <div class="step-hint">古地図と現代地図の同じ場所を <strong>3点以上</strong> 指定します。城跡、神社、川の交差点など特定しやすい点を選びましょう。</div>

      <button class="btn btn-primary btn-block" id="btn-add-gcp" disabled>
        <i class="ti ti-pin"></i> 基準点を追加
      </button>

      <div class="gcp-list" id="gcp-list"></div>
      <div class="gcp-stats" id="gcp-stats" style="display:none;"></div>

      <div class="btn-row" style="margin-top: 10px;">
        <button class="btn btn-green" id="btn-apply" disabled>
          <i class="ti ti-check"></i> 位置合わせを適用
        </button>
        <button class="btn btn-danger" id="btn-clear-gcps" disabled title="基準点をすべて削除">
          <i class="ti ti-trash"></i>
        </button>
      </div>

      <details style="margin-top: 14px;">
        <summary style="font-size: 12px; color: var(--text-muted); cursor: pointer;">手動で微調整</summary>
        <div style="margin-top: 10px;">
          <div class="slider-row">
            <label>透明度</label>
            <input type="range" id="opa-slider" min="10" max="100" value="70">
            <span class="val" id="opa-val">70%</span>
          </div>
          <div class="slider-row">
            <label>回転</label>
            <input type="range" id="rot-slider" min="-180" max="180" value="0" step="0.5">
            <span class="val" id="rot-val">0°</span>
          </div>
          <div class="step-hint" style="margin-top: 6px;">画像を地図上で <strong>ドラッグ</strong> して移動、<strong>角の点</strong> でリサイズできます。</div>
        </div>
      </details>
    </div>
  </section>

  <!-- ステップ 3: メタ情報 -->
  <section class="step" id="step-3">
    <div class="step-head">
      <div class="step-num">3</div>
      <div class="step-title">情報を入力</div>
    </div>
    <div class="step-body">
      <div class="form-row">
        <label class="form-label">地図名 <span style="color:var(--red);">*</span></label>
        <input type="text" class="form-input" id="meta-name" placeholder="例：江戸切絵図 日本橋之部">
      </div>
      <div class="form-row">
        <label class="form-label">年代</label>
        <input type="text" class="form-input" id="meta-era" placeholder="例：天保年間（1830-1844）">
      </div>
      <div class="form-row">
        <label class="form-label">説明</label>
        <textarea class="form-textarea" id="meta-desc" placeholder="この地図の特徴や見どころなど"></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">出典</label>
        <input type="text" class="form-input" id="meta-source" placeholder="例：国立国会図書館デジタルコレクション">
      </div>
    </div>
  </section>

  <!-- ステップ 4: 公開 -->
  <section class="step" id="step-4">
    <div class="step-head">
      <div class="step-num">4</div>
      <div class="step-title">公開</div>
    </div>
    <div class="step-body">
      <button class="btn btn-primary btn-block" id="btn-publish" disabled>
        <i class="ti ti-upload"></i> 公開する
      </button>
      <div class="step-hint" style="margin-top: 8px;">公開すると <a href="/map/" target="_blank">/map/</a> の「古地図」タブから誰でも見られるようになります。</div>
    </div>
  </section>

</aside>

<main class="map-area">
  <div id="map"></div>
  <div id="gcp-hint"></div>
  <div id="img-window">
    <div id="img-window-head">
      <div class="head-title"><i class="ti ti-map"></i> <span>古地図</span></div>
      <button id="img-window-close" aria-label="閉じる">✕</button>
    </div>
    <div id="img-window-body">
      <img id="gcp-img" src="" alt="">
    </div>
  </div>
  <div class="status-bar" id="status-bar"></div>
</main>

<div class="toast" id="toast" role="status"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function() {
  'use strict';

  // ============ 設定 ============
  const SUPABASE_URL = 'https://kgafuinoddiapaaljkkw.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_0zOqrbsnXgdurLgfGp3fsQ_wBsCjFs3';
  const BUCKET = 'historical-maps';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ============ 状態 ============
  const state = {
    file: null,            // File object
    imageUrl: null,        // ローカル ObjectURL（プレビュー用）
    uploadedUrl: null,     // Supabase上の公開URL
    imageEl: null,         // HTMLImageElement（GCP小窓内）
    naturalSize: null,     // {w,h}
    gcps: [],              // [{imgX:0-1, imgY:0-1, mapLat, mapLng}, ...]
    pendingImg: null,      // GCP入力中：画像クリック済み、地図待ち
    bounds: null,          // [[s,w],[n,e]]
    rotationDeg: 0,
    opacity: 0.7,
    overlay: null,         // L.imageOverlay
    rotationLayer: null,
    addingGcp: false,
  };

  const $ = id => document.getElementById(id);
  let map;
  let mapPins = []; // L.marker[]

  // ============ 地図初期化 ============
  function initMap() {
    map = L.map('map', { center: [35.6812, 139.7671], zoom: 12 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    map.on('click', onMapClick);
  }

  // ============ 1. ファイル選択 ============
  $('file-drop').addEventListener('click', () => $('file-input').click());
  $('file-drop').addEventListener('dragover', e => { e.preventDefault(); $('file-drop').classList.add('dragover'); });
  $('file-drop').addEventListener('dragleave', () => $('file-drop').classList.remove('dragover'));
  $('file-drop').addEventListener('drop', e => {
    e.preventDefault(); $('file-drop').classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  $('file-input').addEventListener('change', e => {
    if (e.target.files.length) handleFile(e.target.files[0]);
  });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) { toast('画像ファイルを選択してください', true); return; }
    if (file.size > 15 * 1024 * 1024) { toast('ファイルが大きすぎます（15MB以下）', true); return; }
    state.file = file;
    state.imageUrl = URL.createObjectURL(file);

    // 自然サイズ取得
    const img = new Image();
    img.onload = () => {
      state.naturalSize = { w: img.naturalWidth, h: img.naturalHeight };
      $('file-info').textContent = `✓ ${file.name} (${img.naturalWidth}×${img.naturalHeight}px, ${(file.size/1024/1024).toFixed(1)}MB)`;
      $('file-info').style.display = 'block';
      $('btn-add-gcp').disabled = false;
      markStepDone(1);
      activateStep(2);

      // 画像小窓を表示
      $('gcp-img').src = state.imageUrl;
      $('img-window').classList.add('show');
    };
    img.src = state.imageUrl;
  }

  // ============ ステップ表示制御 ============
  function markStepDone(n) { $('step-' + n).classList.add('done'); $('step-' + n).classList.remove('active'); }
  function activateStep(n) { $('step-' + n).classList.add('active'); }

  // ============ 2. GCP追加フロー ============
  $('btn-add-gcp').addEventListener('click', () => {
    if (!state.file) return;
    state.addingGcp = true;
    state.pendingImg = null;
    showHint(`基準点 #${state.gcps.length + 1}：まず左の<strong>古地図画像</strong>をクリックしてください`);
    $('img-window').classList.add('show');
  });

  // 古地図画像クリック → 画像座標を取得
  $('gcp-img').addEventListener('click', (e) => {
    if (!state.addingGcp) return;
    const rect = e.target.getBoundingClientRect();
    const imgX = (e.clientX - rect.left) / rect.width;
    const imgY = (e.clientY - rect.top) / rect.height;
    state.pendingImg = { imgX, imgY };
    showHint(`基準点 #${state.gcps.length + 1}：次に<strong>現代地図</strong>の同じ場所をクリックしてください`);
    redrawImgMarkers();
  });

  // 現代地図クリック → 地理座標を取得
  function onMapClick(e) {
    if (!state.addingGcp || !state.pendingImg) return;
    state.gcps.push({
      imgX: state.pendingImg.imgX,
      imgY: state.pendingImg.imgY,
      mapLat: e.latlng.lat,
      mapLng: e.latlng.lng,
    });
    state.pendingImg = null;
    state.addingGcp = false;
    hideHint();
    refreshGcpUI();
    drawMapPins();
    redrawImgMarkers();
    toast(`基準点 ${state.gcps.length} 点目を追加しました`);
  }

  // GCP UI 再描画
  function refreshGcpUI() {
    const list = $('gcp-list');
    list.innerHTML = '';
    state.gcps.forEach((g, i) => {
      const row = document.createElement('div');
      row.className = 'gcp-item';
      row.innerHTML = `
        <div class="gcp-num">${i + 1}</div>
        <div class="gcp-info">画像 (${(g.imgX * 100).toFixed(0)}%, ${(g.imgY * 100).toFixed(0)}%)<br>緯度経度 (${g.mapLat.toFixed(5)}, ${g.mapLng.toFixed(5)})</div>
        <button class="gcp-del" data-i="${i}" aria-label="削除"><i class="ti ti-x"></i></button>
      `;
      row.querySelector('.gcp-del').addEventListener('click', () => {
        state.gcps.splice(i, 1);
        refreshGcpUI(); drawMapPins(); redrawImgMarkers();
      });
      list.appendChild(row);
    });

    $('btn-apply').disabled = state.gcps.length < 3;
    $('btn-clear-gcps').disabled = state.gcps.length === 0;

    const stats = $('gcp-stats');
    if (state.gcps.length === 0) {
      stats.style.display = 'none';
    } else if (state.gcps.length < 3) {
      stats.style.display = 'block';
      stats.innerHTML = `<span class="warn">あと ${3 - state.gcps.length} 点必要です（最低3点）</span>`;
    } else {
      stats.style.display = 'block';
      stats.innerHTML = `<span class="ok">${state.gcps.length} 点 — 「位置合わせを適用」できます</span>`;
    }
  }

  // 画像小窓のGCPマーカー再描画
  function redrawImgMarkers() {
    const body = $('img-window-body');
    body.querySelectorAll('.img-marker').forEach(el => el.remove());
    const img = $('gcp-img');
    const w = img.clientWidth, h = img.clientHeight;
    state.gcps.forEach((g, i) => {
      const el = document.createElement('div');
      el.className = 'img-marker';
      el.textContent = i + 1;
      el.style.left = (g.imgX * w) + 'px';
      el.style.top = (g.imgY * h) + 'px';
      body.appendChild(el);
    });
    if (state.pendingImg) {
      const el = document.createElement('div');
      el.className = 'img-marker';
      el.style.background = 'var(--amber)';
      el.textContent = state.gcps.length + 1;
      el.style.left = (state.pendingImg.imgX * w) + 'px';
      el.style.top = (state.pendingImg.imgY * h) + 'px';
      body.appendChild(el);
    }
  }

  // 地図上のピン描画
  function drawMapPins() {
    mapPins.forEach(m => map.removeLayer(m));
    mapPins = [];
    state.gcps.forEach((g, i) => {
      const icon = L.divIcon({
        className: '', html: `<div class="map-pin">${i + 1}</div>`,
        iconSize: [26, 26], iconAnchor: [13, 13],
      });
      const m = L.marker([g.mapLat, g.mapLng], { icon }).addTo(map);
      mapPins.push(m);
    });
  }

  // 全クリア
  $('btn-clear-gcps').addEventListener('click', () => {
    if (state.gcps.length === 0) return;
    if (!confirm('すべての基準点を削除しますか？')) return;
    state.gcps = [];
    refreshGcpUI(); drawMapPins(); redrawImgMarkers();
  });

  // ============ 位置合わせ（アフィン変換） ============
  $('btn-apply').addEventListener('click', () => {
    if (state.gcps.length < 3) return;
    const A = state.gcps.map(g => [g.imgX, g.imgY, 1]);
    const Blng = state.gcps.map(g => g.mapLng);
    const Blat = state.gcps.map(g => g.mapLat);
    const [a, b, c] = lsq3(A, Blng);
    const [d, e, f] = lsq3(A, Blat);
    const imgToGeo = (x, y) => [d * x + e * y + f, a * x + b * y + c]; // [lat, lng]
    const tl = imgToGeo(0, 0), tr = imgToGeo(1, 0), bl = imgToGeo(0, 1), br = imgToGeo(1, 1);
    const lats = [tl[0], tr[0], bl[0], br[0]];
    const lngs = [tl[1], tr[1], bl[1], br[1]];
    state.bounds = [[Math.min(...lats), Math.min(...lngs)], [Math.max(...lats), Math.max(...lngs)]];
    const dxLng = tr[1] - tl[1], dyLat = tr[0] - tl[0];
    state.rotationDeg = Math.atan2(-dyLat, dxLng) * 180 / Math.PI;
    $('rot-slider').value = state.rotationDeg.toFixed(1);
    $('rot-val').textContent = state.rotationDeg.toFixed(0) + '°';

    drawOverlay();
    markStepDone(2);
    activateStep(3);
    $('btn-publish').disabled = false;

    // 残差
    let maxResid = 0;
    state.gcps.forEach(g => {
      const [pLat, pLng] = imgToGeo(g.imgX, g.imgY);
      const dlat = (pLat - g.mapLat) * 111000;
      const dlng = (pLng - g.mapLng) * 91000;
      maxResid = Math.max(maxResid, Math.hypot(dlat, dlng));
    });
    status(`位置合わせ完了（最大残差 ${maxResid.toFixed(0)}m）`);
    map.fitBounds(state.bounds, { padding: [40, 40] });
  });

  function lsq3(A, b) {
    const ATA = [[0,0,0],[0,0,0],[0,0,0]];
    const ATb = [0,0,0];
    for (let i = 0; i < A.length; i++) for (let j = 0; j < 3; j++) {
      ATb[j] += A[i][j] * b[i];
      for (let k = 0; k < 3; k++) ATA[j][k] += A[i][j] * A[i][k];
    }
    const M = ATA.map((r, i) => [...r, ATb[i]]);
    for (let i = 0; i < 3; i++) {
      let mx = i;
      for (let j = i + 1; j < 3; j++) if (Math.abs(M[j][i]) > Math.abs(M[mx][i])) mx = j;
      [M[i], M[mx]] = [M[mx], M[i]];
      for (let j = i + 1; j < 3; j++) {
        const r = M[j][i] / M[i][i];
        for (let k = i; k < 4; k++) M[j][k] -= r * M[i][k];
      }
    }
    const x = [0,0,0];
    for (let i = 2; i >= 0; i--) {
      x[i] = M[i][3];
      for (let j = i + 1; j < 3; j++) x[i] -= M[i][j] * x[j];
      x[i] /= M[i][i];
    }
    return x;
  }

  // ============ オーバーレイ描画 ============
  function drawOverlay() {
    if (state.overlay) { map.removeLayer(state.overlay); state.overlay = null; }
    if (!state.bounds || !state.imageUrl) return;
    state.overlay = L.imageOverlay(state.imageUrl, state.bounds, {
      opacity: state.opacity,
      interactive: false,
    }).addTo(map);

    // 回転CSSは imageOverlay の DOM に直接適用
    setTimeout(() => {
      const img = state.overlay.getElement();
      if (img) {
        img.style.transform = (img.style.transform || '') + ` rotate(${state.rotationDeg}deg)`;
        img.style.transformOrigin = 'center';
      }
    }, 0);
  }

  // 透明度
  $('opa-slider').addEventListener('input', (e) => {
    state.opacity = parseInt(e.target.value, 10) / 100;
    $('opa-val').textContent = e.target.value + '%';
    if (state.overlay) state.overlay.setOpacity(state.opacity);
  });

  // 回転
  $('rot-slider').addEventListener('input', (e) => {
    state.rotationDeg = parseFloat(e.target.value);
    $('rot-val').textContent = state.rotationDeg.toFixed(0) + '°';
    if (state.overlay) {
      const img = state.overlay.getElement();
      if (img) img.style.transform = `rotate(${state.rotationDeg}deg)`;
    }
  });

  // ============ 画像小窓のヘッダードラッグ ============
  (function() {
    const win = $('img-window');
    const head = $('img-window-head');
    let drag = null;
    head.addEventListener('mousedown', e => {
      if (e.target.id === 'img-window-close') return;
      drag = { x: e.clientX, y: e.clientY, left: win.offsetLeft, top: win.offsetTop };
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!drag) return;
      win.style.left = (drag.left + e.clientX - drag.x) + 'px';
      win.style.top  = (drag.top  + e.clientY - drag.y) + 'px';
      win.style.right = 'auto';
    });
    document.addEventListener('mouseup', () => { drag = null; });
  })();

  $('img-window-close').addEventListener('click', () => $('img-window').classList.remove('show'));

  // ============ 4. 公開 ============
  $('btn-publish').addEventListener('click', publish);

  async function publish() {
    const name = $('meta-name').value.trim();
    if (!name) { toast('地図名を入力してください', true); $('meta-name').focus(); return; }
    if (!state.bounds || !state.file) { toast('位置合わせが完了していません', true); return; }

    const era = $('meta-era').value.trim();
    const desc = $('meta-desc').value.trim();
    const source = $('meta-source').value.trim();

    const btn = $('btn-publish');
    btn.disabled = true;
    const originalHtml = btn.innerHTML;
    btn.innerHTML = '<i class="ti ti-loader"></i> アップロード中…';

    try {
      // 1. 画像をStorageへアップロード
      const ext = (state.file.name.match(/\.(\w+)$/) || ['', 'jpg'])[1].toLowerCase();
      const path = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
      const { error: upErr } = await sb.storage.from(BUCKET).upload(path, state.file, {
        contentType: state.file.type,
        upsert: false,
      });
      if (upErr) throw new Error('アップロード失敗: ' + upErr.message);

      const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(path);
      const publicUrl = pub.publicUrl;
      state.uploadedUrl = publicUrl;

      // 2. maps テーブルへ
      const id = 'hist-' + Date.now();
      const centerLat = (state.bounds[0][0] + state.bounds[1][0]) / 2;
      const centerLng = (state.bounds[0][1] + state.bounds[1][1]) / 2;

      btn.innerHTML = '<i class="ti ti-loader"></i> 登録中…';

      const { error: insErr } = await sb.from('maps').insert({
        id, name, era, description: desc, source,
        category: 'historical',
        tier: 'standard', is_standard: false, is_verified: false,
        is_public: true, price: 0,
        image_url: publicUrl,
        image_bounds: state.bounds,
        image_rotation: state.rotationDeg,
        image_opacity: state.opacity,
        gcps: state.gcps,
        center_lat: Math.round(centerLat * 100000) / 100000,
        center_lng: Math.round(centerLng * 100000) / 100000,
        zoom_default: map.getZoom(),
        sort_order: 100,
      });
      if (insErr) throw new Error('DB登録失敗: ' + insErr.message);

      markStepDone(3);
      markStepDone(4);
      btn.innerHTML = '<i class="ti ti-check"></i> 公開完了！';
      btn.style.background = 'var(--green)';
      toast('公開しました！/map/ の古地図タブで確認できます');
      setTimeout(() => {
        if (confirm('公開完了。/map/ で確認しますか？')) window.location.href = '/map/';
      }, 1000);
    } catch (e) {
      console.error(e);
      toast(e.message, true);
      btn.disabled = false;
      btn.innerHTML = originalHtml;
    }
  }

  // ============ ユーティリティ ============
  function showHint(html) { const el = $('gcp-hint'); el.innerHTML = html; el.classList.add('show'); }
  function hideHint() { $('gcp-hint').classList.remove('show'); }
  let statusTimer;
  function status(msg) {
    const el = $('status-bar');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => el.classList.remove('show'), 4000);
  }
  let toastTimer;
  function toast(msg, isError) {
    const el = $('toast');
    el.textContent = msg;
    el.classList.toggle('error', !!isError);
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }

  // ============ 起動 ============
  window.addEventListener('load', initMap);

  // 画像のリサイズに合わせてマーカー再配置
  window.addEventListener('resize', () => {
    redrawImgMarkers();
    if (map) map.invalidateSize();
  });
})();
</script>
</body>
</html>
