<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>古地図エディタ — ImmersaMap</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg-alt: #fafafa;
    --bg-panel: #f5f5f5;
    --border: #e5e5e5;
    --border-strong: #d0d0d0;
    --text: #1a1a1a;
    --text-muted: #555;
    --text-faint: #888;
    --accent: #1a1a1a;
    --accent-on: #ffffff;
    --blue: #2563eb;
    --green: #2d8659;
    --red: #c0392b;
    --amber: #b8651e;
    --shadow: 0 2px 8px rgba(0,0,0,0.12);
    --shadow-strong: 0 4px 12px rgba(0,0,0,0.18);
    --header-h: 52px;
    --sidebar-w: 280px;
    --guide-h: 36px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: 'Noto Sans JP', system-ui, sans-serif; color: var(--text); }
  button, input, select, textarea { font-family: inherit; }

  .header {
    position: fixed; top: 0; left: 0; right: 0; height: var(--header-h);
    background: #fff; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; z-index: 1000;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .header-title i { font-size: 20px; }
  .header-link { color: var(--text-muted); text-decoration: none; font-size: 13px; padding: 6px 10px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; }
  .header-link:hover { background: #f0f0f0; color: var(--text); }

  .sidebar {
    position: fixed; top: var(--header-h); left: 0; bottom: 0; width: var(--sidebar-w);
    background: var(--bg-alt); border-right: 1px solid var(--border);
    overflow-y: auto; z-index: 500;
  }
  .stage {
    position: fixed; top: var(--header-h); left: var(--sidebar-w); right: 0; bottom: 0;
    display: flex; flex-direction: column;
  }
  .panes { flex: 1; display: flex; min-height: 0; }
  .pane { flex: 1; position: relative; min-width: 0; }
  .pane + .pane { border-left: 1px solid var(--border); }
  .pane-map { width: 100%; height: 100%; background: #f0ece0; }
  .pane-label {
    position: absolute; top: 8px; left: 8px; z-index: 600;
    background: rgba(255,255,255,0.94);
    padding: 6px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 500; color: var(--text);
    display: flex; align-items: center; gap: 6px;
    box-shadow: var(--shadow);
  }
  .pane-label i { font-size: 14px; }
  .pane-label.pending { background: var(--amber); color: #fff; }

  .pane-empty {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; color: var(--text-faint); font-size: 13px;
    background: repeating-linear-gradient(45deg, #fafafa 0 8px, #f0f0f0 8px 16px);
    z-index: 5;
  }
  .pane-empty i { font-size: 32px; display: block; margin-bottom: 8px; color: var(--text-faint); }

  .guide-bar {
    height: var(--guide-h); background: var(--blue); color: #fff;
    font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 0 12px;
    transition: background .2s;
  }
  .guide-bar.idle { background: #e5e5e5; color: var(--text-muted); }
  .guide-bar.success { background: var(--green); }
  .guide-bar i { font-size: 14px; }

  .editor-tabs {
    display: flex; gap: 4px; padding: 8px 8px 0;
    border-bottom: 1px solid var(--border); position: sticky; top: 0;
    background: var(--bg-alt); z-index: 10;
  }
  .editor-tab {
    flex: 1; padding: 9px 8px; border: none; background: transparent;
    color: var(--text-faint); font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; gap: 5px;
    border-radius: 6px 6px 0 0; border-bottom: 2px solid transparent;
  }
  .editor-tab i { font-size: 14px; }
  .editor-tab:hover { background: #f0f0f0; color: var(--text); }
  .editor-tab.active { background: #fff; color: var(--text); border-bottom-color: var(--accent); }

  .manage-card {
    display: flex; gap: 12px; padding: 12px;
    border: 1px solid var(--border); border-radius: 8px; align-items: center;
  }
  .manage-thumb {
    width: 60px; height: 60px; border-radius: 6px; flex-shrink: 0;
    object-fit: cover; background: #eee; border: 1px solid var(--border);
  }
  .manage-info { flex: 1; min-width: 0; }
  .manage-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .manage-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .manage-sub { font-size: 10px; color: var(--text-faint); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .manage-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .manage-btn {
    width: 32px; height: 32px; border: 1px solid var(--border-strong);
    background: #fff; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: var(--text);
  }
  .manage-btn:hover { background: #f0f0f0; }
  .manage-btn.danger { border-color: var(--red); color: var(--red); }
  .manage-btn.danger:hover { background: #fbeaea; }
  .manage-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status-badge {
    display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 3px;
    font-weight: 500; margin-left: 4px; vertical-align: middle;
  }
  .status-badge.bad { background: var(--red); color: #fff; }
  .manage-empty { padding: 24px 12px; text-align: center; color: var(--text-faint); font-size: 12px; line-height: 1.6; }

  .step {
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
  }
  .step-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .step-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: #e5e5e5; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; flex-shrink: 0;
  }
  .step.active .step-num { background: var(--accent); color: #fff; }
  .step.done .step-num { background: var(--green); color: #fff; }
  .step.done .step-num::before { content: '\2713'; }
  .step.done .step-num span { display: none; }
  .step-title { font-size: 13px; font-weight: 500; }
  .step-hint { font-size: 11px; color: var(--text-faint); margin-bottom: 8px; line-height: 1.5; }
  .step-body { padding-left: 32px; }

  .form-row { margin-bottom: 10px; }
  .form-label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 7px 9px; font-size: 12px;
    border: 1px solid var(--border); border-radius: 6px;
    background: #fff; outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: vertical; min-height: 50px; font-family: inherit; }

  .file-drop {
    border: 2px dashed var(--border-strong); border-radius: 6px;
    padding: 18px 10px; text-align: center; cursor: pointer;
    background: #fff; transition: border-color .15s, background .15s;
  }
  .file-drop:hover, .file-drop.dragover { border-color: var(--accent); background: #fafafa; }
  .file-drop i { font-size: 20px; color: var(--text-faint); display: block; margin-bottom: 4px; }
  .file-drop-text { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

  .btn {
    padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border-strong); background: #fff; color: var(--text);
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover:not(:disabled) { background: #f0f0f0; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover:not(:disabled) { background: #000; }
  .btn-green { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-green:hover:not(:disabled) { background: #226649; }
  .btn-danger { color: var(--red); border-color: var(--red); background: #fff; }
  .btn-danger:hover:not(:disabled) { background: #fbeaea; }
  .btn-block { display: flex; width: 100%; justify-content: center; }
  .btn-row { display: flex; gap: 6px; }
  .btn-row .btn { flex: 1; justify-content: center; }

  .gcp-list { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; max-height: 200px; overflow-y: auto; }
  .gcp-item {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px; background: #fff; border: 1px solid var(--border); border-radius: 5px;
    font-size: 11px;
  }
  .gcp-item.pending { background: #fff7e6; border-color: var(--amber); }
  .gcp-num {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--blue); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500; flex-shrink: 0;
  }
  .gcp-item.pending .gcp-num { background: var(--amber); }
  .gcp-info { flex: 1; min-width: 0; color: var(--text-muted); line-height: 1.3; font-size: 10px; }
  .gcp-info-line { display: flex; align-items: center; gap: 3px; }
  .gcp-info-line i { font-size: 10px; }
  .gcp-info-line.muted { color: var(--text-faint); }
  .gcp-del { background: transparent; border: none; color: var(--text-faint); cursor: pointer; padding: 2px 4px; font-size: 13px; flex-shrink: 0; }
  .gcp-del:hover { color: var(--red); }

  .gcp-stats { font-size: 11px; color: var(--text-faint); margin-top: 8px; padding: 6px 8px; background: #fff; border-radius: 5px; border: 1px solid var(--border); }
  .gcp-stats .ok { color: var(--green); font-weight: 500; }
  .gcp-stats .warn { color: var(--amber); font-weight: 500; }

  .gcp-residual {
    font-size: 10px; padding: 1px 5px; border-radius: 8px;
    flex-shrink: 0; font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .gcp-residual.good { background: #e8f5ee; color: var(--green); }
  .gcp-residual.warn { background: #fff4e6; color: var(--amber); }
  .gcp-residual.bad  { background: #fbeaea; color: var(--red); }

  .gcp-item.has-bad-residual { border-color: var(--red); background: #fffafa; }
  .gcp-item.has-warn-residual { border-color: var(--amber); }

  .slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .slider-row label { font-size: 11px; color: var(--text-muted); width: 48px; flex-shrink: 0; }
  .slider-row input[type=range] { flex: 1; }
  .slider-row .val { font-size: 11px; color: var(--text); width: 42px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

  details { margin-top: 8px; }
  details summary { font-size: 11px; color: var(--text-muted); cursor: pointer; padding: 4px 0; }
  details summary:hover { color: var(--text); }

  /* 適用後オーバーレイ用フローティングコントロール */
  .overlay-controls {
    position: absolute; top: 8px; right: 12px; z-index: 600;
    background: rgba(255,255,255,0.96); border-radius: 8px;
    padding: 8px 12px; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 10px;
    max-width: calc(100% - 24px);
  }
  .overlay-ctrl-row { display: flex; align-items: center; gap: 8px; }
  .overlay-ctrl-row i { font-size: 14px; color: var(--text-muted); }
  .overlay-ctrl-row input[type=range] {
    width: 140px; cursor: pointer;
  }
  .overlay-ctrl-val {
    font-size: 11px; color: var(--text); width: 36px; text-align: right;
    font-variant-numeric: tabular-nums; font-weight: 500;
  }
  .overlay-toggle {
    width: 28px; height: 28px; border: none; background: transparent;
    border-radius: 6px; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
  }
  .overlay-toggle:hover { background: #f0f0f0; color: var(--text); }
  .overlay-toggle.hidden i { color: var(--red); }

  /* GCPピンのスタイル（divIcon用） */
  .gcp-pin {
    background: var(--blue); color: #fff;
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    box-shadow: 0 0 4px rgba(0,0,0,0.5);
    cursor: pointer;
  }
  .gcp-pin.pending { background: var(--amber); }

  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(26,26,26,0.92); color: #fff;
    padding: 12px 20px; border-radius: 8px; font-size: 13px; line-height: 1.6;
    z-index: 2000; opacity: 0; transition: opacity .3s;
    max-width: 520px; text-align: left;
    box-shadow: var(--shadow-strong);
  }
  .toast.show { opacity: 1; pointer-events: auto; }
  .toast.error { background: var(--red); }

  /* モバイル: 左右並びは厳しいので上下＋タブ切替 */
  @media (max-width: 900px) {
    :root { --sidebar-w: 0px; }
    .sidebar {
      width: 100%; left: 0; right: 0;
      top: var(--header-h); bottom: auto; height: 40vh; z-index: 500;
      transform: translateY(-100%); transition: transform .25s;
    }
    body.sidebar-open .sidebar { transform: translateY(0); }
    .stage { left: 0; }
    .panes { flex-direction: column; }
    .pane + .pane { border-left: none; border-top: 1px solid var(--border); }
    .header-toggle { display: inline-flex !important; }
  }
  .header-toggle {
    display: none; width: 32px; height: 32px;
    border: none; background: transparent; border-radius: 6px;
    align-items: center; justify-content: center; color: var(--text);
  }
  .header-toggle i { font-size: 18px; }
  .header-toggle:hover { background: #f0f0f0; }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="header-toggle" id="sidebar-toggle" aria-label="メニュー"><i class="ti ti-menu-2"></i></button>
    <a href="/" class="header-link" title="トップへ" style="padding-left:0;"><i class="ti ti-arrow-left"></i></a>
    <div class="header-title"><i class="ti ti-map"></i><span>古地図エディタ</span></div>
  </div>
  <div>
    <a href="/map/" class="header-link" target="_blank"><i class="ti ti-external-link"></i> /map/</a>
  </div>
</header>

<aside class="sidebar" id="sidebar">

  <div class="editor-tabs">
    <button class="editor-tab active" id="tab-create" data-tab="create">
      <i class="ti ti-plus"></i> 新規作成
    </button>
    <button class="editor-tab" id="tab-manage" data-tab="manage">
      <i class="ti ti-list"></i> 一覧・管理
    </button>
  </div>

  <div id="panel-create">

  <section class="step active" id="step-1">
    <div class="step-head">
      <div class="step-num"><span>1</span></div>
      <div class="step-title">古地図画像をアップロード</div>
    </div>
    <div class="step-body">
      <div class="step-hint">JPG / PNG。15MBまで。</div>
      <div class="file-drop" id="file-drop">
        <i class="ti ti-cloud-upload"></i>
        <div class="file-drop-text">クリック or ドラッグ&amp;ドロップ</div>
        <input type="file" id="file-input" accept="image/*" style="display:none;">
      </div>
      <div id="file-info" style="font-size: 10px; color: var(--green); margin-top: 6px; display: none;"></div>
    </div>
  </section>

  <section class="step" id="step-2">
    <div class="step-head">
      <div class="step-num"><span>2</span></div>
      <div class="step-title">基準点を指定（3点以上）</div>
    </div>
    <div class="step-body">
      <div class="step-hint">
        ① 左の <strong>古地図</strong> で目印をクリック<br>
        ② 右の <strong>現代地図</strong> で同じ場所をクリック<br>
        ③ 3点以上で位置合わせ可能
      </div>

      <button class="btn btn-primary btn-block" id="btn-add-gcp" disabled>
        <i class="ti ti-pin"></i> 基準点を追加
      </button>

      <div class="gcp-list" id="gcp-list"></div>
      <div class="gcp-stats" id="gcp-stats" style="display:none;"></div>

      <div class="btn-row" style="margin-top: 10px;">
        <button class="btn btn-green" id="btn-apply" disabled>
          <i class="ti ti-check"></i> 位置合わせを適用
        </button>
        <button class="btn btn-danger" id="btn-clear-gcps" disabled title="すべて削除">
          <i class="ti ti-trash"></i>
        </button>
      </div>

      <details>
        <summary>回転を微調整（任意）</summary>
        <div style="margin-top: 8px;">
          <div class="slider-row">
            <label>回転</label>
            <input type="range" id="rot-slider" min="-180" max="180" value="0" step="0.5">
            <span class="val" id="rot-val">0°</span>
          </div>
          <div class="step-hint" style="margin-top: 4px;">基準点を増やすと自動でも調整されます</div>
        </div>
      </details>
    </div>
  </section>

  <section class="step" id="step-3">
    <div class="step-head">
      <div class="step-num"><span>3</span></div>
      <div class="step-title">情報を入力</div>
    </div>
    <div class="step-body">
      <div class="form-row">
        <label class="form-label">地図名 <span style="color:var(--red);">*</span></label>
        <input type="text" class="form-input" id="meta-name" placeholder="例：江戸切絵図 日本橋之部">
      </div>
      <div class="form-row">
        <label class="form-label">年代</label>
        <input type="text" class="form-input" id="meta-era" placeholder="例：天保年間（1830-1844）">
      </div>
      <div class="form-row">
        <label class="form-label">カバー範囲</label>
        <input type="text" class="form-input" id="meta-coverage" placeholder="例：東京、関東一円、大阪市域">
      </div>
      <div class="form-row">
        <label class="form-label">説明</label>
        <textarea class="form-textarea" id="meta-desc" placeholder="特徴・見どころなど"></textarea>
      </div>
      <div class="form-row">
        <label class="form-label">出典</label>
        <input type="text" class="form-input" id="meta-source" placeholder="例：国立国会図書館">
      </div>
    </div>
  </section>

  <section class="step" id="step-4">
    <div class="step-head">
      <div class="step-num"><span>4</span></div>
      <div class="step-title">公開</div>
    </div>
    <div class="step-body">
      <button class="btn btn-primary btn-block" id="btn-publish" disabled>
        <i class="ti ti-upload"></i> 公開する
      </button>
      <div class="step-hint" style="margin-top: 6px;">/map/ の古地図タブで誰でも見られるようになります。</div>
    </div>
  </section>

  </div><!-- /panel-create -->

  <div id="panel-manage" style="display:none;">
    <div style="padding: 14px 16px;">
      <div style="font-size: 12px; color: var(--text-faint); margin-bottom: 12px;" id="manage-count">読み込み中…</div>
      <div id="manage-list" style="display:flex; flex-direction:column; gap:10px;"></div>
    </div>
  </div>

</aside>


<main class="stage">
  <div class="panes">
    <div class="pane" id="pane-old">
      <div class="pane-label" id="label-old"><i class="ti ti-map"></i><span>古地図</span></div>
      <div class="pane-empty" id="empty-old">
        <div>
          <i class="ti ti-photo-up"></i>
          画像をアップロードすると<br>ここに表示されます
        </div>
      </div>
      <div id="map-old" class="pane-map"></div>
    </div>
    <div class="pane" id="pane-new">
      <div class="pane-label" id="label-new"><i class="ti ti-map-2"></i><span>現代地図</span></div>
      <div id="overlay-controls" class="overlay-controls" style="display:none;">
        <div class="overlay-ctrl-row">
          <i class="ti ti-eye" aria-hidden="true"></i>
          <input type="range" id="opa-slider" min="0" max="100" value="70" step="1" aria-label="古地図の透明度">
          <span class="overlay-ctrl-val" id="opa-val">70%</span>
        </div>
        <button type="button" class="overlay-toggle" id="overlay-toggle" title="古地図の表示/非表示">
          <i class="ti ti-eye-off" id="overlay-toggle-icon" aria-hidden="true"></i>
        </button>
      </div>
      <div id="map-new" class="pane-map"></div>
    </div>
  </div>
  <div class="guide-bar idle" id="guide-bar">
    <i class="ti ti-info-circle"></i>
    <span id="guide-text">まず画像をアップロードしてください</span>
  </div>
</main>

<div class="toast" id="toast" role="status"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
(function() {
  'use strict';

      mapLat: lat, mapLng: lng,

    state.pendingMapLatLng = null;

  function drawPinsOld() {
    if (!mapOld) return;
    pinsOld.forEach(p => mapOld.removeLayer(p));

  // 残差(m)を「good/warn/bad」に分類
  function residualLevel(m) {
    if (m == null) return null;
    if (m < 50) return 'good';
    if (m < 200) return 'warn';
    return 'bad';
  }
  function formatMeters(m) {
    if (m < 10) return m.toFixed(1) + 'm';
    if (m < 10000) return Math.round(m) + 'm';
    return (m / 1000).toFixed(1) + 'km';
  }

  // 位置合わせ計算（GCP変更時にも呼ばれる）
  function computeTransform() {
    if (state.gcps.length < 3) return;
    const A = state.gcps.map(g => [g.imgX, g.imgY, 1]);
    const Blng = state.gcps.map(g => g.mapLng);
    const Blat = state.gcps.map(g => g.mapLat);
    const [a, b, c] = lsq3(A, Blng);
    const [d, e, f] = lsq3(A, Blat);
    const imgToGeo = (x, y) => [d * x + e * y + f, a * x + b * y + c];
    const tl = imgToGeo(0, 0), tr = imgToGeo(1, 0), bl = imgToGeo(0, 1), br = imgToGeo(1, 1);
    const lats = [tl[0], tr[0], bl[0], br[0]];
    const lngs = [tl[1], tr[1], bl[1], br[1]];
    state.bounds = [[Math.min(...lats), Math.min(...lngs)], [Math.max(...lats), Math.max(...lngs)]];
    const dxLng = tr[1] - tl[1], dyLat = tr[0] - tl[0];
    state.rotationDeg = Math.atan2(-dyLat, dxLng) * 180 / Math.PI;
    $('rot-slider').value = state.rotationDeg.toFixed(1);
    $('rot-val').textContent = state.rotationDeg.toFixed(0) + '°';

    // 各GCPの残差を計算（メートル単位）
    // 緯度1度 = 111km、経度1度 = 緯度cosに依存。平均緯度から推定
    const meanLat = state.gcps.reduce((s, g) => s + g.mapLat, 0) / state.gcps.length;
    const mPerDegLng = 111000 * Math.cos(meanLat * Math.PI / 180);
    const mPerDegLat = 111000;
    let maxResid = 0, sumResid = 0;
    state.gcps.forEach(g => {
      const [pLat, pLng] = imgToGeo(g.imgX, g.imgY);
      const dx = (pLng - g.mapLng) * mPerDegLng;
      const dy = (pLat - g.mapLat) * mPerDegLat;
      g.residual = Math.hypot(dx, dy); // m
      maxResid = Math.max(maxResid, g.residual);
      sumResid += g.residual;
    });
    state.residualMax = maxResid;
    state.residualMean = sumResid / state.gcps.length;

    drawOverlayOnNew();
    refreshGcpUI();

    const maxStr = maxResid < 10 ? maxResid.toFixed(1) : Math.round(maxResid);
    const meanStr = state.residualMean < 10 ? state.residualMean.toFixed(1) : Math.round(state.residualMean);
    setGuide('success', `位置合わせ完了 — 平均残差 ${meanStr}m / 最大残差 ${maxStr}m`);
  }

  function lsq3(A, b) {
    const ATA = [[0,0,0],[0,0,0],[0,0,0]];
    const ATb = [0,0,0];
    for (let i = 0; i < A.length; i++) for (let j = 0; j < 3; j++) {
      ATb[j] += A[i][j] * b[i];
      for (let k = 0; k < 3; k++) ATA[j][k] += A[i][j] * A[i][k];
    }
    const M = ATA.map((r, i) => [...r, ATb[i]]);
    for (let i = 0; i < 3; i++) {
      let mx = i;
      for (let j = i + 1; j < 3; j++) if (Math.abs(M[j][i]) > Math.abs(M[mx][i])) mx = j;
      [M[i], M[mx]] = [M[mx], M[i]];
      for (let j = i + 1; j < 3; j++) {
        const r = M[j][i] / M[i][i];
        for (let k = i; k < 4; k++) M[j][k] -= r * M[i][k];
      }
    }
    const x = [0,0,0];
    for (let i = 2; i >= 0; i--) {
      x[i] = M[i][3];
      for (let j = i + 1; j < 3; j++) x[i] -= M[i][j] * x[j];
      x[i] /= M[i][i];
    }
    return x;
  }

  function drawOverlayOnNew() {
    if (state.overlay) { mapNew.removeLayer(state.overlay); state.overlay = null; }
    if (!state.bounds || !state.imageUrl) return;
    state.overlay = L.imageOverlay(state.imageUrl, state.bounds, {
      opacity: state.opacity, interactive: false,
    }).addTo(mapNew);
    applyRotation();
  }
  function applyRotation() {
    if (!state.overlay) return;
    const el = state.overlay.getElement();
    if (el) {
      el.style.transform = `rotate(${state.rotationDeg}deg)`;
      el.style.transformOrigin = 'center';
    }
  }

  $('opa-slider').addEventListener('input', (e) => {
    state.opacity = parseInt(e.target.value, 10) / 100;
    $('opa-val').textContent = e.target.value + '%';
    if (state.overlay) state.overlay.setOpacity(state.opacity);
    // 表示/非表示トグルが「非表示」状態なら、操作したら元に戻す
    if (state.overlayHidden && state.opacity > 0) {
      state.overlayHidden = false;
      $('overlay-toggle').classList.remove('hidden');
      $('overlay-toggle-icon').className = 'ti ti-eye-off';
    }
  });
  $('rot-slider').addEventListener('input', (e) => {
    state.rotationDeg = parseFloat(e.target.value);
    $('rot-val').textContent = state.rotationDeg.toFixed(0) + '°';
    applyRotation();
  });

  // 古地図オーバーレイの表示/非表示トグル
  $('overlay-toggle').addEventListener('click', () => {
    state.overlayHidden = !state.overlayHidden;
    const btn = $('overlay-toggle');
    const icon = $('overlay-toggle-icon');
    if (state.overlayHidden) {
      if (state.overlay) state.overlay.setOpacity(0);
      btn.classList.add('hidden');
      icon.className = 'ti ti-eye';
      btn.title = '古地図を表示';
    } else {
      if (state.overlay) state.overlay.setOpacity(state.opacity);
      btn.classList.remove('hidden');
      icon.className = 'ti ti-eye-off';
      btn.title = '古地図を非表示';
    }
  });

  $('btn-publish').addEventListener('click', publish);

  async function publish() {
    const name = $('meta-name').value.trim();
    if (!name) { toast('地図名を入力してください', true); $('meta-name').focus(); return; }
    if (!state.bounds) { toast('位置合わせが完了していません', true); return; }
    const isEdit = !!state.editingId;
    if (!state.file && !isEdit) { toast('画像がありません', true); return; }

    const era = $('meta-era').value.trim();
    const coverageLabel = $('meta-coverage').value.trim();
    const desc = $('meta-desc').value.trim();
    const source = $('meta-source').value.trim();

    const btn = $('btn-publish');
    btn.disabled = true;
    const originalHtml = btn.innerHTML;

    try {
      let publicUrl = state.editingImageUrl || null;

      // 新しい画像が選ばれている場合のみアップロード
      if (state.file) {
        btn.innerHTML = '<i class="ti ti-loader"></i> アップロード中…';
        const ext = (state.file.name.match(/\.(\w+)$/) || ['', 'jpg'])[1].toLowerCase();
        const path = BUCKET_PREFIX + `${Date.now()}-${Math.random().toString(36).slice(2, 8)}.${ext}`;
        const { error: upErr } = await sb.storage.from(BUCKET).upload(path, state.file, {
          contentType: state.file.type,
          upsert: false,
        });
        if (upErr) {
          const msg = upErr.message || '';
          if (/bucket not found/i.test(msg)) {
            throw new Error(
              'Storageバケット「' + BUCKET + '」が見つかりません。\n' +
              'Supabaseダッシュボード → Storage → New bucket で\n' +
              '名前「' + BUCKET + '」、Public ON で作成してください。'
            );
          }
          if (/row.level security|permission|denied|unauthor/i.test(msg)) {
            throw new Error(
              'アクセス権がありません。historical_maps_setup.sql の\n' +
              'Storageポリシー部分を再実行してください。\n元のエラー: ' + msg
            );
          }
          if (/payload too large|exceed/i.test(msg)) {
            throw new Error('ファイルが大きすぎます。バケットのFile size limitを確認してください。');
          }
          throw new Error('アップロード失敗: ' + (msg || '不明なエラー'));
        }
        publicUrl = sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
      }

      const centerLat = (state.bounds[0][0] + state.bounds[1][0]) / 2;
      const centerLng = (state.bounds[0][1] + state.bounds[1][1]) / 2;

      const record = {
        name, era, description: desc, source,
        coverage_label: coverageLabel || null,
        image_url: publicUrl,
        image_bounds: state.bounds,
        image_rotation: state.rotationDeg,
        image_opacity: state.opacity,
        gcps: state.gcps.map(g => ({imgX: g.imgX, imgY: g.imgY, mapLat: g.mapLat, mapLng: g.mapLng})),
        center_lat: Math.round(centerLat * 100000) / 100000,
        center_lng: Math.round(centerLng * 100000) / 100000,
        zoom_default: mapNew.getZoom(),
      };

      btn.innerHTML = isEdit ? '<i class="ti ti-loader"></i> 更新中…' : '<i class="ti ti-loader"></i> 登録中…';

      let dbErr;
      if (isEdit) {
        const { error } = await sb.from('maps').update(record).eq('id', state.editingId);
        dbErr = error;
      } else {
        const { error } = await sb.from('maps').insert({
          id: 'hist-' + Date.now(),
          category: 'old_map',
          tier: 'standard', is_standard: false, is_verified: false,
          is_public: true, price: 0, sort_order: 100,
          ...record,
        });
        dbErr = error;
      }
      const insErr = dbErr;
      if (insErr) {
        const msg = insErr.message || '';
        if (/audit_log/i.test(msg) && /row.level security|policy/i.test(msg)) {
          throw new Error(
            'audit_log テーブルの権限不足です。Supabase SQL Editor で以下を実行してください：\n\n' +
            'create policy "audit_log public write" on audit_log for insert with check (true);\n' +
            'create policy "audit_log public read" on audit_log for select using (true);'
          );
        }
        if (/valid_category|check constraint/i.test(msg)) {
          throw new Error(
            'category制約違反です。エディタ側のコードを確認してください。\n元のエラー: ' + msg
          );
        }
        if (/row.level security|policy/i.test(msg)) {
          throw new Error(
            'mapsテーブルの書き込み権限不足です。historical_maps_setup.sql の\n' +
            '"maps public write" ポリシー部分を再実行してください。\n元のエラー: ' + msg
          );
        }
        throw new Error('DB登録失敗: ' + msg);
      }

      markStepDone(3); markStepDone(4);
      const wasEdit = isEdit;
      btn.innerHTML = wasEdit ? '<i class="ti ti-check"></i> 更新完了！' : '<i class="ti ti-check"></i> 公開完了！';
      btn.style.background = 'var(--green)';
      toast(wasEdit ? '更新しました！' : '公開しました！');
      setGuide('success', wasEdit ? '更新完了 — /map/ に反映されました' : '公開完了 — /map/ の古地図タブから誰でも見られます');
      state.editingId = null;
      state.editingImageUrl = null;
      setTimeout(() => {
        if (confirm((wasEdit ? '更新' : '公開') + '完了。/map/ で確認しますか？')) window.location.href = '/map/';
      }, 1200);
    } catch (e) {
      console.error(e);
      toast(e.message, true);
      btn.disabled = false;
      btn.innerHTML = originalHtml;
    }
  }

  let toastTimer;
  function toast(msg, isError) {
    const el = $('toast');
    el.innerHTML = String(msg).replace(/\n/g, '<br>');
    el.classList.toggle('error', !!isError);
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), isError ? 8000 : 2800);
  }

  $('sidebar-toggle').addEventListener('click', () => {
    document.body.classList.toggle('sidebar-open');
    setTimeout(() => {
      if (mapOld) mapOld.invalidateSize();
      if (mapNew) mapNew.invalidateSize();
    }, 260);
  });

  // ============ タブ切替（新規作成 / 一覧・管理） ============
  document.querySelectorAll('.editor-tab').forEach(t => {
    t.addEventListener('click', () => switchTab(t.dataset.tab));
  });
  function switchTab(tab) {
    document.querySelectorAll('.editor-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    $('panel-create').style.display = tab === 'create' ? '' : 'none';
    $('panel-manage').style.display = tab === 'manage' ? '' : 'none';
    if (tab === 'manage') loadManageList();
  }

  // ============ 一覧・管理 ============
  async function loadManageList() {
    const listEl = $('manage-list');
    const countEl = $('manage-count');
    listEl.innerHTML = '';
    countEl.textContent = '読み込み中…';
    try {
      const { data, error } = await sb
        .from('maps')
        .select('id,name,era,coverage_label,description,source,image_url')
        .eq('category', 'old_map')
        .order('sort_order', { ascending: true });
      if (error) throw error;
      if (!data || data.length === 0) {
        countEl.textContent = '';
        listEl.innerHTML = '<div class="manage-empty">登録済みの古地図はありません。<br>「新規作成」から追加できます。</div>';
        return;
      }
      countEl.textContent = `登録済みの古地図 ${data.length}件`;
      data.forEach(m => {
        const card = document.createElement('div');
        card.className = 'manage-card';
        const meta = [m.era, m.coverage_label ? 'カバー範囲：' + m.coverage_label : ''].filter(Boolean).join(' · ');
        const hasImage = !!m.image_url;
        const statusBadge = !hasImage
          ? '<span class="status-badge bad" title="画像が登録されていません">画像なし</span>'
          : '';
        const thumb = hasImage
          ? `<img class="manage-thumb" src="${escapeAttr(m.image_url)}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
             <div class="manage-thumb" style="display:none;align-items:center;justify-content:center;background:#fbeaea;"><i class="ti ti-photo-off" style="font-size:22px;color:var(--red);"></i></div>`
          : `<div class="manage-thumb" style="display:flex;align-items:center;justify-content:center;"><i class="ti ti-photo-off" style="font-size:22px;color:#999;"></i></div>`;
        card.innerHTML = `
          ${thumb}
          <div class="manage-info">
            <div class="manage-name">${escapeHtml(m.name || '(無題)')} ${statusBadge}</div>
            <div class="manage-meta">${escapeHtml(meta || '—')}</div>
            <div class="manage-sub" style="font-family:monospace;font-size:9px;">ID: ${escapeHtml(m.id)}</div>
          </div>
          <div class="manage-actions">
            <button class="manage-btn" title="編集" data-act="edit"${!hasImage ? ' disabled' : ''}><i class="ti ti-edit"></i></button>
            <button class="manage-btn danger" title="削除" data-act="delete"><i class="ti ti-trash"></i></button>
          </div>
        `;
        const editBtn = card.querySelector('[data-act="edit"]');
        if (hasImage) editBtn.addEventListener('click', () => editMap(m));
        card.querySelector('[data-act="delete"]').addEventListener('click', () => deleteMap(m, card));
        listEl.appendChild(card);
      });
    } catch (e) {
      console.error(e);
      countEl.textContent = '';
      listEl.innerHTML = `<div class="manage-empty" style="color:var(--red);">読み込みに失敗しました<br>${escapeHtml(e.message || '')}</div>`;
    }
  }

  // ============ 削除 ============
  async function deleteMap(m, cardEl) {
    if (!confirm(`「${m.name || '(無題)'}」を削除しますか？\nこの操作は取り消せません。画像ファイルも削除されます。`)) return;
    try {
      // 1. DB行を削除し、実際に削除された行を取得して検証
      const { data: deleted, error: delErr } = await sb
        .from('maps')
        .delete()
        .eq('id', m.id)
        .select();
      if (delErr) throw new Error('DB削除失敗: ' + delErr.message);
      if (!deleted || deleted.length === 0) {
        throw new Error(
          '削除できませんでした（権限不足の可能性）。\n' +
          'Supabase SQL Editor で以下を実行してください：\n\n' +
          'grant delete on maps to anon;\n' +
          'create policy "maps public delete" on maps for delete using (true);'
        );
      }

      // 2. Storage画像を削除（URLからパスを逆算）
      if (m.image_url) {
        const marker = `/object/public/${BUCKET}/`;
        const idx = m.image_url.indexOf(marker);
        if (idx >= 0) {
          const path = decodeURIComponent(m.image_url.slice(idx + marker.length));
          const { error: stErr } = await sb.storage.from(BUCKET).remove([path]);
          if (stErr) console.warn('Storage削除に失敗（DB行は削除済み）:', stErr.message);
        }
      }
      cardEl.remove();
      toast('削除しました');
      // 件数更新
      const remaining = $('manage-list').children.length;
      $('manage-count').textContent = remaining > 0 ? `登録済みの古地図 ${remaining}件` : '';
      if (remaining === 0) {
        $('manage-list').innerHTML = '<div class="manage-empty">登録済みの古地図はありません。<br>「新規作成」から追加できます。</div>';
      }
    } catch (e) {
      console.error(e);
      toast(e.message, true);
    }
  }

  // ============ 編集（新規作成タブに値を復元して開く） ============
  async function editMap(m) {
    if (!m.image_url) { toast('この地図には画像がないため編集できません', true); return; }
    if (state.transformApplied || state.file) {
      if (!confirm('編集中の内容は破棄されます。よろしいですか？')) return;
    }
    switchTab('create');
    toast('編集データを読み込んでいます…');

    try {
      // メタ情報を復元
      $('meta-name').value = m.name || '';
      $('meta-era').value = m.era || '';
      $('meta-coverage').value = m.coverage_label || '';
      $('meta-desc').value = m.description || '';
      $('meta-source').value = m.source || '';

      // 画像を取得して File 化（再アップロード or 既存URL維持のため）
      state.editingId = m.id;
      state.editingImageUrl = m.image_url;

      // 完全なレコードを取得（gcps, bounds, rotation）
      const { data: full, error } = await sb.from('maps')
        .select('image_url,image_bounds,image_rotation,image_opacity,gcps')
        .eq('id', m.id).single();
      if (error) throw error;

      // 画像をimg要素に読み込み、古地図ペインを構築
      const img = new Image();
      img.onload = () => {
        state.naturalSize = { w: img.naturalWidth, h: img.naturalHeight };
        state.imageUrl = m.image_url; // 既存URLをそのまま使う
        state.file = null;            // 新規ファイルはなし（画像変更しない限り）
        $('file-info').textContent = `✓ 既存画像を読み込みました (${img.naturalWidth}×${img.naturalHeight}px)`;
        $('file-info').style.display = 'block';
        initMapOld(img.naturalWidth, img.naturalHeight);
        $('btn-add-gcp').disabled = false;
        markStepDone(1);
        activateStep(2);

        // GCP復元
        let gcps = full.gcps;
        if (typeof gcps === 'string') { try { gcps = JSON.parse(gcps); } catch { gcps = []; } }
        state.gcps = (gcps || []).map(g => ({
          imgX: g.imgX, imgY: g.imgY,
          _rawX: g.imgX * img.naturalWidth, _rawY: g.imgY * img.naturalHeight,
          mapLat: g.mapLat, mapLng: g.mapLng,
        }));

        refreshGcpUI(); drawPinsOld(); drawPinsNew();

        // 既に3点以上あれば位置合わせを再現
        if (state.gcps.length >= 3) {
          state.transformApplied = true;
          computeTransform();
          markStepDone(2); activateStep(3);
          $('btn-publish').disabled = false;
          $('overlay-controls').style.display = 'flex';
          mapNew.fitBounds(state.bounds, { padding: [40, 40] });
        }
        toast('編集準備ができました');
      };
      img.onerror = () => toast('画像の読み込みに失敗しました', true);
      img.src = m.image_url;
    } catch (e) {
      console.error(e);
      toast('編集データの読み込みに失敗: ' + (e.message || ''), true);
    }
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }

  window.addEventListener('load', initMapNew);
  window.addEventListener('resize', () => {
    if (mapOld) mapOld.invalidateSize();
    if (mapNew) mapNew.invalidateSize();
  });
})();
</script>
</body>
